                const letter = String.fromCharCode(65 + oi);
                return (
                  <button
                    key={oi}
                    disabled={submitted}
                    onClick={() => setAnswers(a => ({ ...a, [q.id]: oi }))}
                    aria-label={`Option ${letter}: ${opt}`}
                    aria-pressed={oi === chosen}
                    style={{
                      padding: isComfortable ? "13px 18px" : "11px 15px",
                      border: `1px solid ${border}`,
                      borderRadius: 8,
                      cursor: submitted ? "default" : "pointer",
                      fontSize: optFont, lineHeight: 1.45,
                      textAlign: "left", background: bg, color,
                      fontFamily: "inherit",
                      display: "flex", alignItems: "flex-start", gap: 10,
                      transition: "background 0.12s, border-color 0.12s",
                      fontWeight: oi === chosen && !submitted ? 600 : 400,
                    }}>
                    <span style={{ fontFamily: "monospace", fontSize: optFont - 2, flexShrink: 0, marginTop: 1, fontWeight: 700, opacity: 0.75 }}>
                      {submitted
                        ? (oi === q.correctIdx ? "✓" : oi === chosen ? "✗" : letter)
                        : letter}
                    </span>
                    <span>{opt}</span>
                  </button>
                );
              })}
            </div>
            {submitted && isWrong && chosen !== undefined && (
              <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 6, fontSize: 12, lineHeight: 1.55, background: "rgba(26,107,60,0.08)", color: "#14522e", border: "1px solid rgba(26,107,60,0.2)" }}>
                <span style={{ fontWeight: 700 }}>Correct answer: </span>
                {q.options[q.correctIdx]}
              </div>
            )}
          </div>
        );
      })}

      {/* Submit + Exit buttons */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 24, borderTop: "1px solid #c8bfaa", gap: 12, flexWrap: "wrap" }}>
        <button
          onClick={onExit}
          aria-label="Return to course home"
          style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "1px solid #c8bfaa", background: "transparent", cursor: "pointer", color: "#7a6e5f" }}>
          ← Exit to Course
        </button>

        {!submitted ? (
          <button
            onClick={handleSubmit}
            disabled={!allAnswered}
            aria-label={allAnswered ? "Submit answers and see results" : `Answer all ${totalQuestions} questions first`}
            style={{
              fontFamily: "monospace", fontSize: 12,
              letterSpacing: "0.1em", textTransform: "uppercase",
              padding: "14px 28px", borderRadius: 6, border: "none",
              background: allAnswered ? "#1a6b3c" : "#a8a8a8",
              color: "#fff", cursor: allAnswered ? "pointer" : "not-allowed",
              fontWeight: 700,
            }}>
            {allAnswered ? "Submit Answers →" : `${totalQuestions - answeredCount} Remaining`}
          </button>
        ) : (
          <button
            onClick={handleReset}
            aria-label="Reset test and try again"
            style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "1px solid #c84b11", background: "transparent", color: "#c84b11", cursor: "pointer", fontWeight: 700 }}>
            ↻ Reset & Retake
          </button>
        )}
      </div>
    </div>
  );
}

// Helper: escape text for safe SVG embedding
function escapeXml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function LessonView({ lesson, lessonIdx, totalLessons, onPrev, onNext, isCompleted, isComfortable }) {
  // Scale typography and spacing based on display mode
  const pFont     = isComfortable ? 17 : 15;
  const pSpacing  = isComfortable ? 18 : 16;
  const h3Font    = isComfortable ? 22 : 19;
  const h3Margin  = isComfortable ? "32px 0 12px" : "28px 0 10px";
  const subFont   = isComfortable ? 18 : 16;
  const maxW      = isComfortable ? 1040 : 780;
  const pad       = isComfortable ? "56px 56px 96px" : "40px 36px 80px";

  const renderBlock = (block, i) => {
    switch (block.type) {
      case "p": return <p key={i} style={{ fontSize: pFont, lineHeight: 1.7, marginBottom: pSpacing, color: "#2a2018" }}>{block.text}</p>;
      case "h3": return (
        <h3 key={i} style={{ fontSize: h3Font, fontWeight: 600, margin: h3Margin, display: "flex", alignItems: "center", gap: 10, color: "#1a1208" }}>
          <span style={{ width: 3, height: h3Font + 1, background: "#c84b11", borderRadius: 2, flexShrink: 0, display: "inline-block" }} />
          {block.text}
        </h3>
      );
      case "callout": return <Callout key={i} variant={block.variant} label={block.label} text={block.text} isComfortable={isComfortable} />;
      case "grid": return <ConceptGrid key={i} items={block.items} isComfortable={isComfortable} />;
      default: return null;
    }
  };

  return (
    <div style={{ maxWidth: maxW, margin: "0 auto", padding: pad, width: "100%" }}>
      <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.18em", color: "#7a6e5f", textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ background: lesson.phaseColor, color: "#fff", padding: "2px 8px", borderRadius: 3, fontSize: 9 }}>{lesson.phase}</span>
        <span>Lesson {lessonIdx + 1} of {totalLessons}</span>
        <span style={{ color: "#c8bfaa" }}>·</span>
        <span>{lesson.type}</span>
        {isCompleted && <span style={{ color: "#1a6b3c", marginLeft: "auto" }}>✓ Completed</span>}
      </div>

      <h1 style={{ fontSize: isComfortable ? "clamp(32px,3.5vw,48px)" : "clamp(26px,3.5vw,40px)", fontWeight: 700, lineHeight: 1.1, letterSpacing: "-0.02em", marginBottom: 8, color: "#1a1208" }}>{lesson.title}</h1>
      <p style={{ fontSize: subFont, fontWeight: 300, fontStyle: "italic", color: "#7a6e5f", marginBottom: 20, lineHeight: 1.55 }}>{lesson.subtitle}</p>

      <div style={{ display: "flex", gap: 16, marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid #c8bfaa" }}>
        <span style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f" }}>⏱ {lesson.time}</span>
      </div>

      <VideoEmbed video={lesson.video} />

      {lesson.content.map((block, i) => renderBlock(block, i))}

      <QuizSet key={lessonIdx} quizzes={lesson.quizzes} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 24, borderTop: "1px solid #c8bfaa" }}>
        <button onClick={onPrev} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "1px solid #c8bfaa", background: "transparent", cursor: "pointer", color: "#7a6e5f" }}>
          {lessonIdx > 0 ? "← Prev Lesson" : "← Home"}
        </button>
        {isCompleted && <span style={{ fontFamily: "monospace", fontSize: 10, color: "#1a6b3c" }}>✓ Completed</span>}
        <button onClick={onNext} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "none", background: "#1a1208", color: "#f5f0e8", cursor: "pointer" }}>
          {lessonIdx < totalLessons - 1 ? "Mark Complete & Continue →" : "Complete & Take Final Exam →"}
        </button>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────
function CourseApp() {
  const [currentLesson, setCurrentLesson] = useState(-1);
  const [completed, setCompleted] = useState(new Set());
  const [storageReady, setStorageReady] = useState(false);
  const [storageError, setStorageError] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  // Display mode: 'auto' (detect), 'compact' (mobile-sized), 'comfortable' (desktop-scaled)
  const [displayModePref, setDisplayModePref] = useState("auto");
  const [autoDetectedMode, setAutoDetectedMode] = useState("compact");
  // Incremented on reset — used as part of view keys to force full remount
  // (clears local state in LessonView, FinalExamView, QuizSet, etc.)
  const [resetToken, setResetToken] = useState(0);
  // Shows in-app reset confirmation modal (window.confirm is unreliable in sandboxed iframes)
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  // Auto-detect display mode based on viewport width and pointer type.
  // Desktop with mouse + wide screen = comfortable (larger type, more padding).
  // Mobile/tablet or narrow screen = compact (current sizing).
  useEffect(() => {
    const detect = () => {
      const isWide = window.innerWidth >= 900;
      const hasFinePointer = window.matchMedia("(pointer: fine)").matches;
      setAutoDetectedMode(isWide && hasFinePointer ? "comfortable" : "compact");
    };
    detect();
    window.addEventListener("resize", detect);
    const mq = window.matchMedia("(pointer: fine)");
    if (mq.addEventListener) mq.addEventListener("change", detect);
    return () => {
      window.removeEventListener("resize", detect);
      if (mq.removeEventListener) mq.removeEventListener("change", detect);
    };
  }, []);

  // Resolve the active display mode (user override wins over auto-detect)
  const displayMode = displayModePref === "auto" ? autoDetectedMode : displayModePref;
  const isComfortable = displayMode === "comfortable";

  // Inject global styles once for active/focus states (touch-friendly) and
  // accessibility-focused keyboard outlines
  useEffect(() => {
    const id = "ai-course-globals";
    if (document.getElementById(id)) return;
    const el = document.createElement("style");
    el.id = id;
    el.textContent = `
      .play-btn:active { transform: scale(0.96); box-shadow: 0 4px 18px rgba(200,75,17,0.45); }
      @media (hover: hover) {
        .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 40px rgba(200,75,17,0.75); }
      }
      *:focus-visible { outline: 2px solid #e8a87c; outline-offset: 2px; border-radius: 4px; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    `;
    document.head.appendChild(el);
    return () => { const s = document.getElementById(id); if (s) s.remove(); };
  }, []);

  // Load saved progress on mount
  useEffect(() => {
    try {
      const raw = localStorage.getItem("ai-course-progress");
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.completed && Array.isArray(saved.completed)) {
          setCompleted(new Set(saved.completed));
        }
        if (typeof saved.currentLesson === "number") {
          setCurrentLesson(saved.currentLesson);
        }
        if (typeof saved.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(saved.sidebarCollapsed);
        }
        if (saved.displayModePref === "auto" || saved.displayModePref === "compact" || saved.displayModePref === "comfortable") {
          setDisplayModePref(saved.displayModePref);
        }
      }
    } catch (e) { setStorageError(true); }
    setStorageReady(true);
  }, []);

  // Save progress whenever completed lessons, current lesson, or sidebar state changes
  useEffect(() => {
    if (!storageReady) return;
    try {
      localStorage.setItem("ai-course-progress", JSON.stringify({
        completed: [...completed],
        currentLesson,
        sidebarCollapsed,
        displayModePref,
      }));
      if (storageError) setStorageError(false);
    } catch (e) {
      setStorageError(true);
    }
  }, [completed, currentLesson, sidebarCollapsed, displayModePref, storageReady, storageError]);

  const progressPct = Math.round((completed.size / LESSONS.length) * 100);
  const goTo = (idx) => { setCurrentLesson(idx); window.scrollTo(0, 0); };
  const goHome = () => setCurrentLesson(-1);
  const handleNext = (idx) => {
    setCompleted(prev => new Set([...prev, idx]));
    if (idx < LESSONS.length - 1) goTo(idx + 1);
    else goTo(-3); // After last lesson, go to Final Exam
  };

  // Export current progress as a downloadable JSON file
  const exportProgress = () => {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      app: "AI Mastery for Aerospace",
      data: {
        completed: [...completed].sort((a, b) => a - b),
        currentLesson,
        sidebarCollapsed,
        displayModePref,
      },
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const datestamp = new Date().toISOString().slice(0, 10);
    a.download = `ai-course-progress-${datestamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Import progress from a JSON file selected by the user
  const importProgress = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.data || parsed; // allow flat or wrapped shape

        // Validate
        if (!data || typeof data !== "object") throw new Error("Invalid file format");
        if (!Array.isArray(data.completed)) throw new Error("Missing 'completed' array");

        // Filter completed to valid lesson indices
        const validCompleted = data.completed.filter(n =>
          Number.isInteger(n) && n >= 0 && n < LESSONS.length
        );

        // Summarize what will be imported for the confirm dialog
        const msg =
          `Import progress?\n\n` +
          `• ${validCompleted.length} of ${LESSONS.length} lessons will be marked complete\n` +
          `• Display preferences will be restored\n\n` +
          `This will REPLACE your current progress. Continue?`;

        if (!window.confirm(msg)) return;

        setCompleted(new Set(validCompleted));
        if (typeof data.currentLesson === "number" &&
            ((data.currentLesson >= 0 && data.currentLesson < LESSONS.length) ||
             data.currentLesson === -1 || data.currentLesson === -2 || data.currentLesson === -3)) {
          setCurrentLesson(data.currentLesson);
        } else {
          setCurrentLesson(-1);
        }
        if (typeof data.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(data.sidebarCollapsed);
        }
        if (data.displayModePref === "auto" || data.displayModePref === "compact" || data.displayModePref === "comfortable") {
          setDisplayModePref(data.displayModePref);
        }
        window.alert(`✓ Progress imported successfully.\n${validCompleted.length} of ${LESSONS.length} lessons restored.`);
      } catch (err) {
        window.alert(`Import failed: ${err.message || "invalid JSON file"}`);
      }
    };
    reader.onerror = () => window.alert("Could not read the file. Please try again.");
    reader.readAsText(file);
  };

  // Reset all progress — wipes state AND local storage, then force-remounts views
  // by bumping resetToken so lesson/exam/quiz local state clears too.
  // Uses an in-app modal rather than window.confirm because sandboxed iframes
  // (artifact previews, some embedded contexts) block native confirm dialogs.
  const requestReset = () => {
    setShowResetConfirm(true);
  };

  const confirmReset = () => {
    try { localStorage.removeItem("ai-course-progress"); } catch(e) {}
    setCompleted(new Set());
    setCurrentLesson(-1);
    setSidebarCollapsed(false);
    setDisplayModePref("auto");
    setResetToken(t => t + 1);
    setShowResetConfirm(false);
    window.scrollTo(0, 0);
  };

  // Keyboard shortcuts: arrow keys to navigate lessons, Esc to go home or close modal
  useEffect(() => {
    const onKey = (e) => {
      // If reset modal is open, Esc closes it (and nothing else does)
      if (showResetConfirm) {
        if (e.key === "Escape") {
          setShowResetConfirm(false);
          e.preventDefault();
        }
        return;
      }
      // Don't intercept when typing in inputs or when modifier keys held
      if (e.target.matches && e.target.matches("input, textarea, button, a")) {
        // Still allow Escape from buttons/links
        if (e.key !== "Escape") return;
      }
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (currentLesson >= 0 && currentLesson < LESSONS.length) {
        if (e.key === "ArrowLeft") {
          if (currentLesson > 0) goTo(currentLesson - 1); else goHome();
          e.preventDefault();
        } else if (e.key === "ArrowRight") {
          handleNext(currentLesson);
          e.preventDefault();
        } else if (e.key === "Escape") {
          goHome();
          e.preventDefault();
        }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [currentLesson, showResetConfirm]);

  // Derive phase groups from lesson data itself (not hardcoded indices)
  // so adding/removing lessons doesn't break the sidebar
  const phaseGroups = (() => {
    const groups = [];
    const labelFor = { "Phase 1": "Phase 1 · Foundation", "Phase 2": "Phase 2 · Build", "Phase 3": "Phase 3 · Agentic", "Phase 4": "Phase 4 · Industry" };
    LESSONS.forEach((l, i) => {
      const last = groups[groups.length - 1];
      if (last && last.phase === l.phase) { last.indices.push(i); }
      else { groups.push({ phase: l.phase, label: labelFor[l.phase] || l.phase, indices: [i] }); }
    });
    return groups;
  })();

  return (
    <div style={{ display: "flex", fontFamily: "Georgia, serif", background: "#f5f0e8", color: "#1a1208", minHeight: "100dvh" }}>

      {/* SIDEBAR */}
      <nav aria-label="Course navigation"
        style={{
          width: sidebarCollapsed ? 44 : 260,
          minWidth: sidebarCollapsed ? 44 : 260,
          background: "#1a1208", color: "#f5f0e8",
          display: "flex", flexDirection: "column",
          height: "100dvh", overflowY: "auto", flexShrink: 0,
          position: "sticky", top: 0,
          transition: "width 0.2s ease, min-width 0.2s ease",
          borderRight: "1px solid rgba(255,255,255,0.08)",
        }}>

        {sidebarCollapsed ? (
          /* ── COLLAPSED RAIL ─────────────────────────────────────────── */
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "14px 0", gap: 14 }}>
            {/* Expand button */}
            <button
              onClick={() => setSidebarCollapsed(false)}
              aria-label="Expand sidebar"
              aria-expanded="false"
              title="Expand lesson list"
              style={{ background: "rgba(232,168,124,0.1)", border: "1px solid rgba(232,168,124,0.25)", borderRadius: 6, color: "#e8a87c", cursor: "pointer", padding: "6px 8px", fontFamily: "monospace", fontSize: 14, lineHeight: 1 }}>
              ›
            </button>

            {/* Home button */}
            <button
              onClick={goHome}
              aria-label="Course home"
              title="Course home"
              style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.6)", cursor: "pointer", padding: "6px 8px", fontSize: 13, lineHeight: 1 }}>
              ⌂
            </button>

            {/* Vertical progress indicator */}
            <div
              role="progressbar"
              aria-label="Course completion progress"
              aria-valuenow={progressPct} aria-valuemin={0} aria-valuemax={100}
              title={`${progressPct}% complete`}
              style={{ width: 4, height: 80, background: "rgba(255,255,255,0.1)", borderRadius: 2, overflow: "hidden", position: "relative" }}>
              <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${progressPct}%`, background: "#e8a87c", transition: "height 0.5s ease" }} />
            </div>
            <div style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.4)", writingMode: "vertical-rl", transform: "rotate(180deg)", letterSpacing: "0.12em" }}>
              {completed.size}/{LESSONS.length}
            </div>

            {/* Lesson dots — compact vertical list */}
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 8 }}>
              {LESSONS.map((l, idx) => {
                const isActive = currentLesson === idx;
                const isDone = completed.has(idx);
                return (
                  <button
                    key={idx}
                    onClick={() => goTo(idx)}
                    aria-label={`Lesson ${idx + 1}: ${l.title}${isDone ? " (completed)" : ""}${isActive ? " (current)" : ""}`}
                    aria-current={isActive ? "page" : undefined}
                    title={`Lesson ${idx + 1}: ${l.title}`}
                    style={{
                      width: 26, height: 22,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      background: isActive ? "rgba(232,168,124,0.18)" : "transparent",
                      border: `1px solid ${isActive ? "#e8a87c" : isDone ? "rgba(95,188,128,0.4)" : "rgba(255,255,255,0.1)"}`,
                      borderRadius: 4,
                      fontFamily: "monospace", fontSize: 9,
                      color: isActive ? "#e8a87c" : isDone ? "#5fbc80" : "rgba(255,255,255,0.4)",
                      cursor: "pointer", padding: 0, fontWeight: isActive ? 700 : 400,
                    }}>
                    {isDone && !isActive ? "✓" : (idx + 1)}
                  </button>
                );
              })}
            </div>

            {/* Final Exam shortcut in collapsed rail */}
            {(() => {
              const unlocked = completed.size >= LESSONS.length;
              const isActive = currentLesson === -3;
              return (
                <button
                  onClick={() => { if (unlocked) goTo(-3); }}
                  disabled={!unlocked}
                  aria-label={unlocked ? "Take the final exam" : `Final exam locked — complete all ${LESSONS.length} lessons to unlock`}
                  title={unlocked ? "Final Exam" : "Final Exam (locked)"}
                  style={{
                    width: 26, height: 26,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    marginTop: 4,
                    background: isActive ? "rgba(232,168,124,0.2)" : "transparent",
                    border: `1px solid ${isActive ? "#e8a87c" : unlocked ? "rgba(232,168,124,0.4)" : "rgba(255,255,255,0.08)"}`,
                    borderRadius: 4,
                    fontSize: 13,
                    cursor: unlocked ? "pointer" : "not-allowed",
                    padding: 0,
                    opacity: unlocked ? 1 : 0.5,
                  }}>
                  {unlocked ? "🎓" : "🔒"}
                </button>
              );
            })()}

          </div>
        ) : (
          /* ── EXPANDED SIDEBAR ────────────────────────────────────────── */
          <>
            <div style={{ padding: "20px 18px 14px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 6 }}>
                <div style={{ cursor: "pointer", flex: 1, minWidth: 0 }} onClick={goHome}>
                  <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.18em", color: "rgba(255,255,255,0.32)", textTransform: "uppercase", marginBottom: 5 }}>Active Learning Course</div>
                  <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.25 }}>AI Mastery for <span style={{ fontStyle: "italic", color: "#e8a87c" }}>Aerospace</span></div>
                </div>
                <div style={{ flexShrink: 0 }}>
                  {/* Collapse button */}
                  <button
                    onClick={() => setSidebarCollapsed(true)}
                    aria-label="Collapse sidebar to focus on lesson content"
                    aria-expanded="true"
                    title="Collapse sidebar"
                    style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)", borderRadius: 6, color: "rgba(255,255,255,0.65)", cursor: "pointer", padding: "4px 8px", lineHeight: 1, fontFamily: "monospace", fontSize: 13 }}>
                    ‹
                  </button>
                </div>
              </div>
            </div>

            <div style={{ padding: "12px 18px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.32)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 7 }}>
                <span>Progress</span><span>{progressPct}%</span>
              </div>
              <div role="progressbar" aria-label="Course completion progress"
                   aria-valuenow={progressPct} aria-valuemin={0} aria-valuemax={100}
                   style={{ height: 4, background: "rgba(255,255,255,0.1)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", background: "#e8a87c", width: `${progressPct}%`, borderRadius: 2, transition: "width 0.5s ease" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 5 }}>
                <div style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.22)" }}>{completed.size} of {LESSONS.length} complete</div>
                {completed.size > 0 && (
                  <button onClick={requestReset}
                  aria-label="Reset all course progress"
                  style={{ fontFamily: "monospace", fontSize: 8, letterSpacing: "0.08em", textTransform: "uppercase", padding: "2px 6px", background: "transparent", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 3, color: "rgba(255,255,255,0.3)", cursor: "pointer" }}>
                    Reset
                  </button>
                )}
              </div>
              {storageError && (
                <div role="alert" style={{ marginTop: 10, padding: "6px 8px", background: "rgba(200,75,17,0.15)", border: "1px solid rgba(200,75,17,0.4)", borderRadius: 4, fontFamily: "monospace", fontSize: 9, color: "#e8a87c", lineHeight: 1.4 }}>
                  ⚠ Progress not saving. Browser storage may be blocked.
                </div>
              )}
            </div>

            {/* Export / Import Progress */}
            <div style={{ padding: "12px 18px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.32)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 7 }}>
                Backup & Restore
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button
                  onClick={exportProgress}
                  aria-label="Export course progress as JSON file"
                  title="Download a JSON backup of your progress"
                  style={{
                    flex: 1,
                    padding: "7px 8px",
                    fontFamily: "monospace", fontSize: 9,
                    letterSpacing: "0.08em", textTransform: "uppercase",
                    background: "rgba(255,255,255,0.06)",
                    border: "1px solid rgba(255,255,255,0.15)",
                    borderRadius: 4,
                    color: "rgba(255,255,255,0.65)",
                    cursor: "pointer", fontWeight: 600,
                  }}>
                  ↓ Export
                </button>
                <label
                  aria-label="Import course progress from a JSON file"
                  title="Restore progress from a JSON backup"
                  style={{
                    flex: 1,
                    padding: "7px 8px",
                    fontFamily: "monospace", fontSize: 9,
                    letterSpacing: "0.08em", textTransform: "uppercase",
                    background: "rgba(255,255,255,0.06)",
                    border: "1px solid rgba(255,255,255,0.15)",
                    borderRadius: 4,
                    color: "rgba(255,255,255,0.65)",
                    cursor: "pointer", fontWeight: 600,
                    textAlign: "center",
                    display: "block",
                  }}>
                  ↑ Import
                  <input
                    type="file"
                    accept=".json,application/json"
                    onChange={(e) => {
                      const file = e.target.files && e.target.files[0];
                      importProgress(file);
                      // Reset the input so re-selecting the same file works
                      e.target.value = "";
                    }}
                    style={{ display: "none" }}
                  />
                </label>
              </div>
              <div style={{ fontFamily: "monospace", fontSize: 8, color: "rgba(255,255,255,0.28)", marginTop: 6, letterSpacing: "0.06em", lineHeight: 1.4 }}>
                Move progress between devices or keep a backup before resetting.
              </div>
            </div>

            {/* Display mode selector — Auto / Compact / Comfortable */}
            <div style={{ padding: "12px 18px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.32)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 7 }}>
                Display Size
              </div>
              <div role="radiogroup" aria-label="Display size preference" style={{ display: "flex", gap: 4, background: "rgba(0,0,0,0.25)", borderRadius: 6, padding: 3 }}>
                {[
                  { key: "auto",        label: "Auto",    title: "Detect automatically based on screen size" },
                  { key: "compact",     label: "Compact", title: "Force mobile-sized layout" },
                  { key: "comfortable", label: "Wide",    title: "Force desktop-sized larger layout" },
                ].map(opt => {
                  const selected = displayModePref === opt.key;
                  return (
                    <button
                      key={opt.key}
                      role="radio"
                      aria-checked={selected}
                      title={opt.title}
                      onClick={() => setDisplayModePref(opt.key)}
                      style={{
                        flex: 1,
                        padding: "5px 6px",
                        fontFamily: "monospace", fontSize: 9,
                        letterSpacing: "0.08em", textTransform: "uppercase",
                        borderRadius: 4,
                        border: "none",
                        cursor: "pointer",
                        transition: "background 0.15s, color 0.15s",
                        background: selected ? "#e8a87c" : "transparent",
                        color: selected ? "#1a1208" : "rgba(255,255,255,0.55)",
                        fontWeight: selected ? 700 : 400,
                      }}>
                      {opt.label}
                    </button>
                  );
                })}
              </div>
              {displayModePref === "auto" && (
                <div style={{ fontFamily: "monospace", fontSize: 8, color: "rgba(255,255,255,0.3)", marginTop: 5, letterSpacing: "0.06em" }}>
                  Detected: {autoDetectedMode === "comfortable" ? "Wide (desktop)" : "Compact (mobile)"}
                </div>
              )}
            </div>

            {phaseGroups.map((group, gi) => (
              <div key={gi} style={{ padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.14em", color: "rgba(255,255,255,0.26)", textTransform: "uppercase", padding: "2px 18px 6px" }}>{group.label}</div>
                {group.indices.map(idx => {
                  const l = LESSONS[idx];
                  const isActive = currentLesson === idx;
                  const isDone = completed.has(idx);
                  return (
                    <div key={idx} onClick={() => goTo(idx)}
                      role="button" tabIndex={0}
                      aria-label={`Lesson ${idx + 1}: ${l.title}${isDone ? " (completed)" : ""}${isActive ? " (current)" : ""}`}
                      aria-current={isActive ? "page" : undefined}
                      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goTo(idx); } }}
                      style={{ padding: "7px 18px", display: "flex", alignItems: "center", gap: 8, cursor: "pointer", borderLeft: `3px solid ${isActive ? "#e8a87c" : "transparent"}`, background: isActive ? "rgba(232,168,124,0.1)" : "transparent", color: isActive ? "#e8a87c" : isDone ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.58)", fontSize: 12, fontWeight: isActive ? 600 : 300, transition: "all 0.15s" }}>
                      <span style={{ fontFamily: "monospace", fontSize: 9, color: isActive ? "#e8a87c" : "rgba(255,255,255,0.2)", minWidth: 20, flexShrink: 0 }}>{(idx + 1).toString().padStart(2, "0")}</span>
                      <span style={{ flex: 1, lineHeight: 1.3 }}>{l.title}</span>
                      {isDone && <span aria-hidden="true" style={{ color: "#5fbc80", fontSize: 10, flexShrink: 0 }}>✓</span>}
                    </div>
                  );
                })}
              </div>
            ))}

            {/* Final Exam entry — unlocked once all lessons completed */}
            <div style={{ padding: "8px 0" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.14em", color: "rgba(232,168,124,0.6)", textTransform: "uppercase", padding: "2px 18px 6px" }}>Final Assessment</div>
              {(() => {
                const unlocked = completed.size >= LESSONS.length;
                const isActive = currentLesson === -3;
                return (
                  <div
                    onClick={() => { if (unlocked) goTo(-3); }}
                    role="button"
                    tabIndex={unlocked ? 0 : -1}
                    aria-label={unlocked ? "Take the final exam" : `Final exam locked — complete all ${LESSONS.length} lessons to unlock`}
                    aria-disabled={!unlocked}
                    aria-current={isActive ? "page" : undefined}
                    onKeyDown={(e) => { if (unlocked && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); goTo(-3); } }}
                    style={{
                      padding: "10px 18px",
                      display: "flex", alignItems: "center", gap: 8,
                      cursor: unlocked ? "pointer" : "not-allowed",
                      borderLeft: `3px solid ${isActive ? "#e8a87c" : "transparent"}`,
                      background: isActive ? "rgba(232,168,124,0.12)" : "transparent",
                      color: isActive ? "#e8a87c" : unlocked ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.3)",
                      fontSize: 12, fontWeight: isActive ? 700 : 500,
                      transition: "all 0.15s",
                      opacity: unlocked ? 1 : 0.6,
                    }}>
                    <span style={{ fontSize: 14, flexShrink: 0 }} aria-hidden="true">{unlocked ? "🎓" : "🔒"}</span>
                    <span style={{ flex: 1, lineHeight: 1.3 }}>
                      Final Exam
                      <div style={{ fontSize: 9, fontFamily: "monospace", color: "rgba(255,255,255,0.35)", letterSpacing: "0.08em", marginTop: 1 }}>
                        25 questions · 85% to pass
                      </div>
                    </span>
                  </div>
                );
              })()}
            </div>
          </>
        )}
      </nav>

      {/* MAIN */}
      <main aria-label="Lesson content" style={{ flex: 1, overflowY: "auto", height: "100dvh" }}>
        {currentLesson === -1 && (
          <div style={{ maxWidth: isComfortable ? 820 : 620, margin: "0 auto", padding: isComfortable ? "80px 40px" : "60px 32px", textAlign: "center" }}>
            <div style={{ fontSize: 58, marginBottom: 18 }}>✈️</div>
            <h1 style={{ fontSize: "clamp(28px,5vw,44px)", fontWeight: 700, letterSpacing: "-0.03em", marginBottom: 10 }}>
              Welcome to Your <span style={{ fontStyle: "italic", color: "#c84b11" }}>AI Mastery</span> Course
            </h1>
            <p style={{ fontSize: 15, fontWeight: 300, color: "#7a6e5f", lineHeight: 1.78, marginBottom: 28 }}>
              An interactive learning experience built for aerospace manufacturing professionals. Each lesson combines curated videos, written content with aerospace manufacturing examples, and knowledge-check quizzes with immediate feedback.
            </p>
            <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 28, padding: 20, background: "#ede7d6", borderRadius: 12, border: "1px solid #c8bfaa", flexWrap: "wrap" }}>
              {[["14", "Lessons"], ["4", "Phases"], ["~6", "Months"], ["3+", "Quizzes/Lesson"]].map(([val, label]) => (
                <div key={label} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 70 }}>
                  <span style={{ fontSize: 24, fontWeight: 700 }}>{val}</span>
                  <span style={{ fontFamily: "monospace", fontSize: 9, color: "#7a6e5f", letterSpacing: "0.12em", textTransform: "uppercase" }}>{label}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "#ede7d6", border: "1px solid #c8bfaa", borderRadius: 10, padding: "14px 20px", marginBottom: 28, textAlign: "left", fontSize: 13, lineHeight: 1.8, color: "#2a2018" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#7a6e5f", marginBottom: 8 }}>Each lesson includes</div>
              📹 Curated video from a top AI educator · 📖 Written content with aerospace examples · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts for manufacturing applications
            </div>
            {completed.size > 0 && (
              <div style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f", marginBottom: 14 }}>
                You have completed {completed.size} of {LESSONS.length} lessons — pick up where you left off.
              </div>
            )}
            <button onClick={() => {
                if (completed.size === 0) { goTo(0); return; }
                if (completed.size >= LESSONS.length) { goTo(-2); return; }
                // Find the first incomplete lesson
                const firstIncomplete = LESSONS.findIndex((_, i) => !completed.has(i));
                goTo(firstIncomplete >= 0 ? firstIncomplete : 0);
              }}
              aria-label={completed.size > 0 ? "Continue course from where you left off" : "Begin the course"}
              style={{ fontFamily: "monospace", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", padding: "14px 40px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 8, cursor: "pointer" }}>
              {completed.size >= LESSONS.length ? "See Course Summary →" : completed.size > 0 ? "Continue Course →" : "Begin Course →"}
            </button>
          </div>
        )}

        {currentLesson === -3 && (
          <FinalExamView
            key={`exam-${resetToken}`}
            onExit={goHome}
            isComfortable={isComfortable}
          />
        )}

        {currentLesson === -2 && (
          <div style={{ maxWidth: isComfortable ? 760 : 600, margin: "0 auto", padding: isComfortable ? "80px 40px" : "64px 32px", textAlign: "center" }}>
            <div style={{ fontSize: 70, marginBottom: 18 }}>🎓</div>
            <h1 style={{ fontSize: 40, fontWeight: 700, letterSpacing: "-0.03em", marginBottom: 10 }}>Course Complete!</h1>
            <p style={{ fontSize: 15, fontWeight: 300, color: "#7a6e5f", lineHeight: 1.78, marginBottom: 28 }}>
              You have completed all 14 lessons across 4 phases. You now have the knowledge to build real AI applications for aerospace manufacturing and the business acumen to deploy them responsibly.
            </p>
            <div style={{ background: "#ede7d6", border: "1px solid #c8bfaa", borderRadius: 12, padding: 24, textAlign: "left", marginBottom: 24 }}>
              <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.14em", color: "#7a6e5f", textTransform: "uppercase", marginBottom: 12 }}>Your next steps</div>
              <div style={{ fontSize: 14, lineHeight: 2.0, color: "#2a2018" }}>
                → Pick your top AI use case from your Lesson 12 (Aerospace Use Cases) analysis<br/>
                → Complete the one-page business case template from Lesson 14 (Business Case)<br/>
                → Set up your Windows dev environment if you have not yet<br/>
                → Build a working prototype of your top priority use case<br/>
                → Schedule 30 minutes with your manager to present the opportunity
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => goTo(-3)} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 28px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>Take Final Exam →</button>
              <button onClick={goHome} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 28px", background: "transparent", color: "#7a6e5f", border: "1px solid #c8bfaa", borderRadius: 6, cursor: "pointer" }}>← Course Home</button>
            </div>
          </div>
        )}

        {currentLesson >= 0 && currentLesson < LESSONS.length && (
          <LessonView
            key={`lesson-${currentLesson}-${resetToken}`}
            lesson={LESSONS[currentLesson]}
            lessonIdx={currentLesson}
            totalLessons={LESSONS.length}
            isCompleted={completed.has(currentLesson)}
            isComfortable={isComfortable}
            onPrev={() => currentLesson > 0 ? goTo(currentLesson - 1) : goHome()}
            onNext={() => handleNext(currentLesson)}
          />
        )}
      </main>

      {/* Reset confirmation modal — in-app, works in sandboxed iframes */}
      {showResetConfirm && (
        <div
          role="dialog"
          aria-modal="true"
          aria-labelledby="reset-modal-title"
          onClick={() => setShowResetConfirm(false)}
          style={{
            position: "fixed", inset: 0, zIndex: 99999,
            background: "rgba(26,18,8,0.72)",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 20,
            backdropFilter: "blur(3px)",
            WebkitBackdropFilter: "blur(3px)",
          }}>
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              maxWidth: 440, width: "100%",
              background: "#f5f0e8",
              borderRadius: 12,
              padding: "28px 28px 22px",
              boxShadow: "0 20px 60px rgba(0,0,0,0.5)",
              border: "1px solid #c8bfaa",
            }}>
            <h2 id="reset-modal-title" style={{ fontSize: 22, fontWeight: 700, color: "#1a1208", margin: "0 0 10px", letterSpacing: "-0.01em" }}>
              Reset all progress?
            </h2>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: "#5a4e3f", margin: "0 0 22px" }}>
              This will clear your completed lessons, quiz answers, any final exam attempt in progress, and your display preferences. This cannot be undone.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", flexWrap: "wrap" }}>
              <button
                onClick={() => setShowResetConfirm(false)}
                autoFocus
                aria-label="Cancel reset"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "transparent", color: "#7a6e5f",
                  border: "1px solid #c8bfaa", borderRadius: 6,
                  cursor: "pointer",
                }}>
                Cancel
              </button>
              <button
                onClick={confirmReset}
                aria-label="Confirm reset — clear all progress"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "#c84b11", color: "#f5f0e8",
                  border: "none", borderRadius: 6,
                  cursor: "pointer", fontWeight: 700,
                }}>
                Yes, Reset
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ERROR BOUNDARY ────────────────────────────────────────────────────────────
// Catches any render error inside the course app and shows a recovery screen
// instead of a blank white page. Users can reset progress and reload if the
// error was caused by corrupted saved state.
class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, errorMsg: error?.message || "Unknown error" };
  }
  componentDidCatch(error, info) {
    // Log to console for debugging — silent in production would be fine too
    console.error("Course app crashed:", error, info);
  }
  handleReset = () => {
    try { localStorage.removeItem("ai-course-progress"); } catch (e) {}
    window.location.reload();
  };
  handleReload = () => {
    window.location.reload();
  };
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <div role="alert" style={{
        minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center",
        padding: 24, fontFamily: "Georgia, serif", background: "#f5f0e8", color: "#1a1208",
      }}>
        <div style={{ maxWidth: 500, textAlign: "center" }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>⚠️</div>
          <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 10, color: "#1a1208" }}>
            Something went wrong
          </h1>
          <p style={{ fontSize: 14, color: "#7a6e5f", lineHeight: 1.6, marginBottom: 20 }}>
            The course hit an unexpected error. Your saved progress is probably fine — try reloading first. If that doesn't help, resetting will clear saved data and start you fresh.
          </p>
          <div style={{ fontFamily: "monospace", fontSize: 11, color: "#8b2020", background: "#fef3e2", border: "1px solid #c84b11", borderRadius: 6, padding: "10px 14px", marginBottom: 20, textAlign: "left", wordBreak: "break-word" }}>
            {this.state.errorMsg}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={this.handleReload}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 6, cursor: "pointer" }}>
              Reload Page
            </button>
            <button onClick={this.handleReset}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "transparent", color: "#7a6e5f", border: "1px solid #c8bfaa", borderRadius: 6, cursor: "pointer" }}>
              Reset Progress & Reload
            </button>
          </div>
        </div>
      </div>
    );
  }
}

function App() {
  return (
    <ErrorBoundary>
      <CourseApp />
    </ErrorBoundary>
  );
}


// ─── MOUNT ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
