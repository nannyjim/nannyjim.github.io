// Fisher-Yates shuffle — returns a new shuffled copy of an array
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Fisher-Yates shuffle for option text that also returns the new index of the originally-correct answer
function shuffleOptions(options) {
  const indexed = options.map((text, origIdx) => ({ text, origIdx }));
  const shuffled = shuffleArray(indexed);
  const newCorrectIdx = shuffled.findIndex(x => x.origIdx === 0);
  return { shuffled: shuffled.map(x => x.text), correctIdx: newCorrectIdx };
}

// Build a fresh 25-question exam attempt using stratified sampling:
// proportionally pull questions from each phase pool, then shuffle the overall order
// and randomize option order per question.
function buildExamAttempt(pool) {
  const EXAM_SIZE = 25;
  const phases = ["P1", "P2", "P3", "P4"];

  // Group pool by phase
  const byPhase = {};
  phases.forEach(p => { byPhase[p] = pool.filter(q => q.phase === p); });

  // Allocate question count per phase (proportional to pool sizes)
  const totalPool = pool.length;
  const allocations = {};
  let allocated = 0;
  phases.forEach((p, i) => {
    if (i === phases.length - 1) {
      allocations[p] = EXAM_SIZE - allocated;
    } else {
      const share = Math.round((byPhase[p].length / totalPool) * EXAM_SIZE);
      allocations[p] = Math.min(share, byPhase[p].length);
      allocated += allocations[p];
    }
  });

  // Pull randomized questions from each phase
  const selected = [];
  phases.forEach(p => {
    const shuffledPool = shuffleArray(byPhase[p]);
    selected.push(...shuffledPool.slice(0, allocations[p]));
  });

  // Shuffle the final order so phases are mixed
  const ordered = shuffleArray(selected);

  // Build attempt with per-question option shuffling
  return ordered.map((item, i) => {
    const { shuffled, correctIdx } = shuffleOptions(item.options);
    return { id: i, phase: item.phase, q: item.q, options: shuffled, correctIdx };
  });
}

// Helper: escape text for safe SVG embedding
function escapeXml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function LessonView({ lesson, lessonIdx, totalLessons, onPrev, onNext, isCompleted, isComfortable }) {
  // Scale typography and spacing based on display mode
  const pFont     = isComfortable ? 17 : 15;
  const pSpacing  = isComfortable ? 18 : 16;
  const h3Font    = isComfortable ? 22 : 19;
  const h3Margin  = isComfortable ? "32px 0 12px" : "28px 0 10px";
  const subFont   = isComfortable ? 18 : 16;
  const maxW      = isComfortable ? 1040 : 780;
  const pad       = isComfortable ? "56px 56px 96px" : "40px 36px 80px";

  const renderBlock = (block, i) => {
    switch (block.type) {
      case "p": return <p key={i} style={{ fontSize: pFont, lineHeight: 1.7, marginBottom: pSpacing, color: "#2a2018" }}>{block.text}</p>;
      case "h3": return (
        <h3 key={i} style={{ fontSize: h3Font, fontWeight: 600, margin: h3Margin, display: "flex", alignItems: "center", gap: 10, color: "#1a1208" }}>
          <span style={{ width: 3, height: h3Font + 1, background: "#c84b11", borderRadius: 2, flexShrink: 0, display: "inline-block" }} />
          {block.text}
        </h3>
      );
      case "callout": return <Callout key={i} variant={block.variant} label={block.label} text={block.text} isComfortable={isComfortable} />;
      case "grid": return <ConceptGrid key={i} items={block.items} isComfortable={isComfortable} />;
      default: return null;
    }
  };

  return (
    <div style={{ maxWidth: maxW, margin: "0 auto", padding: pad, width: "100%" }}>
      <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.18em", color: "#7a6e5f", textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ background: lesson.phaseColor, color: "#fff", padding: "2px 8px", borderRadius: 3, fontSize: 9 }}>{lesson.phase}</span>
        <span>Lesson {lessonIdx + 1} of {totalLessons}</span>
        <span style={{ color: "#c8bfaa" }}>·</span>
        <span>{lesson.type}</span>
        {isCompleted && <span style={{ color: "#1a6b3c", marginLeft: "auto" }}>✓ Completed</span>}
      </div>

      <h1 style={{ fontSize: isComfortable ? "clamp(32px,3.5vw,48px)" : "clamp(26px,3.5vw,40px)", fontWeight: 700, lineHeight: 1.1, letterSpacing: "-0.02em", marginBottom: 8, color: "#1a1208" }}>{lesson.title}</h1>
      <p style={{ fontSize: subFont, fontWeight: 300, fontStyle: "italic", color: "#7a6e5f", marginBottom: 20, lineHeight: 1.55 }}>{lesson.subtitle}</p>

      <div style={{ display: "flex", gap: 16, marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid #c8bfaa" }}>
        <span style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f" }}>⏱ {lesson.time}</span>
      </div>

      <VideoEmbed video={lesson.video} />

      {lesson.content.map((block, i) => renderBlock(block, i))}

      <QuizSet key={lessonIdx} quizzes={lesson.quizzes} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 24, borderTop: "1px solid #c8bfaa" }}>
        <button onClick={onPrev} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "1px solid #c8bfaa", background: "transparent", cursor: "pointer", color: "#7a6e5f" }}>
          {lessonIdx > 0 ? "← Prev Lesson" : "← Home"}
        </button>
        {isCompleted && <span style={{ fontFamily: "monospace", fontSize: 10, color: "#1a6b3c" }}>✓ Completed</span>}
        <button onClick={onNext} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "none", background: "#1a1208", color: "#f5f0e8", cursor: "pointer" }}>
          {lessonIdx < totalLessons - 1 ? "Mark Complete & Continue →" : "Complete & Take Final Exam →"}
        </button>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────
function CourseApp() {
  // Active track: "ai" (AI for Engineering Certificate) or "mba" (MBA Professional Certificate)
  const [currentTrack, setCurrentTrack] = useState("ai");
  const [currentLesson, setCurrentLesson] = useState(-1);
  const [completed, setCompleted] = useState(new Set());
  const [storageReady, setStorageReady] = useState(false);
  const [storageError, setStorageError] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  // Display mode: 'auto' (detect), 'compact' (mobile-sized), 'comfortable' (desktop-scaled)
  const [displayModePref, setDisplayModePref] = useState("auto");
  const [autoDetectedMode, setAutoDetectedMode] = useState("compact");
  // Incremented on reset — used as part of view keys to force full remount
  // (clears local state in LessonView, FinalExamView, QuizSet, etc.)
  const [resetToken, setResetToken] = useState(0);
  // Shows in-app reset confirmation modal (window.confirm is unreliable in sandboxed iframes)
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  // Resolve active track's data and storage key
  const LESSONS = currentTrack === "mba" ? MBA_LESSONS : AI_LESSONS;
  const FINAL_EXAM = currentTrack === "mba" ? MBA_FINAL_EXAM : AI_FINAL_EXAM;
  const storageKey = currentTrack === "mba" ? "mba-course-progress" : "ai-course-progress";
  const courseTitle = currentTrack === "mba" ? "MBA Professional Certificate" : "AI Mastery for Aerospace";
  const certificateTitle = currentTrack === "mba" ? "MBA Professional Certificate" : "AI for Engineering Certificate";
  const certificateSubtitle = currentTrack === "mba" ? "Aerospace Business Track" : "Aerospace Manufacturing Track";

  // Auto-detect display mode based on viewport width and pointer type.
  // Desktop with mouse + wide screen = comfortable (larger type, more padding).
  // Mobile/tablet or narrow screen = compact (current sizing).
  useEffect(() => {
    const detect = () => {
      const isWide = window.innerWidth >= 900;
      const hasFinePointer = window.matchMedia("(pointer: fine)").matches;
      setAutoDetectedMode(isWide && hasFinePointer ? "comfortable" : "compact");
    };
    detect();
    window.addEventListener("resize", detect);
    const mq = window.matchMedia("(pointer: fine)");
    if (mq.addEventListener) mq.addEventListener("change", detect);
    return () => {
      window.removeEventListener("resize", detect);
      if (mq.removeEventListener) mq.removeEventListener("change", detect);
    };
  }, []);

  // Resolve the active display mode (user override wins over auto-detect)
  const displayMode = displayModePref === "auto" ? autoDetectedMode : displayModePref;
  const isComfortable = displayMode === "comfortable";

  // Inject global styles once for active/focus states (touch-friendly) and
  // accessibility-focused keyboard outlines
  useEffect(() => {
    const id = "ai-course-globals";
    if (document.getElementById(id)) return;
    const el = document.createElement("style");
    el.id = id;
    el.textContent = `
      .play-btn:active { transform: scale(0.96); box-shadow: 0 4px 18px rgba(200,75,17,0.45); }
      @media (hover: hover) {
        .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 40px rgba(200,75,17,0.75); }
      }
      *:focus-visible { outline: 2px solid #e8a87c; outline-offset: 2px; border-radius: 4px; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    `;
    document.head.appendChild(el);
    return () => { const s = document.getElementById(id); if (s) s.remove(); };
  }, []);

  // Load global preferences (track, sidebar, display mode) once on mount
  useEffect(() => {
    try {
      // Global prefs (applies to both tracks)
      const rawPrefs = localStorage.getItem("course-prefs");
      if (rawPrefs) {
        const prefs = JSON.parse(rawPrefs);
        if (prefs.currentTrack === "ai" || prefs.currentTrack === "mba") {
          setCurrentTrack(prefs.currentTrack);
        }
        if (typeof prefs.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(prefs.sidebarCollapsed);
        }
        if (prefs.displayModePref === "auto" || prefs.displayModePref === "compact" || prefs.displayModePref === "comfortable") {
          setDisplayModePref(prefs.displayModePref);
        }
      }
    } catch (e) { setStorageError(true); }
    setStorageReady(true);
  }, []);

  // Whenever the active track changes (including the initial resolved track), load that track's progress
  useEffect(() => {
    if (!storageReady) return;
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) {
        const saved = JSON.parse(raw);
        setCompleted(new Set(
          Array.isArray(saved.completed)
            ? saved.completed.filter(n => Number.isInteger(n) && n >= 0 && n < LESSONS.length)
            : []
        ));
        if (typeof saved.currentLesson === "number") {
          setCurrentLesson(saved.currentLesson);
        } else {
          setCurrentLesson(-1);
        }
      } else {
        // No saved progress for this track — start fresh
        setCompleted(new Set());
        setCurrentLesson(-1);
      }
    } catch (e) { setStorageError(true); }
    // Bump resetToken so any lingering child view state is cleared on track switch
    setResetToken(t => t + 1);
  }, [currentTrack, storageReady]);

  // Save per-track progress whenever completed/currentLesson changes
  useEffect(() => {
    if (!storageReady) return;
    try {
      localStorage.setItem(storageKey, JSON.stringify({
        completed: [...completed],
        currentLesson,
      }));
      if (storageError) setStorageError(false);
    } catch (e) {
      setStorageError(true);
    }
  }, [completed, currentLesson, storageKey, storageReady, storageError]);

  // Save global prefs (track selection, sidebar, display mode) separately
  useEffect(() => {
    if (!storageReady) return;
    try {
      localStorage.setItem("course-prefs", JSON.stringify({
        currentTrack,
        sidebarCollapsed,
        displayModePref,
      }));
    } catch (e) { /* ignore */ }
  }, [currentTrack, sidebarCollapsed, displayModePref, storageReady]);

  const progressPct = Math.round((completed.size / LESSONS.length) * 100);
  const goTo = (idx) => { setCurrentLesson(idx); window.scrollTo(0, 0); };
  const goHome = () => setCurrentLesson(-1);
  const handleNext = (idx) => {
    setCompleted(prev => new Set([...prev, idx]));
    if (idx < LESSONS.length - 1) goTo(idx + 1);
    else goTo(-3); // After last lesson, go to Final Exam
  };

  // Export current progress as a downloadable JSON file
  const exportProgress = () => {
    const payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      app: courseTitle,
      track: currentTrack,
      data: {
        completed: [...completed].sort((a, b) => a - b),
        currentLesson,
        sidebarCollapsed,
        displayModePref,
      },
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const datestamp = new Date().toISOString().slice(0, 10);
    a.download = `${currentTrack}-course-progress-${datestamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Import progress from a JSON file selected by the user
  const importProgress = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.data || parsed;
        const fileTrack = parsed.track || "ai"; // default to ai for old v1 exports

        // Validate
        if (!data || typeof data !== "object") throw new Error("Invalid file format");
        if (!Array.isArray(data.completed)) throw new Error("Missing 'completed' array");

        // Determine the active-track lesson count for validation
        const targetLessonCount = fileTrack === "mba" ? MBA_LESSONS.length : AI_LESSONS.length;
        const targetTrackName = fileTrack === "mba" ? "MBA" : "AI";

        // Filter completed to valid lesson indices for the target track
        const validCompleted = data.completed.filter(n =>
          Number.isInteger(n) && n >= 0 && n < targetLessonCount
        );

        // Summarize what will be imported for the confirm dialog
        const willSwitchTrack = fileTrack !== currentTrack;
        const msg =
          `Import progress?\n\n` +
          `• Track: ${targetTrackName}${willSwitchTrack ? " (will switch from current track)" : ""}\n` +
          `• ${validCompleted.length} of ${targetLessonCount} lessons will be marked complete\n` +
          `• Display preferences will be restored\n\n` +
          `This will REPLACE the ${targetTrackName} track's current progress. Continue?`;

        if (!window.confirm(msg)) return;

        // Switch track if needed (will trigger load from that track's key; we'll overwrite below)
        if (willSwitchTrack) {
          setCurrentTrack(fileTrack);
        }

        // Apply imported data
        setCompleted(new Set(validCompleted));
        if (typeof data.currentLesson === "number" &&
            ((data.currentLesson >= 0 && data.currentLesson < targetLessonCount) ||
             data.currentLesson === -1 || data.currentLesson === -2 || data.currentLesson === -3)) {
          setCurrentLesson(data.currentLesson);
        } else {
          setCurrentLesson(-1);
        }
        if (typeof data.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(data.sidebarCollapsed);
        }
        if (data.displayModePref === "auto" || data.displayModePref === "compact" || data.displayModePref === "comfortable") {
          setDisplayModePref(data.displayModePref);
        }
        window.alert(`✓ Progress imported successfully.\n${validCompleted.length} of ${targetLessonCount} lessons restored to the ${targetTrackName} track.`);
      } catch (err) {
        window.alert(`Import failed: ${err.message || "invalid JSON file"}`);
      }
    };
    reader.onerror = () => window.alert("Could not read the file. Please try again.");
    reader.readAsText(file);
  };

  // Reset all progress — wipes state AND local storage, then force-remounts views
  // by bumping resetToken so lesson/exam/quiz local state clears too.
  // Uses an in-app modal rather than window.confirm because sandboxed iframes
  // (artifact previews, some embedded contexts) block native confirm dialogs.
  const requestReset = () => {
    setShowResetConfirm(true);
  };

  const confirmReset = () => {
    // Only reset the active track's progress — leave the other track untouched
    try { localStorage.removeItem(storageKey); } catch(e) {}
    setCompleted(new Set());
    setCurrentLesson(-1);
    setSidebarCollapsed(false);
    setDisplayModePref("auto");
    setResetToken(t => t + 1);
    setShowResetConfirm(false);
    window.scrollTo(0, 0);
  };

  // Keyboard shortcuts: arrow keys to navigate lessons, Esc to go home or close modal
  useEffect(() => {
    const onKey = (e) => {
      // If reset modal is open, Esc closes it (and nothing else does)
      if (showResetConfirm) {
        if (e.key === "Escape") {
          setShowResetConfirm(false);
          e.preventDefault();
        }
        return;
      }
      // Don't intercept when typing in inputs or when modifier keys held
      if (e.target.matches && e.target.matches("input, textarea, button, a")) {
        // Still allow Escape from buttons/links
        if (e.key !== "Escape") return;
      }
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (currentLesson >= 0 && currentLesson < LESSONS.length) {
        if (e.key === "ArrowLeft") {
          if (currentLesson > 0) goTo(currentLesson - 1); else goHome();
          e.preventDefault();
        } else if (e.key === "ArrowRight") {
          handleNext(currentLesson);
          e.preventDefault();
        } else if (e.key === "Escape") {
          goHome();
          e.preventDefault();
        }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [currentLesson, showResetConfirm]);

  // Derive phase groups from lesson data itself (not hardcoded indices)
  // so adding/removing lessons doesn't break the sidebar
  const phaseGroups = (() => {
    const groups = [];
    const labelFor = { "Phase 1": "Phase 1 · Foundation", "Phase 2": "Phase 2 · Build", "Phase 3": "Phase 3 · Agentic", "Phase 4": "Phase 4 · Industry" };
    LESSONS.forEach((l, i) => {
      const last = groups[groups.length - 1];
      if (last && last.phase === l.phase) { last.indices.push(i); }
      else { groups.push({ phase: l.phase, label: labelFor[l.phase] || l.phase, indices: [i] }); }
    });
    return groups;
  })();

  return (
    <div style={{ display: "flex", fontFamily: "Georgia, serif", background: "#f5f0e8", color: "#1a1208", minHeight: "100dvh" }}>

      {/* SIDEBAR */}
      <nav aria-label="Course navigation"
        style={{
          width: sidebarCollapsed ? 44 : 260,
          minWidth: sidebarCollapsed ? 44 : 260,
          background: "#1a1208", color: "#f5f0e8",
          display: "flex", flexDirection: "column",
          height: "100dvh", overflowY: "auto", flexShrink: 0,
          position: "sticky", top: 0,
          transition: "width 0.2s ease, min-width 0.2s ease",
          borderRight: "1px solid rgba(255,255,255,0.08)",
        }}>

        {sidebarCollapsed ? (
          /* ── COLLAPSED RAIL ─────────────────────────────────────────── */
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "14px 0", gap: 14 }}>
            {/* Expand button */}
            <button
              onClick={() => setSidebarCollapsed(false)}
              aria-label="Expand sidebar"
              aria-expanded="false"
              title="Expand lesson list"
              style={{ background: "rgba(232,168,124,0.1)", border: "1px solid rgba(232,168,124,0.25)", borderRadius: 6, color: "#e8a87c", cursor: "pointer", padding: "6px 8px", fontFamily: "monospace", fontSize: 14, lineHeight: 1 }}>
              ›
            </button>

            {/* Track indicator — tap to swap tracks */}
            <button
              onClick={() => setCurrentTrack(currentTrack === "mba" ? "ai" : "mba")}
              aria-label={`Current track: ${currentTrack === "mba" ? "MBA" : "AI"}. Tap to switch.`}
              title={`Switch to ${currentTrack === "mba" ? "AI" : "MBA"} track`}
              style={{ background: "rgba(232,168,124,0.18)", border: "1px solid rgba(232,168,124,0.35)", borderRadius: 6, color: "#e8a87c", cursor: "pointer", padding: "4px 6px", fontFamily: "monospace", fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", lineHeight: 1.2, minWidth: 28 }}>
              {currentTrack === "mba" ? "MBA" : "AI"}
            </button>

            {/* Home button */}
            <button
              onClick={goHome}
              aria-label="Course home"
              title="Course home"
              style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.6)", cursor: "pointer", padding: "6px 8px", fontSize: 13, lineHeight: 1 }}>
              ⌂
            </button>

            {/* Vertical progress indicator */}
            <div
              role="progressbar"
              aria-label="Course completion progress"
              aria-valuenow={progressPct} aria-valuemin={0} aria-valuemax={100}
              title={`${progressPct}% complete`}
              style={{ width: 4, height: 80, background: "rgba(255,255,255,0.1)", borderRadius: 2, overflow: "hidden", position: "relative" }}>
              <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${progressPct}%`, background: "#e8a87c", transition: "height 0.5s ease" }} />
            </div>
            <div style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.4)", writingMode: "vertical-rl", transform: "rotate(180deg)", letterSpacing: "0.12em" }}>
              {completed.size}/{LESSONS.length}
            </div>

            {/* Lesson dots — compact vertical list */}
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 8 }}>
              {LESSONS.map((l, idx) => {
                const isActive = currentLesson === idx;
                const isDone = completed.has(idx);
                return (
                  <button
                    key={idx}
                    onClick={() => goTo(idx)}
                    aria-label={`Lesson ${idx + 1}: ${l.title}${isDone ? " (completed)" : ""}${isActive ? " (current)" : ""}`}
                    aria-current={isActive ? "page" : undefined}
                    title={`Lesson ${idx + 1}: ${l.title}`}
                    style={{
                      width: 26, height: 22,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      background: isActive ? "rgba(232,168,124,0.18)" : "transparent",
                      border: `1px solid ${isActive ? "#e8a87c" : isDone ? "rgba(95,188,128,0.4)" : "rgba(255,255,255,0.1)"}`,
                      borderRadius: 4,
                      fontFamily: "monospace", fontSize: 9,
                      color: isActive ? "#e8a87c" : isDone ? "#5fbc80" : "rgba(255,255,255,0.4)",
                      cursor: "pointer", padding: 0, fontWeight: isActive ? 700 : 400,
                    }}>
                    {isDone && !isActive ? "✓" : (idx + 1)}
                  </button>
                );
              })}
            </div>

            {/* Final Exam shortcut in collapsed rail */}
            {(() => {
              const unlocked = completed.size >= LESSONS.length;
              const isActive = currentLesson === -3;
              return (
                <button
                  onClick={() => { if (unlocked) goTo(-3); }}
                  disabled={!unlocked}
                  aria-label={unlocked ? "Take the final exam" : `Final exam locked — complete all ${LESSONS.length} lessons to unlock`}
                  title={unlocked ? "Final Exam" : "Final Exam (locked)"}
                  style={{
                    width: 26, height: 26,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    marginTop: 4,
                    background: isActive ? "rgba(232,168,124,0.2)" : "transparent",
                    border: `1px solid ${isActive ? "#e8a87c" : unlocked ? "rgba(232,168,124,0.4)" : "rgba(255,255,255,0.08)"}`,
                    borderRadius: 4,
                    fontSize: 13,
                    cursor: unlocked ? "pointer" : "not-allowed",
                    padding: 0,
                    opacity: unlocked ? 1 : 0.5,
                  }}>
                  {unlocked ? "🎓" : "🔒"}
                </button>
              );
            })()}

          </div>
        ) : (
          /* ── EXPANDED SIDEBAR ────────────────────────────────────────── */
          <>
            <div style={{ padding: "20px 18px 14px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 6 }}>
                <div style={{ cursor: "pointer", flex: 1, minWidth: 0 }} onClick={goHome}>
                  <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.18em", color: "rgba(255,255,255,0.32)", textTransform: "uppercase", marginBottom: 5 }}>Active Learning Course</div>
                  <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.25, color: "#e8a87c" }}>
                    {currentTrack === "mba" ? "MBA Professional Certificate" : "AI for Engineering Certificate"}
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 400, fontStyle: "italic", lineHeight: 1.3, color: "rgba(255,255,255,0.55)", marginTop: 2 }}>
                    {currentTrack === "mba" ? "Aerospace Business Track" : "Aerospace Manufacturing Track"}
                  </div>
                </div>
                <div style={{ flexShrink: 0 }}>
                  {/* Collapse button */}
                  <button
                    onClick={() => setSidebarCollapsed(true)}
                    aria-label="Collapse sidebar to focus on lesson content"
                    aria-expanded="true"
                    title="Collapse sidebar"
                    style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)", borderRadius: 6, color: "rgba(255,255,255,0.65)", cursor: "pointer", padding: "4px 8px", lineHeight: 1, fontFamily: "monospace", fontSize: 13 }}>
                    ‹
                  </button>
                </div>
              </div>

              {/* Track selector — switch between AI and MBA tracks */}
              <div role="radiogroup" aria-label="Course track" style={{ display: "flex", gap: 4, background: "rgba(0,0,0,0.3)", borderRadius: 6, padding: 3, marginTop: 12 }}>
                {[
                  { key: "ai",  label: "AI",  title: "AI for Engineering Certificate" },
                  { key: "mba", label: "MBA", title: "MBA Professional Certificate" },
                ].map(opt => {
                  const selected = currentTrack === opt.key;
                  return (
                    <button
                      key={opt.key}
                      role="radio"
                      aria-checked={selected}
                      title={opt.title}
                      onClick={() => setCurrentTrack(opt.key)}
                      style={{

            {/* Export / Import Progress */}

            style={{

              Reset all progress?
            </h2>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: "#5a4e3f", margin: "0 0 22px" }}>

              <button
                onClick={() => setShowResetConfirm(false)}

                aria-label="Cancel reset"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "transparent", color: "#7a6e5f",
                  border: "1px solid #c8bfaa", borderRadius: 6,
                  cursor: "pointer",
                }}>
                Cancel
              </button>
              <button
                onClick={confirmReset}
                aria-label="Confirm reset — clear all progress"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "#c84b11", color: "#f5f0e8",
                  border: "none", borderRadius: 6,
                  cursor: "pointer", fontWeight: 700,
                }}>
                Yes, Reset
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ERROR BOUNDARY ────────────────────────────────────────────────────────────
// Catches any render error inside the course app and shows a recovery screen
// instead of a blank white page. Users can reset progress and reload if the
// error was caused by corrupted saved state.
class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, errorMsg: error?.message || "Unknown error" };
  }
  componentDidCatch(error, info) {
    // Log to console for debugging — silent in production would be fine too
    console.error("Course app crashed:", error, info);
  }
  handleReset = () => {
    // ErrorBoundary doesn't know active track, so wipe all course data to recover cleanly
    try {
      localStorage.removeItem("ai-course-progress");
      localStorage.removeItem("mba-course-progress");
      localStorage.removeItem("course-prefs");
    } catch (e) {}
    window.location.reload();
  };
  handleReload = () => {
    window.location.reload();
  };
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <div role="alert" style={{
        minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center",
        padding: 24, fontFamily: "Georgia, serif", background: "#f5f0e8", color: "#1a1208",
      }}>
        <div style={{ maxWidth: 500, textAlign: "center" }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>⚠️</div>
          <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 10, color: "#1a1208" }}>
            Something went wrong
          </h1>
          <p style={{ fontSize: 14, color: "#7a6e5f", lineHeight: 1.6, marginBottom: 20 }}>
            The course hit an unexpected error. Your saved progress is probably fine — try reloading first. If that doesn't help, resetting will clear saved data and start you fresh.
          </p>
          <div style={{ fontFamily: "monospace", fontSize: 11, color: "#8b2020", background: "#fef3e2", border: "1px solid #c84b11", borderRadius: 6, padding: "10px 14px", marginBottom: 20, textAlign: "left", wordBreak: "break-word" }}>
            {this.state.errorMsg}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={this.handleReload}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 6, cursor: "pointer" }}>
              Reload Page
            </button>
            <button onClick={this.handleReset}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "transparent", color: "#7a6e5f", border: "1px solid #c8bfaa", borderRadius: 6, cursor: "pointer" }}>
              Reset Progress & Reload
            </button>
          </div>
        </div>
      </div>
    );
  }
}

function App() {
  return (
    <ErrorBoundary>
      <CourseApp />
    </ErrorBoundary>
  );
}


// ─── MOUNT ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
