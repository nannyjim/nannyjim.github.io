{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Reliability Engineering",
  subtitle: "Watchdog timers, brown-out detection, ECC, MTBF, fail-safe design — defensive firmware.",
  time: "45 min", type: "Hardening",
  video: { id: "jeWLei8C0S0", title: "Using The Watchdog Timer To Find Bugs — Texas Instruments" },
  content: [
    { type: "p", text: "Industrial reliability isn't 'better hardware.' It's a discipline of defensive design that assumes things will go wrong — and ensures the system either continues operating or fails safely. This lesson is the toolkit." },

    { type: "h3", text: "Watchdog Timers" },
    { type: "p", text: "A watchdog timer is a hardware countdown that resets the system if the firmware doesn't 'feed' it within a deadline. It catches:" },
    { type: "ul", items: [
      "Stuck-in-loop bugs",
      "Blocked-on-I/O hangs",
      "Stack overflow corruption",
      "Memory corruption that leaves the system in an undefined state"
    ]},
    { type: "p", text: "Best practices:" },
    { type: "ul", items: [
      "**Independent oscillator** — the watchdog must not share the main system clock. If the clock fails, the watchdog should still reset the system.",
      "**External watchdog IC for critical systems** — even if the main MCU is completely halted, an external watchdog will pull the reset line.",
      "**Don't pet from a timer interrupt** — the firmware must demonstrate that it's processing real work, not just running. Pet from a high-level supervisor task that knows all subsystems are alive.",
      "**Window watchdog** — must pet within a window (not too early, not too late). Catches runaway-fast loops too.",
      "**Log the cause before reset** — write a 'why I'm rebooting' code to non-volatile memory before the watchdog fires. Gold for debugging field issues."
    ]},

    { type: "h3", text: "Brown-Out Detection" },
    { type: "p", text: "When supply voltage dips below the MCU's operating minimum, the chip enters undefined behavior — flash writes can corrupt, RAM contents become unreliable, peripherals can hang. Brown-out detection (BOD) is a hardware threshold: when supply drops below the configured level, the MCU resets cleanly before it can do damage." },
    { type: "p", text: "Always enable BOD at the appropriate threshold for your operating voltage. Cheap consumer designs leave BOD disabled to save sleep current; industrial designs enable it." },

    { type: "h3", text: "ECC and Memory Integrity" },
    { type: "ul", items: [
      "**ECC RAM** — error-correcting memory detects and corrects single-bit errors, detects double-bit errors. Used in industrial-grade SBCs and high-reliability MCUs. Consumer Arduinos and standard Pis don't have ECC.",
      "**Flash CRC checking** — verify firmware integrity at boot. Detects corrupted flash before running bad code.",
      "**Memory protection units (MPUs)** — hardware barriers preventing one task from corrupting another's memory. Standard on Cortex-M3+ MCUs but often unused in Arduino code.",
      "**Stack canaries** — known patterns at the bottom of the stack, checked periodically. Detects stack overflow before it corrupts other data."
    ]},

    { type: "h3", text: "Fail-Safe Design" },
    { type: "p", text: "Defensive firmware assumes failures and chooses good failure modes:" },
    { type: "ul", items: [
      "**Default outputs to safe state** — when the system starts up, when it resets, when communication is lost — outputs default to a known-safe condition (motors off, valves closed, brakes engaged).",
      "**Plausibility checks on inputs** — if a temperature reading is -50 °C in a 25 °C lab, something's wrong; reject the value rather than acting on it.",
      "**Bounded retries with degraded fallback** — if a sensor fails, retry a bounded number of times, then fall back to a degraded mode (last good value, default value, alarm state).",
      "**Heartbeat between subsystems** — each subsystem regularly sends 'I'm alive' to a supervisor. Missed heartbeats trigger investigation or fail-safe.",
      "**Redundant critical sensors** — for safety-critical inputs, two or three sensors voting. Disagreement is itself a fault to act on."
    ]},

    { type: "h3", text: "MTBF and Reliability Math" },
    { type: "ul", items: [
      "**Mean Time Between Failures (MTBF)** — statistical measure. A 1,000,000 hour MTBF doesn't mean one unit lasts 1,000,000 hours — it means in a population of 1,000 units, you expect ~1 failure per 1,000 hours of operation.",
      "**Bath-tub curve** — high failure rate at burn-in, low constant rate during life, rising rate at wear-out. Industrial products are typically pre-burn-in tested at the factory.",
      "**Series vs parallel reliability** — components in series have failure rates that add up; components in parallel (with proper redundancy) have failure rates that multiply (much smaller). Critical paths benefit hugely from redundancy."
    ]},

    { type: "callout", style: "key",
      text: "**The reliability mindset.** It's not 'will this fail?' — it's 'when this fails, how does it fail, and is the failure mode acceptable?' Defensive firmware isn't pessimistic; it's realistic about industrial conditions. Watchdog + BOD + safe defaults + plausibility checks is the minimum viable defense." },
  ],
  quizzes: [
    {
      question: "Why should a watchdog timer use an independent oscillator separate from the main system clock?",
      options: [
        "Better accuracy",
        "If the system clock fails, the watchdog should still be able to reset the system — shared clocks create a dependency where clock failures aren't recovered",
        "Lower cost",
        "Faster response"
      ],
      correct: 1,
      explanation: "If the watchdog shares the system clock and the clock fails, the watchdog also fails — exactly when you need it most. Independent oscillators make watchdogs robust against clock failures. External watchdog ICs add another layer of independence."
    },
    {
      question: "What does ECC memory provide?",
      options: [
        "More memory capacity",
        "Detection and correction of single-bit memory errors, detection of double-bit errors — protecting against transient memory faults",
        "Faster memory access",
        "Lower power"
      ],
      correct: 1,
      explanation: "ECC memory uses extra bits to detect bit flips (cosmic rays, EMI, voltage glitches) and correct single-bit errors. Critical for high-reliability and aerospace applications. Consumer hardware (Arduino, standard Pi) doesn't have ECC."
    },
    {
      question: "What's the principle of fail-safe default output state?",
      options: [
        "Outputs always default to ON",
        "When system starts, resets, or loses communication, outputs default to a known-safe condition (e.g., motors off, valves closed, brakes engaged)",
        "Outputs are random",
        "Outputs are unchanged"
      ],
      correct: 1,
      explanation: "Fail-safe defaults ensure that any failure mode (startup, reset, comm loss) leaves the system in a known-safe state. Motors stop, valves close, brakes engage. Industrial design assumes failures will happen and ensures they fail safely."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Real-Time, Determinism & Communications",
  subtitle: "Interrupt latency, RTOS basics, CAN/Modbus/MQTT/OPC-UA — what does what and where.",
  time: "45 min", type: "Hardening",
  video: { id: "F321087yYy4", title: "Introduction to RTOS Part 1 — What is a Real-Time Operating System?" },
  content: [
    { type: "p", text: "Real-time means the system meets timing deadlines reliably, not 'fast.' A 100ms response that always arrives within 100ms is real-time; a 1ms response that occasionally takes 50ms is not. Industrial systems need real-time properties for safety and process control. This lesson covers how to get them on hobby and industrial platforms alike." },

    { type: "h3", text: "Hard vs Soft Real-Time" },
    { type: "ul", items: [
      "**Hard real-time** — missed deadlines mean system failure (motor controller misses a current update → motor demagnetizes; safety interlock misses an event → injury). Must have guaranteed response within bounds.",
      "**Soft real-time** — missed deadlines degrade performance but don't cause failure (video stream stutters, UI feels laggy). Best-effort timing acceptable.",
      "**Firm real-time** — between the two: late results are useless but not catastrophic (financial trading, certain telecom)."
    ]},

    { type: "h3", text: "Interrupt Latency" },
    { type: "p", text: "When a hardware event triggers an interrupt, how long until your ISR runs? On a bare-metal MCU: microseconds, deterministic. On a stock Linux Pi: typically tens of microseconds, but with worst-case spikes to hundreds of microseconds or more under load. On a PLC: bounded by scan cycle (5-50 ms typically) — slow but absolutely guaranteed." },

    { type: "h3", text: "RTOS Basics" },
    { type: "ul", items: [
      "**FreeRTOS** — the dominant embedded RTOS. Open-source, Amazon-maintained, runs on virtually every MCU. Tasks, queues, semaphores, mutexes, software timers. The first RTOS most people learn.",
      "**Zephyr** — Linux Foundation project, more comprehensive than FreeRTOS. Built-in networking stack, device tree, modern build system. Standard for new IoT designs.",
      "**Mbed OS** — ARM's RTOS, integrated with Mbed Studio. Common on Cortex-M boards.",
      "**ThreadX** — commercial RTOS, used in production. Microsoft acquired it; now Azure RTOS, recently re-open-sourced.",
      "**RTOS on a hobby Arduino** — FreeRTOS-for-Arduino library, or use boards (Nano 33 BLE, Portenta) with Mbed OS built in. Arduino's loop() pattern doesn't preclude using an RTOS underneath."
    ]},

    { type: "h3", text: "Real-Time Linux" },
    { type: "p", text: "Stock Linux is not real-time — kernel can defer interrupts, scheduler can preempt at unpredictable points. Two paths to real-time on Linux:" },
    { type: "ul", items: [
      "**PREEMPT_RT patch** — makes the kernel fully preemptible. Worst-case latency drops from milliseconds to tens of microseconds. Mainlined into stock kernel as of 6.12. Available for Raspberry Pi.",
      "**Xenomai** — dual-kernel approach. A real-time microkernel runs alongside Linux, providing hard real-time tasks while Linux handles non-real-time work.",
      "**Hardware coprocessor** — BeagleBone PRUs, ESP32 ULP, Jetson real-time cores. Run hard-real-time code on a dedicated processor, communicate with the Linux system via shared memory."
    ]},

    { type: "h3", text: "Industrial Communication Protocols" },
    { type: "ul", items: [
      "**CAN bus** — automotive and industrial. Differential pair, robust against EMI, supports multi-master. CANopen and DeviceNet are higher-level protocols on CAN.",
      "**Modbus (RTU/TCP)** — covered in Phase 2. The universal industrial protocol.",
      "**MQTT** — lightweight publish/subscribe, designed for IoT. Pub-sub broker mediates between devices. Cheap to implement, asynchronous, not deterministic. Common for SCADA-to-cloud integration.",
      "**OPC UA** — modern industrial integration standard. Object-oriented data model, secure, standardized across vendors. Replacing legacy OPC and proprietary integration in modern systems.",
      "**EtherCAT, Profinet IRT, EtherNet/IP CIP Sync** — sub-millisecond deterministic Ethernet for motion and machine control. Covered in Phase 2."
    ]},

    { type: "h3", text: "Latency Budgeting" },
    { type: "p", text: "When you specify a real-time system, calculate the end-to-end latency:" },
    { type: "ul", items: [
      "Sensor sample period",
      "Bus transmission time (Modbus poll cycle, CAN message)",
      "Computation time (algorithm execution)",
      "Output update time (DAC settling, motor drive update)",
      "Process actuation lag (mechanical inertia)"
    ]},
    { type: "p", text: "Add them up. The total must be less than your control loop's required response time, with margin for jitter. If it's not, find where the bottleneck is — usually a slow communication protocol or a non-real-time computing platform." },

    { type: "callout", style: "key",
      text: "**Real-time is a property, not a speed.** A guaranteed 100 ms response time is real-time. A best-effort 1 ms response that occasionally takes 50 ms is not. When specifying a real-time system, specify the deadline and the worst-case response — not the average response." },
  ],
  quizzes: [
    {
      question: "What's the defining property of a real-time system?",
      options: [
        "Fast response",
        "Guaranteed response within specified deadlines, even under worst-case conditions",
        "Multitasking",
        "Low power"
      ],
      correct: 1,
      explanation: "Real-time is about determinism, not speed. A slow but guaranteed response is real-time; a fast but unpredictable response is not. Industrial control needs deterministic timing because safety and process control depend on bounded responses."
    },
    {
      question: "Which approach is NOT a way to achieve real-time on Linux?",
      options: [
        "PREEMPT_RT kernel patch",
        "Xenomai dual-kernel architecture",
        "Hardware coprocessor (PRU, ULP, RT core) for hard-real-time tasks",
        "Just running Linux faster"
      ],
      correct: 3,
      explanation: "Faster CPU doesn't help — the issue is kernel scheduling unpredictability under load, not raw speed. Real-time requires either patching the kernel (PREEMPT_RT), running a real-time kernel alongside (Xenomai), or offloading time-critical work to dedicated coprocessors."
    },
    {
      question: "Which industrial protocol is best for sub-millisecond deterministic motion control?",

    correct: 2, explanation: "TON is the most common timer. Input goes high → after preset time, output goes high. Used for delays, debouncing, dwell times." },
  { phase: 2, question: "Why is 4-20 mA the industrial standard for analog vs 0-10 V?",
    options: ["Higher resolution", "Current loops have intrinsic EMI rejection, < 4 mA detects wire breaks, sensor often loop-powered", "Cheaper", "Easier wiring"],

  { phase: 2, question: "Lingua franca of industrial communication?",
    options: ["Profinet", "EtherCAT", "Modbus (RTU/TCP)", "OPC UA"],
    correct: 2, explanation: "Modbus is open, simple, and universally supported. The others are vendor-aligned (Profinet/EtherNet-IP) or higher-level (OPC UA)." },
  { phase: 2, question: "Consequence of mismatched sourcing/sinking I/O wiring?",
    options: ["Slightly slower", "System won't work — input or output never sees voltage", "EMI problems", "Higher current"],

  { phase: 2, question: "Question to ask when unsure between PLC and MCU?",
    options: ["Which is cheaper?", "What happens when this fails at 3 AM with no engineer available — and how bad is that?", "Which is faster?", "Which has more features?"],

  { phase: 2, question: "Real failure mode of putting a hobby Arduino in industrial service?",
    options: ["Excessive accuracy", "Brown-out lockup, EMI-induced corruption, SD card wear, no redundancy — none of which consumer hardware was designed against", "Too much memory", "Boots too fast"],
    correct: 1, explanation: "Consumer hardware lacks margins industrial environments require: power supply tolerance, EMI hardening, watchdogs, ECC, redundancy." },
  { phase: 2, question: "Modern answer to 'PLC or MCU?' for complex industrial systems?",
    options: ["Always PLC", "Always MCU", "Both — PLC for deterministic control, MCU/SBC for vision, ML, networking, wireless — sharing data via industrial protocols", "Custom ASIC"],
    correct: 2, explanation: "Modern industrial architectures are hybrid. Each platform does what it's best at, sharing data via Modbus TCP, OPC UA, or MQTT." },
  { phase: 2, question: "Most common language in industrial PLC code?",
    options: ["Structured Text", "Ladder Diagram (~80%)", "Function Block Diagram", "Instruction List"],
    correct: 1, explanation: "Ladder remains the most widely used PLC language by far — its visual nature and similarity to relay schematics makes it standard for discrete manufacturing." },
  { phase: 2, question: "What's a hardware watchdog in a PLC for?",
    options: ["Cooling fan", "Detects PLC malfunction (stuck scan, etc.) and forces a safe state", "Encryption", "Network monitoring"],
    correct: 1, explanation: "Watchdogs detect PLC malfunctions. Modern PLCs have CPU watchdogs, communication watchdogs, and I/O watchdogs as built-in safety mechanisms." },
  { phase: 2, question: "Standard fieldbus for connecting smart sensors at the device level?",
    options: ["MQTT", "OPC UA", "IO-Link", "EtherCAT"],
    correct: 2, explanation: "IO-Link is the modern device-level standard — single twisted pair to smart sensors with bidirectional configuration and diagnostics. Replacing simple discrete sensors in modern designs." },

  // ─── Phase 3: Hardening Hobby Platforms (14 questions) ──────────────────────
  { phase: 3, question: "Most common reason a working bench prototype crashes when installed in a factory?",
    options: ["Software bugs", "Inadequate power conditioning, EMI immunity, grounding — environmental stresses prototype wasn't designed against", "Wrong programming language", "Memory"],
    correct: 1, explanation: "Bench environments are clean. Factories have dirty power, EMI, ground potential differences. Input protection, isolation, and grounding are typically the missing pieces." },
  { phase: 3, question: "What does IP65 specify?",
    options: ["IP version", "Dust-tight enclosure with protection against water jets — appropriate for many indoor industrial environments", "OS version", "PLC standard"],
    correct: 1, explanation: "IP65 is the industrial standard for splash-resistant, dust-tight enclosures. IP67 adds temporary submersion. Match the rating to the environment." },
  { phase: 3, question: "Right hierarchy for hardening hobby platforms for industry?",
    options: ["More capacitors", "Choose right platform → enclosure → input protection → isolation → filtering → test", "Expensive parts", "Add a fan"],
    correct: 1, explanation: "Start with platform selection (industrial variants exist), then enclosure, then layered protection. Don't try to fix in software what should be fixed in hardware." },
  { phase: 3, question: "Why should a watchdog timer use an independent oscillator?",
    options: ["Better accuracy", "If system clock fails, watchdog should still reset — shared clocks create dependency where clock failures aren't recovered", "Lower cost", "Faster"],
    correct: 1, explanation: "If watchdog shares the system clock and clock fails, watchdog also fails. Independent oscillators make watchdogs robust against clock failures." },
  { phase: 3, question: "What does ECC memory provide?",
    options: ["More capacity", "Detection and correction of single-bit memory errors, detection of double-bit errors", "Faster access", "Lower power"],
    correct: 1, explanation: "ECC uses extra bits to detect bit flips (cosmic rays, EMI, voltage glitches) and correct single-bit errors. Critical for high-reliability applications." },
  { phase: 3, question: "Principle of fail-safe default output state?",
    options: ["Always ON", "When system starts, resets, or loses comm, outputs default to known-safe state (motors off, valves closed, brakes engaged)", "Random", "Unchanged"],
    correct: 1, explanation: "Fail-safe defaults ensure any failure mode leaves the system in a known-safe state. Industrial design assumes failures and ensures they fail safely." },
  { phase: 3, question: "Defining property of a real-time system?",
    options: ["Fast response", "Guaranteed response within specified deadlines, even worst-case", "Multitasking", "Low power"],
    correct: 1, explanation: "Real-time is determinism, not speed. Slow but guaranteed = real-time; fast but unpredictable ≠ real-time." },
  { phase: 3, question: "Which is NOT a way to achieve real-time on Linux?",
    options: ["PREEMPT_RT", "Xenomai dual-kernel", "Hardware coprocessor (PRU, ULP, RT core)", "Just running Linux faster"],
    correct: 3, explanation: "Faster CPU doesn't help; the issue is kernel scheduling unpredictability. Real-time requires kernel patching, dual-kernel, or coprocessors." },
  { phase: 3, question: "Best protocol for sub-millisecond deterministic motion control?",
    options: ["MQTT", "Modbus RTU", "EtherCAT or Profinet IRT", "REST/HTTP"],
    correct: 2, explanation: "EtherCAT and Profinet IRT are designed for sub-millisecond deterministic communication. The dedicated industrial Ethernet variants are right for motion." },
  { phase: 3, question: "What is brown-out detection (BOD)?",
    options: ["Server software", "Hardware threshold that resets MCU when supply voltage drops below operating minimum, before damage", "Power optimization", "Network protocol"],
    correct: 1, explanation: "BOD prevents undefined behavior during voltage dips. Always enable it on industrial designs; saves untold hours of debugging." },
  { phase: 3, question: "Best practice for petting a watchdog?",
    options: ["From timer interrupt", "From a high-level supervisor task that confirms all subsystems are alive — not just from a timer", "Once at startup", "Don't"],
    correct: 1, explanation: "Petting from a timer interrupt only confirms timers run, not that the application is processing real work. Pet from a supervisor that knows all subsystems are healthy." },
  { phase: 3, question: "MTBF of 1,000,000 hours means:",
    options: ["One unit lasts 1M hours", "In 1000 units, expect ~1 failure per 1000 hours of operation", "No failures", "Random"],
    correct: 1, explanation: "MTBF is statistical. 1M hour MTBF doesn't mean any single unit lasts 1M hours; it means population behavior over time." },
  { phase: 3, question: "Why are PLC scan cycles deterministic but Linux scheduling isn't?",
    options: ["PLCs are faster", "PLCs run a fixed scan loop with no preemption; Linux has preemptive scheduling with unpredictable tasks/interrupts/I/O delays", "Linux is broken", "Random"],
    correct: 1, explanation: "PLC architecture is fundamentally different: deterministic scan, no preemption beyond ISRs, bounded execution per cycle. Linux is general-purpose." },
  { phase: 3, question: "Best approach for shielded cable grounding?",
    options: ["Both ends", "One end (typically near the PLC/sensitive electronics) for analog signals to prevent ground loops", "Neither end", "Center"],
    correct: 1, explanation: "Multi-point grounding can create ground loops. Single-point shield grounding (typically at the controller end) for analog signals is the standard." },

  // ─── Phase 4: Crossover & Production (12 questions) ─────────────────────────
  { phase: 4, question: "What's the Arduino Opta?",
    options: ["Standard Uno", "Industrial-grade PLC programmable in Arduino C++ AND IEC 61131-3 with isolated I/O and DIN-rail mount", "IDE plugin", "Chip"],
    correct: 1, explanation: "Opta is Arduino's industrial PLC — STM32H7-based, isolated I/O, certifications, DIN-rail, dual programming support. The most polished Arduino-to-PLC bridge." },
  { phase: 4, question: "Where do hybrids currently NOT match traditional PLCs?",
    options: ["Cost", "20+ year lifecycles, hot-redundant CPU support, established functional safety ratings, mature spare-parts ecosystems", "Programming", "Networking"],
    correct: 1, explanation: "Traditional PLCs win on lifecycle, redundancy, functional safety certifications, and decades-old spare-parts ecosystems. Hybrids are catching up but aren't there for safety-critical or generational infrastructure." },
  { phase: 4, question: "When is a hybrid right vs traditional PLC?",
    options: ["Nuclear plants", "Small-to-medium industrial automation, OEM machines, connected products needing modern protocols, prototype-to-production paths", "Never", "Always"],
    correct: 1, explanation: "Hybrids fit small-to-medium scale, OEM equipment, connected/IoT applications, and prototype-to-production migration paths." },
  { phase: 4, question: "What does CE marking actually require?",
    options: ["Government pre-approval", "Self-declaration of conformity to applicable directives with technical documentation supporting the claims", "Translation to all EU languages", "Annual renewal"],
    correct: 1, explanation: "CE is self-declaration. You declare conformity, maintain documentation, put on the mark. No pre-approval. Different from FCC which requires testing and (sometimes) authorization." },
  { phase: 4, question: "Realistic cost for full FCC + CE + safety testing of a typical connected product?",
    options: ["$1,000", "$20K-$100K+", "$10M", "Free"],
    correct: 1, explanation: "Pre-compliance $5-30K, formal $20-100K+, UL listing $10-50K + follow-up. Plan it from the start — surprises here delay launches." },
  { phase: 4, question: "Why is OTA firmware update essentially mandatory for connected products?",
    options: ["Customer expectation only", "Security patches must reach fleet without recall; bug fixes; recalls are extraordinarily expensive; modern regulations require it", "Required by law in only some places", "Not actually needed"],
    correct: 1, explanation: "Without OTA, post-shipment vulnerabilities require physical recall — extraordinarily expensive. Modern regulations (EU CRA) increasingly require update capability." },
  { phase: 4, question: "Why can't a hobby prototype usually be 'hardened later' into production?",
    options: ["It can", "Hardening requires architectural decisions (ECC, watchdogs, isolated I/O, OTA, certified components) made from the start", "Production hardening is cheap", "Software-only changes work"],
    correct: 1, explanation: "Industrial reliability is architectural. Bolt-on hardening rarely works; plan production from the start if production is the goal." },
  { phase: 4, question: "When IS the hobby version genuinely appropriate even in real applications?",
    options: ["Always", "Internal R&D, proof-of-concept, single-site with engineering on-call, learning real requirements before committing to production design", "Never", "Only educational"],
    correct: 1, explanation: "Hobby versions are ideal for de-risking and learning. Mistake is shipping the hobby version externally." },
  { phase: 4, question: "Typical hobby vs production cost ratio?",
    options: ["Same", "Production typically 10-20× hobby due to industrial components, isolation, certifications, enclosures", "Production cheaper", "100×"],
    correct: 1, explanation: "Industrial-grade hardware typically 10-20× hobby cost, plus orders of magnitude more in compliance and engineering time. Justified for product/customer applications, not internal experimentation." },
  { phase: 4, question: "Common DFM (Design For Manufacturing) consideration?",
    options: ["Aesthetics only", "Component availability and second sources, standard package sizes, manufacturing test access, BOM management", "Color choice", "None"],
    correct: 1, explanation: "DFM covers component availability, package standardization, test access, BOM management, cost reduction, and manufacturing yield. Often 10× more work than the original prototype." },
  { phase: 4, question: "What's a critical capability for fleet management of deployed connected products?",
    options: ["Color matching", "Remote monitoring, OTA deployment, rollback capability, security disclosure tracking, license compliance", "Manual updates only", "Physical inspection"],
    correct: 1, explanation: "Once you have thousands of devices in the field, you need infrastructure for monitoring, deployment, rollback, security, and compliance. Particle, Memfault, AWS IoT, Azure IoT all play here." },
  { phase: 4, question: "Why do connected products increasingly need cybersecurity disclosure processes?",
    options: ["Marketing", "Regulations (EU Cyber Resilience Act, US executive orders) increasingly require security disclosure and remediation processes for connected products", "Not really required", "Customer preference"],
    correct: 1, explanation: "Modern regulations (EU CRA effective 2027, US executive orders, etc.) require manufacturers to disclose vulnerabilities, provide patches, and maintain security update support for connected products." },

];


function CourseApp() {
  // Active track: "ai" (AI for Engineering Certificate) or "mba" (MBA Professional Certificate)
  const [currentTrack, setCurrentTrack] = useState("ai");
  const [currentLesson, setCurrentLesson] = useState(-1);
  const [completed, setCompleted] = useState(new Set());
  const [storageReady, setStorageReady] = useState(false);
  const [storageError, setStorageError] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  // Display mode: 'auto' (detect), 'compact' (mobile-sized), 'comfortable' (desktop-scaled)
  const [displayModePref, setDisplayModePref] = useState("auto");
  const [autoDetectedMode, setAutoDetectedMode] = useState("compact");
  // Incremented on reset — used as part of view keys to force full remount
  // (clears local state in LessonView, FinalExamView, QuizSet, etc.)
  const [resetToken, setResetToken] = useState(0);
  // Shows in-app reset confirmation modal (window.confirm is unreliable in sandboxed iframes)
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  // Resolve active track's data and storage key
  const LESSONS = currentTrack === "mba" ? MBA_LESSONS : currentTrack === "am" ? AM_LESSONS : currentTrack === "motor" ? MOTOR_LESSONS : currentTrack === "embed" ? EMBED_LESSONS : AI_LESSONS;
  const FINAL_EXAM = currentTrack === "mba" ? MBA_FINAL_EXAM : currentTrack === "am" ? AM_FINAL_EXAM : currentTrack === "motor" ? MOTOR_FINAL_EXAM : currentTrack === "embed" ? EMBED_FINAL_EXAM : AI_FINAL_EXAM;
  const storageKey = currentTrack === "mba" ? "mba-course-progress" : currentTrack === "am" ? "am-course-progress" : currentTrack === "motor" ? "motor-course-progress" : currentTrack === "embed" ? "embed-course-progress" : "ai-course-progress";
  const courseTitle = currentTrack === "mba" ? "MBA Professional Certificate" : currentTrack === "am" ? "Additive Manufacturing Certificate" : currentTrack === "motor" ? "Electric Motors for Engineers" : currentTrack === "embed" ? "Embedded Platforms" : "AI Mastery for Aerospace";
  const certificateTitle = currentTrack === "mba" ? "MBA Professional Certificate" : currentTrack === "am" ? "Additive Manufacturing Certificate" : currentTrack === "motor" ? "Electric Motors for Engineers" : currentTrack === "embed" ? "Embedded Platforms Certificate" : "AI for Engineering Certificate";
  const certificateSubtitle = currentTrack === "mba" ? "Aerospace Business Track" : currentTrack === "am" ? "Aerospace Applications Track" : currentTrack === "motor" ? "Aerospace & Precision Applications Track" : currentTrack === "embed" ? "From Hobby to Industrial Reliability Track" : "Aerospace Manufacturing Track";

  // Auto-detect display mode based on viewport width and pointer type.
  // Desktop with mouse + wide screen = comfortable (larger type, more padding).
  // Mobile/tablet or narrow screen = compact (current sizing).
  useEffect(() => {
    const detect = () => {
      const isWide = window.innerWidth >= 900;
      const hasFinePointer = window.matchMedia("(pointer: fine)").matches;
      setAutoDetectedMode(isWide && hasFinePointer ? "comfortable" : "compact");
    };
    detect();
    window.addEventListener("resize", detect);
    const mq = window.matchMedia("(pointer: fine)");
    if (mq.addEventListener) mq.addEventListener("change", detect);
    return () => {
      window.removeEventListener("resize", detect);
      if (mq.removeEventListener) mq.removeEventListener("change", detect);
    };
  }, []);

  // Resolve the active display mode (user override wins over auto-detect)
  const displayMode = displayModePref === "auto" ? autoDetectedMode : displayModePref;
  const isComfortable = displayMode === "comfortable";

  // Inject global styles once for active/focus states (touch-friendly) and
  // accessibility-focused keyboard outlines
  useEffect(() => {
    const id = "ai-course-globals";
    if (document.getElementById(id)) return;
    const el = document.createElement("style");
    el.id = id;
    el.textContent = `
      .play-btn:active { transform: scale(0.96); box-shadow: 0 4px 18px rgba(200,75,17,0.45); }
      @media (hover: hover) {
        .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 40px rgba(200,75,17,0.75); }
      }
      *:focus-visible { outline: 2px solid #e8a87c; outline-offset: 2px; border-radius: 4px; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    `;
    document.head.appendChild(el);
    return () => { const s = document.getElementById(id); if (s) s.remove(); };
  }, []);

  // Load global preferences (track, sidebar, display mode) once on mount
  useEffect(() => {
    try {
      // Global prefs (applies to both tracks)
      const rawPrefs = localStorage.getItem("course-prefs");
      if (rawPrefs) {
        const prefs = JSON.parse(rawPrefs);
        if (prefs.currentTrack === "ai" || prefs.currentTrack === "mba" || prefs.currentTrack === "am" || prefs.currentTrack === "motor" || prefs.currentTrack === "embed") {
          setCurrentTrack(prefs.currentTrack);
        }
        if (typeof prefs.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(prefs.sidebarCollapsed);
        }
        if (prefs.displayModePref === "auto" || prefs.displayModePref === "compact" || prefs.displayModePref === "comfortable") {
          setDisplayModePref(prefs.displayModePref);
        }
      }
    } catch (e) { setStorageError(true); }
    setStorageReady(true);
  }, []);

  // Whenever the active track changes (including the initial resolved track), load that track's progress
  useEffect(() => {
    if (!storageReady) return;
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) {
        const saved = JSON.parse(raw);
        setCompleted(new Set(
          Array.isArray(saved.completed)
            ? saved.completed.filter(n => Number.isInteger(n) && n >= 0 && n < LESSONS.length)
            : []
        ));
        if (typeof saved.currentLesson === "number") {
          setCurrentLesson(saved.currentLesson);
        } else {
          setCurrentLesson(-1);
        }
      } else {
        // No saved progress for this track — start fresh
        setCompleted(new Set());
        setCurrentLesson(-1);
      }
    } catch (e) { setStorageError(true); }
    // Bump resetToken so any lingering child view state is cleared on track switch
    setResetToken(t => t + 1);
  }, [currentTrack, storageReady]);

  // Save per-track progress whenever completed/currentLesson changes
  useEffect(() => {
    if (!storageReady) return;
    try {
      localStorage.setItem(storageKey, JSON.stringify({
        completed: [...completed],
        currentLesson,
      }));
      if (storageError) setStorageError(false);
    } catch (e) {
      setStorageError(true);
    }
  }, [completed, currentLesson, storageKey, storageReady, storageError]);

  // Save global prefs (track selection, sidebar, display mode) separately
  useEffect(() => {
    if (!storageReady) return;
    try {
      localStorage.setItem("course-prefs", JSON.stringify({
        currentTrack,
        sidebarCollapsed,
        displayModePref,
      }));
    } catch (e) { /* ignore */ }
  }, [currentTrack, sidebarCollapsed, displayModePref, storageReady]);

  const progressPct = Math.round((completed.size / LESSONS.length) * 100);
  const goTo = (idx) => { setCurrentLesson(idx); window.scrollTo(0, 0); };
  const goHome = () => setCurrentLesson(-1);
  const handleNext = (idx) => {
    setCompleted(prev => new Set([...prev, idx]));
    if (idx < LESSONS.length - 1) goTo(idx + 1);
    else goTo(-3); // After last lesson, go to Final Exam
  };

  // Export current progress as a downloadable JSON file
  const exportProgress = () => {
    const payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      app: courseTitle,
      track: currentTrack,
      data: {
        completed: [...completed].sort((a, b) => a - b),
        currentLesson,
        sidebarCollapsed,
        displayModePref,
      },
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const datestamp = new Date().toISOString().slice(0, 10);
    a.download = `${currentTrack}-course-progress-${datestamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Import progress from a JSON file selected by the user
  const importProgress = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.data || parsed;
        const fileTrack = parsed.track || "ai"; // default to ai for old v1 exports

        // Validate
        if (!data || typeof data !== "object") throw new Error("Invalid file format");
        if (!Array.isArray(data.completed)) throw new Error("Missing 'completed' array");

        // Determine the active-track lesson count for validation
        const targetLessonCount = fileTrack === "mba" ? MBA_LESSONS.length : AI_LESSONS.length;
        const targetTrackName = fileTrack === "mba" ? "MBA" : "AI";

        // Filter completed to valid lesson indices for the target track
        const validCompleted = data.completed.filter(n =>
          Number.isInteger(n) && n >= 0 && n < targetLessonCount
        );

        // Summarize what will be imported for the confirm dialog
        const willSwitchTrack = fileTrack !== currentTrack;
        const msg =
          `Import progress?\n\n` +
          `• Track: ${targetTrackName}${willSwitchTrack ? " (will switch from current track)" : ""}\n` +
          `• ${validCompleted.length} of ${targetLessonCount} lessons will be marked complete\n` +
          `• Display preferences will be restored\n\n` +
          `This will REPLACE the ${targetTrackName} track's current progress. Continue?`;

        if (!window.confirm(msg)) return;

        // Switch track if needed (will trigger load from that track's key; we'll overwrite below)
        if (willSwitchTrack) {
          setCurrentTrack(fileTrack);
        }

        // Apply imported data
        setCompleted(new Set(validCompleted));
        if (typeof data.currentLesson === "number" &&
            ((data.currentLesson >= 0 && data.currentLesson < targetLessonCount) ||
             data.currentLesson === -1 || data.currentLesson === -2 || data.currentLesson === -3)) {
          setCurrentLesson(data.currentLesson);
        } else {
          setCurrentLesson(-1);
        }
        if (typeof data.sidebarCollapsed === "boolean") {
          setSidebarCollapsed(data.sidebarCollapsed);
        }
        if (data.displayModePref === "auto" || data.displayModePref === "compact" || data.displayModePref === "comfortable") {
          setDisplayModePref(data.displayModePref);
        }
        window.alert(`✓ Progress imported successfully.\n${validCompleted.length} of ${targetLessonCount} lessons restored to the ${targetTrackName} track.`);
      } catch (err) {
        window.alert(`Import failed: ${err.message || "invalid JSON file"}`);
      }
    };
    reader.onerror = () => window.alert("Could not read the file. Please try again.");
    reader.readAsText(file);
  };

  // Reset all progress — wipes state AND local storage, then force-remounts views
  // by bumping resetToken so lesson/exam/quiz local state clears too.
  // Uses an in-app modal rather than window.confirm because sandboxed iframes
  // (artifact previews, some embedded contexts) block native confirm dialogs.
  const requestReset = () => {
    setShowResetConfirm(true);
  };

  const confirmReset = () => {
    // Only reset the active track's progress — leave the other track untouched
    try { localStorage.removeItem(storageKey); } catch(e) {}
    setCompleted(new Set());
    setCurrentLesson(-1);
    setSidebarCollapsed(false);
    setDisplayModePref("auto");
    setResetToken(t => t + 1);
    setShowResetConfirm(false);
    window.scrollTo(0, 0);
  };

  // Keyboard shortcuts: arrow keys to navigate lessons, Esc to go home or close modal
  useEffect(() => {
    const onKey = (e) => {
      // If reset modal is open, Esc closes it (and nothing else does)
      if (showResetConfirm) {
        if (e.key === "Escape") {
          setShowResetConfirm(false);
          e.preventDefault();
        }
        return;
      }
      // Don't intercept when typing in inputs or when modifier keys held
      if (e.target.matches && e.target.matches("input, textarea, button, a")) {
        // Still allow Escape from buttons/links
        if (e.key !== "Escape") return;
      }
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (currentLesson >= 0 && currentLesson < LESSONS.length) {
        if (e.key === "ArrowLeft") {
          if (currentLesson > 0) goTo(currentLesson - 1); else goHome();
          e.preventDefault();
        } else if (e.key === "ArrowRight") {
          handleNext(currentLesson);
          e.preventDefault();
        } else if (e.key === "Escape") {
          goHome();
          e.preventDefault();
        }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [currentLesson, showResetConfirm]);

  // Derive phase groups from lesson data itself (not hardcoded indices)
  // so adding/removing lessons doesn't break the sidebar
  const phaseGroups = (() => {
    const groups = [];
    const labelFor = { "Phase 1": "Phase 1 · Foundation", "Phase 2": "Phase 2 · Build", "Phase 3": "Phase 3 · Agentic", "Phase 4": "Phase 4 · Industry" };
    LESSONS.forEach((l, i) => {
      const last = groups[groups.length - 1];
      if (last && last.phase === l.phase) { last.indices.push(i); }
      else { groups.push({ phase: l.phase, label: labelFor[l.phase] || l.phase, indices: [i] }); }
    });
    return groups;
  })();

              {[[String(LESSONS.length), "Lessons"], ["4", "Phases"], ["~6", "Months"], ["3+", "Quizzes/Lesson"]].map(([val, label]) => (
                <div key={label} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 70 }}>
                  <span style={{ fontSize: 24, fontWeight: 700 }}>{val}</span>
                  <span style={{ fontFamily: "monospace", fontSize: 9, color: "#7a6e5f", letterSpacing: "0.12em", textTransform: "uppercase" }}>{label}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "#ede7d6", border: "1px solid #c8bfaa", borderRadius: 10, padding: "14px 20px", marginBottom: 28, textAlign: "left", fontSize: 13, lineHeight: 1.8, color: "#2a2018" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#7a6e5f", marginBottom: 8 }}>Each lesson includes</div>
              {currentTrack === "mba"
                ? "📹 Curated video from leading business educators · 📖 Written content with aerospace industry examples · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts grounded in real aerospace business situations"
                : currentTrack === "am"
                ? "📹 Curated video from leading AM educators · 📖 Written content with aerospace tooling and parts examples · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts for shop-floor application"
                : currentTrack === "motor"
                ? "📹 Curated video from leading motor educators · 📖 Written content with applied aerospace and precision examples · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts grounded in motor specification, manufacturing, and troubleshooting"
                : currentTrack === "embed"
                ? "📹 Curated video from leading embedded and industrial educators · 📖 Written content covering hobby and industrial platforms · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts on hardening, real-time, and production-grade design"
                : "📹 Curated video from a top AI educator · 📖 Written content with aerospace examples · 🧩 Multiple-choice quizzes with full explanations · 💡 Practical callouts for manufacturing applications"}
            </div>
            {completed.size > 0 && (
              <div style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f", marginBottom: 14 }}>
                You have completed {completed.size} of {LESSONS.length} lessons — pick up where you left off.
              </div>
            )}
            <button onClick={() => {
                if (completed.size === 0) { goTo(0); return; }
                if (completed.size >= LESSONS.length) { goTo(-2); return; }
                // Find the first incomplete lesson
                const firstIncomplete = LESSONS.findIndex((_, i) => !completed.has(i));
                goTo(firstIncomplete >= 0 ? firstIncomplete : 0);
              }}
              aria-label={completed.size > 0 ? "Continue course from where you left off" : "Begin the course"}
              style={{ fontFamily: "monospace", fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", padding: "14px 40px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 8, cursor: "pointer" }}>
              {completed.size >= LESSONS.length ? "See Course Summary →" : completed.size > 0 ? "Continue Course →" : "Begin Course →"}
            </button>
          </div>
        )}

        {currentLesson === -3 && (
          <FinalExamView
            key={`exam-${currentTrack}-${resetToken}`}
            onExit={goHome}
            isComfortable={isComfortable}
            pool={FINAL_EXAM}
            certificateTitle={certificateTitle}
            certificateSubtitle={certificateSubtitle}
          />
        )}

        {currentLesson === -2 && (
          <div style={{ maxWidth: isComfortable ? 760 : 600, margin: "0 auto", padding: isComfortable ? "80px 40px" : "64px 32px", textAlign: "center" }}>
            <div style={{ fontSize: 70, marginBottom: 18 }}>🎓</div>
            <h1 style={{ fontSize: 40, fontWeight: 700, letterSpacing: "-0.03em", marginBottom: 10 }}>Course Complete!</h1>
            <p style={{ fontSize: 15, fontWeight: 300, color: "#7a6e5f", lineHeight: 1.78, marginBottom: 28 }}>
              {currentTrack === "mba"
                ? `You have completed all ${LESSONS.length} lessons across 4 phases. You now have the vocabulary, frameworks, and confidence to engage business discussions as a peer — from financial statements to capital budgeting to executive business cases.`
                : currentTrack === "am"
                ? `You have completed all ${LESSONS.length} lessons across 4 phases. You now have the hands-on knowledge to set up, calibrate, troubleshoot, and qualify FDM and resin printing in an aerospace context, plus the framework to specify metal AM intelligently and build the business case for AM adoption.`
                : currentTrack === "motor"
                ? `You have completed all ${LESSONS.length} lessons across 4 phases. You now have the knowledge to specify, inspect, and troubleshoot electric motors across the major motor types — and the discipline to build a defensible motor selection from blank page to validated recommendation.`
                : currentTrack === "embed"
                ? `You have completed all ${LESSONS.length} lessons across 4 phases. You now understand Arduino, Raspberry Pi, ESP32, and PLCs as full peers — and the discipline of hardening hobby platforms for industrial reliability, complete with a worked architecture for both hobby and production-grade versions of the same system.`
                : `You have completed all ${LESSONS.length} lessons across 4 phases. You now have the knowledge to build real AI applications for aerospace manufacturing and the business acumen to deploy them responsibly.`}
            </p>
            <div style={{ background: "#ede7d6", border: "1px solid #c8bfaa", borderRadius: 12, padding: 24, textAlign: "left", marginBottom: 24 }}>
              <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.14em", color: "#7a6e5f", textTransform: "uppercase", marginBottom: 12 }}>Your next steps</div>
              <div style={{ fontSize: 14, lineHeight: 2.0, color: "#2a2018" }}>
                {currentTrack === "mba" ? (
                  <>
                    → Read your company's most recent 10-K with the analytical lens from Lesson 5<br/>
                    → Build a one-page executive business case for a real opportunity in your operation<br/>
                    → Shadow a program review and listen for EVM metrics in action<br/>
                    → Practice the negotiation frameworks on an upcoming internal budget discussion<br/>
                    → Schedule time with a senior leader to discuss your career path
                  </>
                ) : currentTrack === "am" ? (
                  <>
                    → Identify one tooling opportunity in your facility (jig, fixture, mandrel, drill guide)<br/>
                    → Build a one-page AM business case using the Lesson 14 framework<br/>
                    → Calibrate your shop printer end-to-end (Z-offset, e-steps, flow, temp tower)<br/>
                    → Print and document a first-article internal tool to AS9100 traceability standards<br/>
                    → Schedule 30 minutes with your manager to present the opportunity
                  </>
                ) : currentTrack === "motor" ? (
                  <>
                    → Pick a real motor in your facility and read its datasheet end-to-end (extract Kt and continuous current)<br/>
                    → Use the Lesson 14 capstone template to spec a replacement motor for one application<br/>
                    → Inspect a wound stator using the Lesson 10 incoming inspection checklist<br/>
                    → Run a vibration / current trend on a critical motor and start a condition-monitoring log<br/>
                    → Schedule 30 minutes with your manager to discuss the motor opportunity
                  </>
                ) : currentTrack === "embed" ? (
                  <>
                    → Identify a real internal automation use case at your facility<br/>
                    → Architect both versions using the Lesson 14 capstone template (hobby + production)<br/>
                    → Build the hobby version on Arduino/ESP32/Pi to validate requirements<br/>
                    → Read your facility's PLC code (ladder or ST) for one real installed system to gain fluency<br/>
                    → Schedule 30 minutes with controls engineering to discuss platform decisions
                  </>
                ) : (
                  <>
                    → Pick your top AI use case from your Lesson 12 (Aerospace Use Cases) analysis<br/>
                    → Complete the one-page business case template from Lesson 14 (Business Case)<br/>
                    → Set up your Windows dev environment if you have not yet<br/>
                    → Build a working prototype of your top priority use case<br/>
                    → Schedule 30 minutes with your manager to present the opportunity
                  </>
                )}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => goTo(-3)} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 28px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>Take Final Exam →</button>
              <button onClick={goHome} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "12px 28px", background: "transparent", color: "#7a6e5f", border: "1px solid #c8bfaa", borderRadius: 6, cursor: "pointer" }}>← Course Home</button>
            </div>
          </div>
        )}

        {currentLesson >= 0 && currentLesson < LESSONS.length && (
          <LessonView
            key={`lesson-${currentTrack}-${currentLesson}-${resetToken}`}
            lesson={LESSONS[currentLesson]}
            lessonIdx={currentLesson}
            totalLessons={LESSONS.length}
            isCompleted={completed.has(currentLesson)}
            isComfortable={isComfortable}
            onPrev={() => currentLesson > 0 ? goTo(currentLesson - 1) : goHome()}
            onNext={() => handleNext(currentLesson)}
          />
        )}
      </main>

      {/* Reset confirmation modal — in-app, works in sandboxed iframes */}
      {showResetConfirm && (
        <div
          role="dialog"
          aria-modal="true"
          aria-labelledby="reset-modal-title"
          onClick={() => setShowResetConfirm(false)}
          style={{
            position: "fixed", inset: 0, zIndex: 99999,
            background: "rgba(26,18,8,0.72)",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 20,
            backdropFilter: "blur(3px)",
            WebkitBackdropFilter: "blur(3px)",
          }}>
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              maxWidth: 440, width: "100%",
              background: "#f5f0e8",
              borderRadius: 12,
              padding: "28px 28px 22px",
              boxShadow: "0 20px 60px rgba(0,0,0,0.5)",
              border: "1px solid #c8bfaa",
            }}>
            <h2 id="reset-modal-title" style={{ fontSize: 22, fontWeight: 700, color: "#1a1208", margin: "0 0 10px", letterSpacing: "-0.01em" }}>
              Reset all progress?
            </h2>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: "#5a4e3f", margin: "0 0 22px" }}>
              This will clear your completed lessons, quiz answers, any final exam attempt in progress, and your display preferences. This cannot be undone.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", flexWrap: "wrap" }}>
              <button
                onClick={() => setShowResetConfirm(false)}
                autoFocus
                aria-label="Cancel reset"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "transparent", color: "#7a6e5f",
                  border: "1px solid #c8bfaa", borderRadius: 6,
                  cursor: "pointer",
                }}>
                Cancel
              </button>
              <button
                onClick={confirmReset}
                aria-label="Confirm reset — clear all progress"
                style={{
                  fontFamily: "monospace", fontSize: 11,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  padding: "10px 20px",
                  background: "#c84b11", color: "#f5f0e8",
                  border: "none", borderRadius: 6,
                  cursor: "pointer", fontWeight: 700,
                }}>
                Yes, Reset
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ERROR BOUNDARY ────────────────────────────────────────────────────────────
// Catches any render error inside the course app and shows a recovery screen
// instead of a blank white page. Users can reset progress and reload if the
// error was caused by corrupted saved state.
class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, errorMsg: error?.message || "Unknown error" };
  }
  componentDidCatch(error, info) {
    // Log to console for debugging — silent in production would be fine too
    console.error("Course app crashed:", error, info);
  }
  handleReset = () => {
    // ErrorBoundary doesn't know active track, so wipe all course data to recover cleanly
    try {
      localStorage.removeItem("ai-course-progress");
      localStorage.removeItem("mba-course-progress");
      localStorage.removeItem("course-prefs");
    } catch (e) {}
    window.location.reload();
  };
  handleReload = () => {
    window.location.reload();
  };
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <div role="alert" style={{
        minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center",
        padding: 24, fontFamily: "Georgia, serif", background: "#f5f0e8", color: "#1a1208",
      }}>
        <div style={{ maxWidth: 500, textAlign: "center" }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>⚠️</div>
          <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 10, color: "#1a1208" }}>
            Something went wrong
          </h1>
          <p style={{ fontSize: 14, color: "#7a6e5f", lineHeight: 1.6, marginBottom: 20 }}>
            The course hit an unexpected error. Your saved progress is probably fine — try reloading first. If that doesn't help, resetting will clear saved data and start you fresh.
          </p>
          <div style={{ fontFamily: "monospace", fontSize: 11, color: "#8b2020", background: "#fef3e2", border: "1px solid #c84b11", borderRadius: 6, padding: "10px 14px", marginBottom: 20, textAlign: "left", wordBreak: "break-word" }}>
            {this.state.errorMsg}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={this.handleReload}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "#1a1208", color: "#f5f0e8", border: "none", borderRadius: 6, cursor: "pointer" }}>
              Reload Page
            </button>
            <button onClick={this.handleReset}
              style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", background: "transparent", color: "#7a6e5f", border: "1px solid #c8bfaa", borderRadius: 6, cursor: "pointer" }}>
              Reset Progress & Reload
            </button>
          </div>
        </div>
      </div>
    );
  }
}

function App() {
  return (
    <ErrorBoundary>
      <CourseApp />
    </ErrorBoundary>
  );
}


// ─── MOUNT ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
