// ─── PHASE 3 — MANUFACTURING & CONSTRUCTION ──────────────────────────────────

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Stators, Rotors & Lamination Stacks",
  subtitle: "Silicon steel, lamination thickness vs eddy losses, slot/pole counts, skew — why construction details show up in your acoustics.",
  time: "40 min", type: "Construction",
  video: { id: "auFtTV8_RbM", title: "Electric Motor Stator Manufacturing — Progressive Die Stamping" },
  content: [
    { type: "p", text: "The magnetic core of every motor is made from stacks of thin steel sheets — laminations — not from solid steel. This single construction detail drives a lot of motor design and a lot of motor performance. This lesson is about why." },

    { type: "h3", text: "Why Laminate the Core" },
    { type: "p", text: "When you put a changing magnetic field through a conductor, you induce eddy currents that flow in closed loops perpendicular to the field. Eddy currents dissipate energy as I²R heating in the core — that's pure loss. Solid-steel cores in AC magnetic circuits become inefficient hot bricks." },
    { type: "p", text: "Laminations break up those eddy current loops. Each thin sheet (typically 0.2 to 0.65 mm) is electrically insulated from its neighbors by an oxide or organic coating. Eddy currents can still flow within each lamination, but only in tiny loops — and the I²R loss falls roughly as the square of lamination thickness. Halve the lamination thickness, quarter the eddy losses." },

    { type: "h3", text: "Silicon Steel and Why It's Special" },
    { type: "p", text: "Lamination steel isn't just any steel. It's typically 'electrical steel' or 'silicon steel' — low-carbon iron alloyed with 1-3% silicon. The silicon raises the steel's electrical resistivity (which further reduces eddy currents) and improves magnetic permeability while reducing hysteresis losses. Modern grades can be **non-oriented** (NO, isotropic in-plane, used in rotating machinery) or **grain-oriented** (GO, anisotropic, used in transformers)." },
    { type: "ul", items: [
      "**M-19 / M-15 / M-43** — common US electrical steel grades. Lower numbers = lower losses, higher cost.",
      "**Cobalt-iron alloys (Hiperco 50, Vacoflux 50)** — used in aerospace where weight matters. Higher saturation flux density (~2.4 T vs 2.0 T) means smaller motor for same power. Expensive.",
      "**Amorphous metals** — newer technology, very low loss, but tricky to manufacture. Niche applications."
    ]},

    { type: "h3", text: "Lamination Thickness Tradeoffs" },
    { type: "p", text: "Thinner laminations = lower eddy losses but more expensive (more sheets, more insulation, more handling) and lower stacking factor (more insulation/slot, less iron). Typical thicknesses:" },
    { type: "ul", items: [
      "**0.65 mm** — line-frequency (50/60 Hz) industrial motors. Eddy losses manageable at low frequency.",
      "**0.35 mm** — high-efficiency industrial, automotive, and aerospace motors. Standard for variable-frequency PMSM/BLDC.",
      "**0.20 mm and thinner** — high-frequency motors (10 kHz+ electrical), aerospace high-speed motors, optical scanners. Eddy losses scale with frequency squared, so high-speed motors must use thin laminations."
    ]},

    { type: "h3", text: "Slot and Pole Counts" },
    { type: "p", text: "The number of stator slots and rotor poles drives a lot of motor character:" },
    { type: "ul", items: [
      "**Pole count** — more poles means lower speed at given frequency (n_sync = 120f/p). Higher pole counts give higher torque density and lower acoustic noise but worse high-speed performance.",
      "**Slot count** — more slots means smoother torque (less ripple) but more complex winding and higher cost. Common ratios: 12-slot 10-pole, 12-slot 14-pole, 9-slot 6-pole, 6-slot 4-pole.",
      "**Slot/pole combinations** — chosen carefully to minimize cogging and harmonics. Some combinations have known good performance; others have pathological torque ripple."
    ]},

    { type: "h3", text: "Skew" },
    { type: "p", text: "Cogging torque comes from the rotor magnets aligning with stator teeth (the magnetic 'detent' positions). One common mitigation is **skew** — twisting either the stator slots or the rotor magnets along the axis so that not all of the cogging-producing geometry aligns at once. Skew typically reduces cogging by 50-90% at the cost of a small (1-3%) reduction in average torque. Most aerospace and high-precision motors are skewed." },

    { type: "h3", text: "Why Construction Shows in Performance" },
    { type: "p", text: "An experienced motor diagnostician can often guess construction from how a motor sounds. A buzzing, gravelly noise at speed often indicates excessive cogging from an unskewed rotor. A high-frequency whine that scales with speed suggests electrical excitation of a structural mode. A grinding sound with periodic accent points to a damaged lamination edge or rotor unbalance. Most motor 'mysteries' resolve back to construction details once you know what to listen for." },

    { type: "callout", style: "key",
      text: "**The big takeaway.** When you spec a motor, the lamination grade and thickness, slot/pole combination, and skew strategy all show up in real-world behavior — torque ripple, audible noise, efficiency, high-speed performance. These aren't just internal manufacturing details; they're the things that determine whether the motor is right for your application." },
  ],
  quizzes: [
    {
      question: "Why are motor cores made from stacks of thin laminations instead of solid steel?",
      options: [
        "It's cheaper",
        "Laminations break up eddy current loops, dramatically reducing I²R losses in the core",
        "Solid steel can't be magnetized",
        "Laminations are stronger"
      ],
      correct: 1,
      explanation: "Eddy current losses in a solid core scale roughly with thickness squared. Laminating into thin insulated sheets (0.2-0.65 mm typical) restricts eddy current loops and reduces losses dramatically. This is why all AC and variable-frequency motors have laminated cores."
    },
    {
      question: "A motor must operate at high electrical frequency (10 kHz+). Which lamination thickness is most appropriate?",
      options: ["0.65 mm", "0.35 mm", "0.20 mm or thinner", "Solid steel"],
      correct: 2,
      explanation: "Eddy losses scale with frequency squared. At high frequencies, you need very thin laminations (≤0.20 mm) to keep losses manageable. 0.65 mm is typical for line-frequency (50/60 Hz) motors only."
    },
    {
      question: "What does skewing the rotor (or stator slots) accomplish?",
      options: [
        "Reduces motor weight",
        "Reduces cogging torque (50-90% typical) at the cost of 1-3% reduction in average torque",
        "Improves cooling",
        "Eliminates the need for laminations"
      ],
      correct: 1,
      explanation: "Skew prevents all the cogging-producing geometry from aligning at the same axial position. The result is much smoother torque output (lower cogging, less acoustic noise) at a small penalty in average torque."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Coil Winding",
  subtitle: "Concentrated vs distributed, fill factor, insulation systems — what to look for inspecting a wound stator.",
  time: "40 min", type: "Construction",
  video: { id: "DN5qQqOLTIg", title: "Fully Automatic AC Motor Stator Winding Line Manufacturing Process" },
  content: [
    { type: "p", text: "Once the laminations are stacked, copper has to go in the slots. How that copper gets there — and how much fits — drives motor torque density, efficiency, and reliability. Coil winding is the most labor-intensive step in motor manufacturing and the most variable in quality." },

    { type: "h3", text: "Concentrated vs Distributed Windings" },
    { type: "ul", items: [
      "**Concentrated windings** — each coil wraps around a single stator tooth. Short end turns (less wasted copper), simpler manufacturing, better fault tolerance (one phase fails, the others still work). Used in BLDC, segmented PMSM, and modern high-efficiency designs. Trapezoidal back-EMF naturally results.",
      "**Distributed windings** — each coil spans multiple stator slots. Longer end turns, more complex winding process, but smoother sinusoidal back-EMF for PMSM applications and traditional construction for AC induction. Dominant in industrial induction motors."
    ]},

    { type: "h3", text: "Winding Methods" },
    { type: "ul", items: [
      "**Hand winding** — for prototypes, repairs, very large motors. High labor cost, variable quality, but maximum flexibility.",
      "**Needle winding** — automated, used for concentrated windings in BLDC stators. A needle traverses around each tooth laying wire. Excellent fill factor, good repeatability.",
      "**Flyer winding** — automated, used for concentrated windings on segmented stators. A rotating arm winds onto each removable segment, then segments are assembled into the stator. Highest fill factor (~75%), highest cost equipment.",
      "**Coil insertion** — for distributed windings in induction motors. Coils are pre-formed, then mechanically inserted into the slots through a slot opening. The classic high-volume induction motor process.",
      "**Hairpin winding** — newer, used in EV traction motors. Rectangular wire formed into hairpins, inserted into slots, then welded at the ends. Highest fill factor possible (~80%+), best thermal performance, complex tooling."
    ]},

    { type: "h3", text: "Fill Factor" },
    { type: "p", text: "**Fill factor** = (cross-sectional area of copper) / (cross-sectional area of slot). Higher = more copper for given slot, lower I²R losses, more torque per kg. Real-world numbers:" },
    { type: "ul", items: [
      "**Hand-wound round wire**: 30-45%",
      "**Needle-wound concentrated**: 50-65%",
      "**Flyer-wound segmented**: 70-78%",
      "**Hairpin (rectangular wire)**: 80%+",
      "**Theoretical maximum (perfectly packed circles)**: ~91%"
    ]},
    { type: "p", text: "Going from 50% to 70% fill factor is roughly a 40% increase in copper, which translates to substantially lower copper losses and higher torque density. This is why hairpin and segmented constructions are taking over high-performance applications." },

    { type: "h3", text: "Insulation Systems" },
    { type: "p", text: "Motor insulation is hierarchical:" },
    { type: "ul", items: [
      "**Magnet wire enamel** — the polymer coating on each strand of wire. Polyimide (Kapton-equivalent), polyamide-imide, or polyester-imide. Thermal class F to R (155-220 °C).",
      "**Slot insulation** — paper or polymer film lining the slot, separating coil from steel core. Nomex (aramid), Mylar, or Kapton. Same thermal classes.",
      "**Phase-to-phase insulation** — separates different phase coils where they cross at end turns. Tape or molded barriers.",
      "**Encapsulation/varnish** — entire wound assembly impregnated with epoxy or polyester resin. Mechanically locks coils, improves heat transfer, blocks moisture. Vacuum pressure impregnation (VPI) is the high-end process."
    ]},

    { type: "h3", text: "Inspecting a Wound Stator" },
    { type: "p", text: "Things a technician should look for when receiving or inspecting a wound stator:" },
    { type: "ul", items: [
      "**End turn dressing** — should be uniform, no loose wires, no sharp bends.",
      "**Slot fill consistency** — should look fully packed without bulges or gaps.",
      "**Connection joint quality** — soldered or welded joints should be smooth and shiny, not granular.",
      "**Insulation integrity** — no nicks, scrapes, or wear marks visible. Hi-pot test confirms.",
      "**Lead identification** — phase leads correctly labeled and oriented per drawing.",
      "**Resistance test** — phase-to-phase and phase-to-ground. Phase resistances should match each other within ~3%."
    ]},

    { type: "callout", style: "key",
      text: "**Why this matters for the technician.** A motor's lifetime is largely determined by its insulation system. Most motor failures (apart from bearings) trace back to insulation degradation — heat, contamination, or mechanical damage breaking down the insulation hierarchy. Knowing what good winding looks like is half of motor incoming inspection." },
  ],
  quizzes: [
    {
      question: "What's the primary advantage of hairpin winding (rectangular wire) over conventional round-wire winding?",
      options: [
        "Lower cost",
        "Much higher fill factor (80%+ vs 50-65%), giving lower I²R losses and higher torque density",
        "Easier manual winding",
        "Better magnet retention"
      ],
      correct: 1,
      explanation: "Rectangular hairpin wires pack more efficiently than round wires, achieving fill factors well above what round-wire methods can. This translates directly to lower copper losses and higher torque per kg — which is why hairpin winding dominates EV traction motors and is moving into aerospace."
    },
    {
      question: "A motor with concentrated windings (one coil per stator tooth) typically has which characteristics?",
      options: [
        "Long end turns and sinusoidal back-EMF",
        "Short end turns, trapezoidal back-EMF, fault-tolerant phases — common in BLDC",
        "Cannot use permanent magnets",
        "Always uses hand winding"
      ],
      correct: 1,
      explanation: "Concentrated windings have each coil wrapped around a single tooth, giving short end turns (less wasted copper) and naturally trapezoidal back-EMF. They're standard for BLDC and modern segmented PMSM. Distributed windings span multiple slots and give sinusoidal back-EMF."
    },
    {
      question: "When inspecting a newly wound stator, what's the simplest electrical sanity check?",
      options: [
        "Megohmeter test only",
        "Measure phase-to-phase resistance — all three phases should match each other within ~3%",
        "Spin it by hand to feel for cogging",
        "Apply rated voltage and watch for smoke"
      ],
      correct: 1,
      explanation: "Phase resistance imbalance suggests a winding error (wrong number of turns, broken strand, miswiring). It's a quick incoming-inspection check. Hi-pot/megger tests check insulation integrity. Phase resistance should match within a few percent on a healthy stator."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Magnets, Balancing & Assembly",
  subtitle: "NdFeB vs SmCo, dynamic balancing, runout consequences, ITAR on rare earths.",
  time: "40 min", type: "Construction",
  video: { id: "KQRBeO12vgE", title: "Dynamic Balancing on Electric, AC Motor and DC Motors — Global Electronic Services" },
  content: [
    { type: "p", text: "The last steps in motor manufacturing — magnetizing, balancing, assembly — are where a motor's reliability is largely determined. They're also where supply chain politics intrudes into engineering decisions in unexpected ways." },

    { type: "h3", text: "Permanent Magnet Materials" },
    { type: "ul", items: [
      "**NdFeB (Neodymium-Iron-Boron)** — the workhorse. Highest energy product (BHmax) of any commercial magnet, ~30-50 MGOe. Cheap per energy density. Limitations: temperature derate (standard grades lose magnetism above 80 °C, high-temp grades to 200 °C), corrosion (require nickel or epoxy coating), supply chain (China dominates rare earth mining and refining).",
      "**SmCo (Samarium-Cobalt)** — older but excellent. Lower energy product (~20-30 MGOe) but vastly better high-temperature performance (up to 350 °C operating). Naturally corrosion-resistant. More expensive per unit of magnetism. Used in aerospace high-temperature applications, defense, and where temperature stability is paramount.",
      "**Ferrite (ceramic)** — cheapest, weakest (~3-5 MGOe). Used in low-cost low-performance applications (consumer fans, simple BLDC). Robust against demagnetization.",
      "**AlNiCo** — mostly historical now. Excellent temperature stability, mediocre energy product. Still used in some specialty instruments."
    ]},

    { type: "h3", text: "Magnetization" },
    { type: "p", text: "Magnets are typically pressed and sintered as unmagnetized 'green' parts, then magnetized in a final step using a high-current pulse coil that briefly saturates the magnet's magnetic domains in the desired orientation. For motor applications, magnets are usually radially or diametrically magnetized. After magnetization, magnets are extremely difficult to handle safely — pinch hazards are real, and a dropped sintered NdFeB block will shatter (it's brittle ceramic)." },
    { type: "p", text: "Some manufacturers magnetize after assembly into the rotor — fixturing the magnet positions before applying the magnetizing pulse. This solves the handling-magnetized-magnets problem but requires a powerful magnetizer and careful design." },

    { type: "h3", text: "Why Balancing Matters" },
    { type: "p", text: "Any rotor will have small mass asymmetries from manufacturing tolerances (lamination stamping variation, magnet weight variations, shaft eccentricity, etc.). At rest these don't matter. At speed, an unbalance produces a centrifugal force F = m × r × ω² — and at high speeds, even tiny mass imbalances generate large forces." },
    { type: "p", text: "Consequences of unbalance:" },
    { type: "ul", items: [
      "**Vibration** — measurable, audible, transmitted to the structure.",
      "**Bearing wear** — radial loads from unbalance accelerate bearing failure.",
      "**Audible noise** — most motor 'humming' has an unbalance component.",
      "**Reduced bearing life** — typically the dominant life-limiting effect."
    ]},

    { type: "h3", text: "Dynamic Balancing" },
    { type: "p", text: "Balancing is performed on a balancing machine: the rotor is spun at design speed (or a controlled lower speed), and sensors measure the residual vibration. Computer algorithms tell the operator where to add or remove material — typically by drilling small balance holes in non-critical locations of the rotor. Industry-standard balancing classes (ISO 1940):" },
    { type: "ul", items: [
      "**G16, G6.3** — Standard for large industrial motors and pumps.",
      "**G2.5** — Standard for high-speed industrial motors, machine tool spindles, larger BLDC motors.",
      "**G1.0** — High-precision: spindles, larger gimbals.",
      "**G0.4** — Ultra-precision: turbomolecular pumps, high-end optical scanners, gyroscopes."
    ]},
    { type: "p", text: "Each class is a tighter limit on residual mass moment per unit rotor mass. Higher classes (G0.4) require more time on the balancing machine and tighter material tolerances upstream." },

    { type: "h3", text: "Runout & Concentricity" },
    { type: "p", text: "Beyond mass balance, the rotor must also be geometrically concentric. **Runout** is the geometric deviation of a feature (shaft surface, magnet outer diameter) from perfect rotational symmetry. Even a perfectly balanced rotor with high runout will produce torque ripple (varying air gap → varying flux), audible noise, and bearing wear." },
    { type: "p", text: "Typical aerospace motor runout specs are 5-25 µm at the shaft and 25-50 µm at the magnet outer diameter. Higher precision applications (motor-driven optical scanners, gimbals) can require sub-micron runout. The GD&T track later in this curriculum goes deep on runout — for motors, the takeaway is: balance and runout are independent specifications, both required, both measurable." },

    { type: "h3", text: "ITAR & Rare-Earth Magnets" },
    { type: "p", text: "Two policy realities affect motor sourcing:" },
    { type: "ul", items: [
      "**Rare-earth supply chain** — China dominates Nd, Sm, and Dy mining and refining. For aerospace and defense customers, US-source or allied-source magnets are increasingly required.",
      "**ITAR/EAR controls** — high-performance NdFeB and especially SmCo magnets above certain energy products may be export-controlled. Specific high-temp aerospace grades have been added to USML categories.",
      "**Section 232 / DFARS** — defense contracts often require US- or allied-country magnet sourcing. Adds significant cost and lead time."
    ]},

    { type: "callout", style: "warning",
      text: "**The aerospace magnet trap.** A consumer-grade NdFeB magnet that performs perfectly in a 25 °C lab will demagnetize in a 100 °C aerospace bay. Always check the magnet's reversible temperature coefficient and irreversible loss curves against the actual operating temperature plus margin. SmCo's high-temperature stability is the reason aerospace pays for it." },
  ],
  quizzes: [
    {
      question: "Which magnet type is best for a high-temperature aerospace application (continuous 200 °C+ operation)?",
      options: ["Standard NdFeB", "Samarium Cobalt (SmCo)", "Ceramic ferrite", "AlNiCo"],
      correct: 1,
      explanation: "SmCo can operate continuously up to ~350 °C, vs standard NdFeB which derates above ~80 °C and demagnetizes above its rated temperature. SmCo costs more per unit magnetism but is the standard choice for aerospace high-temperature applications."
    },
    {
      question: "Why does even a small static rotor unbalance cause large vibration at speed?",
      options: [
        "Heat expansion",
        "Centrifugal force scales with the square of angular velocity (F = m × r × ω²) — small imbalances produce large forces at high speed",
        "Magnetic coupling amplifies it",
        "Bearings amplify it"
      ],
      correct: 1,
      explanation: "Centrifugal force from unbalance grows with the square of speed. A 1-gram unbalance at 1 cm radius produces 0.1 N at 100 rad/s but 100 N at 10,000 rad/s — that's the squared scaling. This is why high-speed rotors require tighter balance classes."
    },
    {
      question: "ISO 1940 balance class G2.5 describes what?",
      options: [
        "A material specification",
        "A balance quality grade — tighter than G6.3, looser than G1.0; standard for many industrial high-speed motors and machine tool spindles",
        "An efficiency rating",
        "A safety certification"
      ],
      correct: 1,
      explanation: "ISO 1940 specifies balance quality grades from G4000 (very loose, large slow rotors) to G0.4 (ultra-precision). G2.5 is a common spec for industrial high-speed motors and machine tool spindles. Aerospace and precision applications often need G1.0 or tighter."
    },
  ]
},

// ─── PHASE 4 — DRIVES, FAILURE & APPLICATION ─────────────────────────────────

{
  phase: "Phase 4", phaseColor: "#c84b11",
  title: "Motor Drives & Control Electronics",
  subtitle: "H-bridges, three-phase inverters, PWM, dead time, EMI/EMC — how to read a drive datasheet.",
  time: "45 min", type: "Drives",
  video: { id: "YYMsS50x1UY", title: "H Bridge Motor Control Basics Explained" },
  content: [
    { type: "p", text: "Most modern motors don't run on plain DC or AC anymore — they run on whatever waveform the drive electronics synthesize. The drive is half the motor system, and it's where most of the failure modes, EMI issues, and integration headaches live." },

    { type: "h3", text: "The H-Bridge" },
    { type: "p", text: "The basic building block of motor control is the H-bridge: four switches (MOSFETs or IGBTs) arranged in an 'H' pattern that lets you apply voltage across a motor in either polarity. Close two diagonally opposite switches → forward voltage. Close the other diagonal → reverse voltage. Open all → freewheel. Modulate which combination is closed at high frequency (PWM) → variable effective voltage between full-forward and full-reverse." },
    { type: "p", text: "An H-bridge drives a brushed DC motor. For three-phase motors (BLDC, PMSM, induction), three H-bridge half-bridges are combined into a **three-phase inverter** with six switches total. Each phase output can be high (top switch on) or low (bottom switch on) at any moment, and the combination of three high/low states determines the motor's instantaneous voltage." },

    { type: "h3", text: "PWM Basics" },
    { type: "p", text: "Pulse Width Modulation: switch the bridge transistors on and off at high frequency (typically 5-50 kHz), and the average voltage seen by the motor is determined by the duty cycle. The motor's inductance smooths the high-frequency pulses into roughly constant current. Higher PWM frequency = smoother current but higher switching losses; lower PWM frequency = more efficient switching but more current ripple and potentially audible noise." },
    { type: "p", text: "Modern PMSM/BLDC drives use **Space Vector PWM (SVPWM)** — a more sophisticated technique that maximizes the available output voltage and gives smoother torque. Most engineers don't need to understand SVPWM in detail; they just need to know it's better than basic sine-triangle PWM and it's standard in modern drives." },

    { type: "h3", text: "Dead Time" },
    { type: "p", text: "Critical detail: in any half-bridge (top + bottom switch), if both switches are on simultaneously, you get **shoot-through** — a direct short from supply to ground that fries both transistors in microseconds. To prevent this, the drive inserts **dead time** (typically 0.5-3 µs) between turning one switch off and the other on." },
    { type: "p", text: "Dead time is necessary but it distorts the output voltage waveform, especially at low duty cycles. Modern drives compensate for dead-time distortion in the control algorithm. When you see torque ripple or current waveform distortion in a drive, dead-time effects are a likely cause." },

    { type: "h3", text: "Regenerative Braking" },
    { type: "p", text: "When you decelerate a motor, kinetic energy has to go somewhere. With a four-quadrant drive (capable of motoring and generating in both directions), the energy can flow back into the DC bus — **regenerative braking**. Two issues:" },
    { type: "ul", items: [
      "**The DC bus voltage rises** as energy comes back. If there's a battery, it charges. If there's just capacitance, the voltage climbs and can damage the drive.",
      "**Brake resistor** — a power resistor switched onto the bus to dissipate excess energy as heat when the bus voltage rises. Standard accessory for industrial drives. The resistor is sized for the worst-case stopping energy."
    ]},

    { type: "h3", text: "EMI/EMC Realities" },
    { type: "p", text: "PWM-driven motors are EMI sources. The fast voltage transitions (kV/µs slew rates) couple capacitively to nearby cables and radiate from motor leads. Real-world consequences:" },
    { type: "ul", items: [
      "**Common-mode currents** — the motor's voltage swings up and down as a whole, dumping current through stray capacitance to ground. Big problem for nearby sensitive electronics.",
      "**Bearing currents** — common-mode voltages can drive currents through the motor bearings, eroding the rolling elements. EDM-pitting damage. Mitigated by insulated bearings or shaft grounding brushes.",
      "**Conducted EMI** — high-frequency noise on motor cables and DC bus. Filters and shielded cables required.",
      "**Radiated EMI** — RF emissions from cables and motor enclosures. Shielding, filters, and cable management required for compliance."
    ]},

    { type: "h3", text: "Reading a Drive Datasheet" },
    { type: "p", text: "Key parameters to extract:" },
    { type: "ul", items: [
      "**Continuous output current** — what the drive can deliver indefinitely at rated cooling.",
      "**Peak current and duration** — typical 200-300% of continuous for 1-3 seconds.",
      "**Switching frequency (PWM frequency)** — affects current smoothness and switching losses. Often configurable.",
      "**Input voltage range** — motor drives have minimum and maximum DC bus voltages.",
      "**Control modes** — torque, velocity, position; analog, digital, fieldbus interfaces.",
      "**Communication protocols** — EtherCAT, CANopen, EtherNet/IP, etc. for integration.",
      "**Safety features** — STO (Safe Torque Off), SS1 (Safe Stop), and other functional safety options.",
      "**Environmental ratings** — operating temperature range, humidity, vibration. Critical for aerospace integration."
    ]},

    { type: "callout", style: "key",
      text: "**The drive is half the motor.** A great motor with a poor drive is a poor system. When specifying motor systems, treat motor and drive as a co-designed pair — and make sure your drive datasheet shows compatibility with your specific motor model. Mismatches cause subtle problems that are very hard to debug." },
  ],

  video: { id: "3zEzh5-f4KA", title: "How to Get Started with Raspberry Pi — Complete Beginner's Guide" },
  content: [
    { type: "p", text: "The Raspberry Pi changed embedded computing by making 'a real Linux computer' a $35 part. Single-board computers (SBCs) sit in a different niche from microcontrollers: they bring multitasking, networking, file systems, and the entire Linux software ecosystem to embedded applications — at the cost of determinism, boot time, and power." },

    { type: "h3", text: "The SBC Family" },
    { type: "ul", items: [
      "**Raspberry Pi (5, 4, 3, Zero series)** — the dominant consumer SBC. Pi 5 has quad-core ARM Cortex-A76, up to 8 GB RAM, USB 3, dual 4K displays. Pi Zero 2 W is the tiny low-cost variant. Solid software support, massive community.",
      "**BeagleBone (Black, AI-64)** — historically stronger on real-time GPIO via the PRU (Programmable Real-time Unit) coprocessor. Useful when you need both Linux and microsecond-precise GPIO timing.",
      "**NVIDIA Jetson (Nano, Orin Nano, Orin AGX)** — SBCs with serious GPUs for AI and computer vision. Used heavily in robotics, edge AI, autonomous vehicles.",
      "**Industrial SBCs (Compute Modules, Revolution Pi, Strato Pi)** — Raspberry Pi Compute Module-based products designed for industrial use. Phase 4 covers these.",
      "**RISC-V SBCs (StarFive VisionFive, others)** — emerging, open-architecture alternatives. Software ecosystem still maturing."
    ]},

    { type: "h3", text: "When an SBC Is Right" },
    { type: "ul", items: [
      "**Networking is central** — HTTP servers, MQTT brokers, OPC-UA gateways, cloud connectivity. Linux's networking stack is mature and tested.",
      "**Multimedia or vision** — camera processing, video streaming, machine vision. The hardware video decode and GPU compute capabilities far exceed any MCU.",
      "**Database storage** — SQLite, even Postgres on a Pi. Logging gigabytes of sensor data with proper indexes.",
      "**Display + UI** — touchscreen HMIs, kiosks, dashboards. Use a window manager and a web browser, done.",
      "**Existing software you'd rather not rewrite** — Python data analysis tools, Node.js apps, anything you'd run on a server.",
      "**Edge AI / ML inference** — TensorFlow Lite, ONNX Runtime, OpenCV, all running on a Pi or Jetson."
    ]},

    { type: "h3", text: "When an SBC Is Wrong" },
    { type: "ul", items: [
      "**Hard real-time control** — stock Linux is not real-time. Stepper motor control timing-critical loops, motor drives, fast servo loops belong on an MCU or PLC.",
      "**Battery operation for years** — full Linux SBCs draw watts even idle. Coin-cell life is measured in hours.",
      "**Boot time matters** — 10-30 seconds to Linux desktop is unacceptable in many embedded applications.",
      "**Reliability targets > 99.99%** — consumer SBCs use SD cards (which fail under write load), no ECC RAM, no watchdog by default.",
      "**Industrial environments** — heat, vibration, dust, EMI exceed consumer Pi tolerances. Use industrial Pi variants if you must use a Pi here."
    ]},

    { type: "h3", text: "The Compute Module Path" },
    { type: "p", text: "When a Pi project graduates from prototype to product, the standard move is to migrate from the consumer Pi (with its USB ports, audio jack, etc.) to the Raspberry Pi Compute Module — the same SoC and RAM in a SO-DIMM-like form factor designed for integration into custom carrier boards. Compute Modules are how Pis end up in embedded products, signage, industrial gateways. Phase 4 covers this transition." },

    { type: "callout", style: "key",
      text: "**Picking SBCs correctly.** Use an SBC when 'a small Linux computer' is what you actually need. Use an MCU when 'a small microcontroller' is what you actually need. The temptation to use a Pi 'because it's more capable' often masks a missed match between platform and problem." },
  ],
  quizzes: [
    {
      question: "What's the biggest functional difference between a Raspberry Pi and an Arduino?",
      options: [
        "Cost",
        "Pi runs full Linux (multitasking, networking, file system); Arduino runs bare-metal code with no OS",
        "Pi is faster",
        "They're the same"
      ],
      correct: 1,
      explanation: "Linux versus bare-metal is the fundamental architectural difference. Linux brings huge software ecosystem and capabilities; bare-metal brings determinism, fast boot, and low power. Choose based on which set of properties you need."
    },
    {
      question: "Which task is poorly suited to a stock Raspberry Pi running stock Linux?",
      options: [
        "Web server",
        "Hard real-time motor control with microsecond-precise pulse timing",
        "Camera-based machine vision",
        "Logging sensor data to a database"
      ],
      correct: 1,
      explanation: "Stock Linux scheduling is non-deterministic — interrupt latency can spike to hundreds of microseconds or more under load. For hard real-time tasks, use an MCU, a PLC, or PREEMPT_RT Linux with appropriate hardware (and even then, MCU is usually better)."
    },
    {
      question: "How do Pi prototypes typically transition to production embedded products?",
      options: [
        "They don't",
        "Migrate from consumer Pi (USB ports, etc.) to Raspberry Pi Compute Module on a custom carrier board",
        "Switch to an Arduino",
        "Run Pi software in the cloud"
      ],
      correct: 1,
      explanation: "Compute Modules are the production form factor — same SoC and RAM as the consumer Pi but in a SO-DIMM-like socket designed for integration into custom carrier boards. This is how Pis end up in commercial products."
    },
  ]
},

{
  phase: "Phase 1", phaseColor: "#c84b11",
  title: "ESP32",
  subtitle: "Dual-core Xtensa, integrated WiFi/BLE, ESP-IDF vs Arduino, deep sleep — the connected sensor node king.",
  time: "40 min", type: "Platform",
  video: { id: "xPlN_Tk3VLQ", title: "Introduction to ESP32 — Getting Started (DroneBot Workshop)" },
  content: [
    { type: "p", text: "The ESP32 is the most successful embedded chip of the last decade. Dual-core processor, integrated WiFi and Bluetooth, generous RAM and flash, all for $3-8 a board. It's eaten the IoT market and a substantial chunk of the broader embedded space. If you're building anything that needs wireless connectivity, the ESP32 is probably the right starting point." },

    { type: "h3", text: "What's Inside an ESP32" },
    { type: "ul", items: [
      "**Dual-core Xtensa LX6 (or LX7) at 240 MHz** — both cores accessible to your application. One typically runs WiFi/BLE stack, the other your code, but you can use both.",
      "**WiFi (802.11 b/g/n) + Bluetooth (Classic + BLE)** — integrated antenna or external antenna variants.",
      "**RAM (520 KB internal, plus optional PSRAM up to 8 MB)** — generous for a microcontroller. PSRAM makes camera and image processing applications viable.",
      "**Flash (4-16 MB typical)** — plenty for firmware plus filesystem (SPIFFS, LittleFS).",
      "**Peripherals** — a lot. Multiple SPI, I2C, UART, I2S, CAN, SDIO, multiple ADC channels, capacitive touch, hall sensor, RMT for IR/LED control, ULP coprocessor for ultra-low-power sensing.",
      "**Deep sleep** — wake-up sources include timer, GPIO, touch, ULP. Sub-10 µA in deep sleep makes battery operation viable for years."
    ]},

    { type: "h3", text: "ESP32 Variants" },
    { type: "ul", items: [
      "**ESP32 (original)** — dual-core, WiFi+BT. Still common, mature.",
      "**ESP32-S2** — single-core, USB-OTG, no Bluetooth. Cost-down for specific use cases.",
      "**ESP32-S3** — dual-core LX7, USB-OTG, AI acceleration instructions. The current flagship.",
      "**ESP32-C3** — single-core RISC-V, WiFi+BLE. Cheap, simple, RISC-V architecture.",
      "**ESP32-C6** — RISC-V with WiFi 6, BLE 5, Zigbee/Thread. Latest connectivity standards."
    ]},

    { type: "h3", text: "ESP-IDF vs Arduino-on-ESP32" },
    { type: "p", text: "Two ways to develop:" },
    { type: "ul", items: [
      "**Arduino-on-ESP32** — use the Arduino IDE/framework. Easy onboarding, vast library compatibility, but you don't fully utilize the dual core, FreeRTOS, or advanced features.",
      "**ESP-IDF (Espressif IoT Development Framework)** — the official C/C++ SDK. Full access to FreeRTOS, dual-core scheduling, all peripherals, and Espressif's official libraries. Steeper learning curve, much more capable for production work."
    ]},
    { type: "p", text: "For prototypes, start with Arduino-on-ESP32. For products, plan to move to ESP-IDF. The transition is non-trivial — different APIs, build system, debugging workflow — but it unlocks capabilities Arduino layer hides." },

    { type: "h3", text: "Why ESP32 Dominates IoT" },
    { type: "p", text: "The combination is unbeatable: integrated wireless, decent compute, generous memory, low cost, low power, mature ecosystem, OTA firmware update support. For sensor nodes, smart home devices, connected appliances, ESP32 is rarely the wrong answer." },

    { type: "h3", text: "Where ESP32 Falls Short" },
    { type: "ul", items: [
      "**Hard real-time** — WiFi stack can introduce latency spikes. Critical control loops should run on a dedicated core or a separate MCU.",
      "**Industrial certifications** — consumer ESP32 boards lack the certifications industrial-grade products need. Industrial ESP32 boards exist (covered in Phase 4).",
      "**Heavy compute or vision** — ESP32-S3 has some AI acceleration, but a Pi or Jetson is far more capable for serious image processing or ML.",
      "**Long-term industrial lifecycle** — Espressif is reliable but consumer-electronics-paced. PLCs offer 20-year guaranteed availability; ESP32 doesn't."
    ]},

    { type: "callout", style: "key",
      text: "**Default for connected anything.** Whenever you need WiFi or BLE on an embedded device — for hobby, prototype, or non-critical product — ESP32 is the default starting point. Reach for ESP-IDF when you outgrow the Arduino layer; reach for industrial variants when you outgrow consumer hardware." },
  ],
  quizzes: [
    {
      question: "What's the ESP32's defining advantage over plain microcontrollers like ATmega328P?",
      options: [
        "Higher clock speed",
        "Integrated WiFi and Bluetooth (plus dual cores, generous memory) at low cost",
        "Smaller package",
        "More analog inputs"
      ],
      correct: 1,
      explanation: "Wireless connectivity is the headline feature. Combined with dual cores, sub-$5 cost, generous RAM/flash, and excellent deep-sleep support, ESP32 is uniquely positioned for IoT applications."
    },
    {
      question: "When should you migrate from Arduino-on-ESP32 to ESP-IDF?",
      options: [
        "Never — Arduino is always better",
        "When you need full dual-core utilization, FreeRTOS access, or advanced peripheral features that Arduino layer abstracts away — typically when moving from prototype to product",
        "Only for educational projects",
        "Only on newer chips"
      ],
      correct: 1,
      explanation: "Arduino-on-ESP32 is great for prototyping but hides capabilities (dual-core scheduling, FreeRTOS, deep peripheral control) you need for production-grade work. The transition to ESP-IDF is meaningful but unlocks the chip's full capability."
    },
    {
      question: "Why is ESP32 viable for battery-powered sensor nodes operating for years?",
      options: [
        "Magic battery technology",
        "Deep sleep with ULP coprocessor wake-up enables sub-10 µA average current with periodic measurements and WiFi reporting",
        "It doesn't actually work for battery use",
        "Solar panels are required"
      ],
      correct: 1,
      explanation: "ESP32 deep sleep modes are well-engineered: the main cores fully off, only an ultra-low-power coprocessor (ULP) and RTC running. Wake briefly to measure and transmit, then back to sleep. Coin-cell or AA-pack operation for years is achievable."
    },
  ]

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "What a PLC Actually Is",
  subtitle: "Scan cycle, deterministic execution, vendor landscape — why industry standardized on this architecture.",
  time: "40 min", type: "PLC",
  video: { id: "uOtdWHMKhnw", title: "Programmable Logic Controller Basics — The Engineering Mindset" },
  content: [
    { type: "p", text: "PLCs evolved out of the late-1960s automotive industry's need to replace banks of relay logic with something reprogrammable. Half a century later, they still run essentially every factory floor, water treatment plant, and industrial process in the developed world. Understanding why they look the way they do — and why hobby platforms haven't displaced them — is the foundation of working in industrial automation." },

    { type: "h3", text: "The Scan Cycle" },
    { type: "p", text: "Every PLC operates on a deterministic scan cycle:" },
    { type: "ul", items: [
      "**1. Read all inputs** — the physical state of every input is sampled and stored in an internal image table. After this, the PLC operates on the image, not the live inputs.",
      "**2. Execute the program** — ladder logic (or other IEC 61131-3 language) is evaluated top-to-bottom, left-to-right. Outputs are computed into an output image table, again not driven directly.",
      "**3. Update all outputs** — the output image is written to physical outputs simultaneously.",
      "**4. Housekeeping** — diagnostics, communications, watchdog updates."
    ]},
    { type: "p", text: "This cycle repeats every few milliseconds (typical 5-50 ms scan time). Determinism is the killer feature: when input X happens, output Y will respond within one scan cycle, every time, forever. No interrupt latency variations, no garbage collection pauses, no OS jitter." },

    { type: "h3", text: "Why This Architecture Wins for Industry" },
    { type: "ul", items: [
      "**Predictable timing** — engineers can guarantee response times within scan cycle bounds. Safety analyses, regulatory submissions, and process control rely on this.",
      "**Atomic I/O** — all inputs sampled together, all outputs updated together. No race conditions where one output sees an old value of another input.",
      "**Robust to bad code** — even if your logic has bugs, the PLC keeps scanning. It won't get 'stuck in a loop' the way a microcontroller can.",
      "**Hot-swappable I/O** — most PLC modules can be removed and replaced without taking the system down. Maintenance happens with the line running.",
      "**Decades of lifecycle** — Siemens, Rockwell, Mitsubishi commit to 15-20+ year hardware availability and parts support. A PLC installed in 2005 can still get spare modules today.",
      "**Field-proven safety** — IEC 61508 / IEC 61511 / SIL-rated PLCs run nuclear plants, refineries, and other safety-critical applications."
    ]},

    { type: "h3", text: "The Vendor Landscape" },
    { type: "ul", items: [
      "**Siemens (S7-1200, S7-1500)** — dominant in Europe and increasingly globally. TIA Portal IDE.",
      "**Rockwell / Allen-Bradley (CompactLogix, ControlLogix)** — dominant in North America. Studio 5000 IDE.",
      "**Mitsubishi (FX, Q, iQ-R series)** — dominant in Asia, strong in machine tool industries.",
      "**Beckhoff (TwinCAT)** — high-performance, runs on PC hardware with real-time Windows variant. Strong in motion control and modern automation.",
      "**Omron (Sysmac)** — strong in packaging and assembly applications.",
      "**Schneider Electric (Modicon)** — the original PLC company (Modicon = Modular Digital Controller, 1969). Still strong in process industries."
    ]},

    { type: "h3", text: "PLC Hardware Architecture" },
    { type: "p", text: "Physically, a PLC system is modular:" },
    { type: "ul", items: [
      "**CPU module** — the processor running your program.",
      "**Power supply module** — typically takes 24 VDC industrial power, provides clean rails to the rest of the rack.",
      "**Discrete I/O modules** — 16 or 32 channels each, typically with optical isolation.",
      "**Analog I/O modules** — 4-20 mA, 0-10 V, RTD, thermocouple inputs, current loop outputs.",
      "**Specialty modules** — high-speed counter, motion control, fieldbus interface, vision interface.",
      "**Communication modules** — Ethernet, Profinet, EtherCAT, Modbus, etc."
    ]},

    { type: "callout", style: "key",
      text: "**The right framing.** PLCs aren't 'old-fashioned microcontrollers.' They're a different design point optimized for industrial reliability, deterministic timing, decades of lifecycle, and field-engineer maintainability. Hobby microcontrollers are optimized for cost and developer convenience. Both are valid; pick the one whose tradeoffs fit your situation." },
  ],
  quizzes: [
    {
      question: "What's the defining characteristic of the PLC scan cycle?",
      options: [
        "It runs at 60 Hz",
        "Read inputs → execute program → update outputs → repeat, with deterministic timing",
        "It uses interrupts only",
        "It runs continuously without phases"
      ],
      correct: 1,
      explanation: "The scan cycle is the PLC's defining architecture: read all inputs into a snapshot, execute the program against that snapshot, update all outputs at once, then repeat. Determinism is the headline benefit — the same input produces the same output within one scan, every time."
    },
    {
      question: "Why do PLCs typically have 15-20+ year hardware lifecycles?",
      options: [
        "Slow technology evolution",
        "Industrial customers demand it — replacing PLCs in installed equipment is hugely expensive, so vendors commit to long-term hardware availability and parts support",
        "Government mandate",
        "Random chance"
      ],
      correct: 1,
      explanation: "Industrial systems are designed for 20-30 year operation. Replacing a PLC mid-lifecycle requires re-validating safety, retraining maintenance teams, often re-permitting. Long-term support is what industry pays the PLC premium for."
    },
    {
      question: "Which is NOT a typical PLC vendor?",
      options: ["Siemens", "Rockwell/Allen-Bradley", "Mitsubishi", "Microsoft"],
      correct: 3,
      explanation: "Microsoft makes operating systems and software, not industrial PLCs. The other three are dominant PLC vendors. Beckhoff, Omron, and Schneider Electric are also major players."
    },
  ]
},

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "Ladder Logic & IEC 61131-3",
  subtitle: "Reading a real ladder program, structured text, function block — how a PLC engineer thinks about state.",
  time: "45 min", type: "PLC",
  video: { id: "hJhScS3d6t8", title: "Quick Tutorial of the Five IEC-61131 Programming Languages — Emerson" },
  content: [
    { type: "p", text: "PLC programming languages look strange at first. Ladder logic looks like an electrical schematic. Structured Text looks like Pascal. Function Block Diagram looks like signal-flow graphics. They're all there for good historical and practical reasons, and they're all standardized under IEC 61131-3." },

    { type: "h3", text: "The Five Languages" },
    { type: "ul", items: [
      "**Ladder Diagram (LD)** — graphical, looks like an electrical relay schematic. Inputs on the left, outputs on the right, 'rungs' read top-to-bottom. The dominant language (~80% of industrial PLC code is ladder).",
      "**Structured Text (ST)** — high-level textual, similar to Pascal. Best for math, complex logic, algorithms. Increasingly the modern choice for new code.",
      "**Function Block Diagram (FBD)** — graphical, signal flow through interconnected function blocks. Excellent for process control, PID loops, analog scaling.",
      "**Sequential Function Chart (SFC)** — graphical state-machine notation. Steps and transitions. Good for batch processes and sequencing.",
      "**Instruction List (IL)** — assembly-like, deprecated in IEC 61131-3:2013 but still in legacy code."
    ]},

    { type: "h3", text: "Reading Ladder Logic" },
    { type: "p", text: "A ladder rung is read left-to-right. On the left, you have **contacts** representing inputs — 'normally open' (—| |—) means the contact passes power when its associated input is true; 'normally closed' (—|/|—) passes power when its input is false. On the right, you have **coils** representing outputs — when power flows through the rung from left to right, the coil 'energizes' and the output is true." },
    { type: "p", text: "Example: a motor start/stop circuit:" },
    { type: "p", text: "`Rung 1: ─| Start_Button |───────| /Stop_Button |───────( Motor_Run )`" },
    { type: "p", text: "`Rung 2: ─| Motor_Run |─────────────────────────────────( Motor_Run )`  (parallel branch with rung 1)" },
    { type: "p", text: "Reading: motor runs when (Start_Button is pressed AND Stop_Button is NOT pressed). Once running, the motor's own contact (rung 2) keeps the rung energized even after the Start_Button is released — this is a classic latch. Press Stop_Button to break the latch." },

    { type: "h3", text: "Structured Text Example" },
    { type: "p", text: "The same logic in Structured Text:" },
    { type: "p", text: "`IF (Start_Button OR Motor_Run) AND NOT Stop_Button THEN`" },
    { type: "p", text: "`    Motor_Run := TRUE;`" },
    { type: "p", text: "`ELSE`" },
    { type: "p", text: "`    Motor_Run := FALSE;`" },
    { type: "p", text: "`END_IF;`" },
    { type: "p", text: "Modern PLC programmers mix languages — ladder for I/O handling and simple logic, ST for math and algorithms, FBD for process control, SFC for sequences. The languages aren't competitive; they're complementary tools." },

    { type: "h3", text: "How a PLC Engineer Thinks" },
    { type: "p", text: "The mental model differs from microcontroller programming:" },
    { type: "ul", items: [
      "**State-driven, not event-driven** — every scan cycle re-evaluates everything. There's no 'this code runs once when X happens'; there's only 'as long as X is true, this output is on.'",
      "**Latches are explicit** — you build memory into the logic with feedback rungs (or SR/RS function blocks).",
      "**Time is explicit** — there are no `delay()` calls. Time is handled by Timer function blocks (TON, TOF, TP) that run in parallel with everything else.",
      "**Atomic I/O semantics** — within a scan, all inputs read identical values throughout. You don't have to worry about input changing mid-evaluation.",
      "**Deterministic execution order** — code runs in the order written, every time. No surprises from compiler optimizations or scheduler decisions."
    ]},

    { type: "h3", text: "Standard Function Blocks" },
    { type: "p", text: "IEC 61131-3 defines a library of standard function blocks every PLC implements:" },
    { type: "ul", items: [
      "**TON (On-Delay Timer)** — output goes true after input has been true for the preset time.",
      "**TOF (Off-Delay Timer)** — output goes false after input has been false for the preset time.",
      "**TP (Pulse Timer)** — fixed-duration pulse on rising edge of input.",
      "**CTU (Count Up)** — increments counter on each rising edge of input.",
      "**SR (Set-Reset Latch)** — set-dominant latch.",
      "**RS (Reset-Set Latch)** — reset-dominant latch."
    ]},

    { type: "callout", style: "key",
      text: "**Different language, same problem.** Ladder logic isn't 'easier than C' — it's a different mental model better suited to relay-logic-style problems and easier for plant electricians to read and modify. Structured Text fits the same role as C/Python for algorithmic logic. Use whichever language fits the problem." },
  ],
  quizzes: [
    {
      question: "What does a 'normally open' contact in ladder logic represent?",
      options: [
        "A broken connection",
        "A contact that passes power when its associated input is true",
        "A failed input",
        "Always passes power"
      ],
      correct: 1,
      explanation: "Normally open (—| |—) contacts are the basic building block. They represent 'this input is true' in series logic. Normally closed (—|/|—) contacts represent 'this input is false'. Combined with parallel and series rungs, they encode arbitrary Boolean logic."
    },
    {
      question: "Why is mixing IEC 61131-3 languages within a project (ladder + ST + FBD) a common practice?",
      options: [
        "It's required by law",
        "Each language fits different problems best — ladder for I/O and discrete logic, ST for math/algorithms, FBD for process control loops",
        "Compilers force it",
        "It's not common"
      ],
      correct: 1,
      explanation: "Modern PLC projects use the right language per task. Ladder is excellent for I/O handling and discrete control, ST excels at calculations and complex algorithms, FBD shines for process control. Mixing them per routine is standard practice."
    },
    {
      question: "What does the TON (On-Delay Timer) function block do?",
      options: [
        "Generates a pulse",
        "Counts events",
        "Output goes TRUE after its input has been TRUE for the preset time",
        "Resets on power-up"
      ],
      correct: 2,
      explanation: "TON is the most common timer. Input goes high → after preset time, output goes high. If input drops before preset, the timer resets. Used for delays, debouncing, dwell times throughout PLC programs."
    },
  ]
},

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "PLC I/O, Networking & HMIs",
  subtitle: "Discrete vs analog, sourcing/sinking, isolation, fieldbus, HMI/SCADA basics.",
  time: "45 min", type: "PLC",
  video: { id: "txi2p5_OjKU", title: "What is Modbus and How does it Work? — RealPars" },
  content: [
    { type: "p", text: "A PLC's CPU is the easy part. The complexity of an industrial automation system lives in the I/O — how the PLC interacts with sensors, actuators, drives, and other PLCs across the factory. This lesson covers the practical realities of industrial I/O and the protocols that connect everything." },

    { type: "h3", text: "Discrete I/O" },
    { type: "ul", items: [
      "**24 VDC discrete I/O** — the industrial standard. Inputs accept 0 V (false) or 24 V (true). Outputs source or sink 24 V at typically 0.5-2 A per channel.",
      "**Sourcing vs sinking** — sourcing outputs provide +24 V when on; sinking outputs provide ground when on. The sensor or load is wired to the opposite side. Mismatch = nothing works. This catches every new PLC engineer.",
      "**120/240 VAC discrete I/O** — for legacy systems and direct contactor control. Less common in new designs but still encountered.",
      "**Optical isolation** — every quality discrete I/O channel is optically isolated, keeping field wiring faults from damaging the PLC.",
      "**Surge protection** — TVS diodes, MOVs, gas discharge tubes on every channel for lightning and switching transients."
    ]},

    { type: "h3", text: "Analog I/O" },
    { type: "ul", items: [
      "**4-20 mA current loop** — the industrial standard for analog. 4 mA = sensor at minimum, 20 mA = sensor at maximum, < 4 mA = wire break. Robust against EMI because current loops have intrinsic noise rejection.",
      "**0-10 V** — common for HVAC and lower-cost applications. More EMI-susceptible than current loops.",
      "**RTD inputs** — for platinum resistance temperature sensors (typically PT100 or PT1000). Specialized I/O modules to handle the 3- or 4-wire connection and linearization.",
      "**Thermocouple inputs** — type J, K, T, etc. Cold-junction compensation built into the PLC module.",
      "**Resolution** — typical 12-16 bit. Higher-resolution modules (24 bit) for precision applications."
    ]},

    { type: "h3", text: "Fieldbus and Industrial Ethernet" },
    { type: "p", text: "PLCs talk to each other, to drives, to sensors, and to HMIs over industrial communication protocols. The major ones:" },
    { type: "ul", items: [
      "**Modbus RTU / Modbus TCP** — the lingua franca. Open, simple, supported by virtually every industrial device. Master/slave architecture. Modbus RTU on RS-485, Modbus TCP on Ethernet. Slow (~10-100 ms cycle) but universal.",
      "**Profinet** — Siemens-led, dominant in Europe. Real-time Ethernet, can hit sub-millisecond cycles in IRT (Isochronous Real-Time) mode. Standard in Siemens systems.",
      "**EtherNet/IP** — Rockwell-led, dominant in North America. Real-time Ethernet using CIP (Common Industrial Protocol). Standard in Allen-Bradley systems.",
      "**EtherCAT** — Beckhoff-led, fastest deterministic Ethernet (sub-100 µs cycles possible). Standard for high-speed motion and machine control.",
      "**IO-Link** — for the last 10 meters between sensor and field. Single twisted pair, simple protocol, configurable smart sensors. Replacing simple discrete sensors in modern designs.",
      "**OPC UA** — not really a fieldbus, but the lingua franca for higher-level integration. Maps PLC data to a standardized object model for HMI, SCADA, MES integration."
    ]},

    { type: "h3", text: "HMI and SCADA" },
    { type: "ul", items: [
      "**HMI (Human-Machine Interface)** — local touchscreen at the equipment. Operators run the line through it. Vendor-specific (Siemens TP, Allen-Bradley PanelView, etc.) or third-party panels.",
      "**SCADA (Supervisory Control And Data Acquisition)** — plant-level system aggregating data from many PLCs. Trend logging, alarm management, recipe management, batch reporting. Wonderware, Ignition, FactoryTalk View, WinCC are common platforms.",
      "**Web HMI** — increasingly common: HMI runs as a web app served from the PLC or a gateway, accessed from any device with a browser. The modern direction."
    ]},

    { type: "h3", text: "Practical Wiring Discipline" },
    { type: "ul", items: [
      "**Separate signal and power wiring** — different conduits, different cable trays. EMI from motors crosstalks into low-level signals.",
      "**Shielded cables for analog** — shield grounded at one end (typically the PLC end) to prevent ground loops.",
      "**Twisted pair** — for everything: 24 V signals, analog 4-20 mA, communications. Twisting cancels common-mode noise.",
      "**Ferrules on stranded wire** — proper crimped ferrules at terminal blocks. No 'cage clamp on bare wire' — that's a future loose connection.",
      "**Wire numbering and tagging** — every wire labeled per the schematic. Future you will be grateful."
    ]},

    { type: "callout", style: "key",
      text: "**The unsung lesson.** PLC programming is the visible work, but I/O wiring discipline is what determines whether your system runs reliably for 20 years. A perfect program on bad wiring fails. A simple program on excellent wiring runs forever. Spend time on the I/O." },
  ],
  quizzes: [
    {
      question: "Why is 4-20 mA the industrial standard for analog signaling vs 0-10 V?",
      options: [
        "Higher resolution",
        "Current loops have intrinsic EMI rejection, < 4 mA detects wire breaks, and the loop powers the sensor in many cases",
        "Cheaper",
        "Easier to wire"
      ],

      explanation: "Current loops are immune to most EMI (current is conserved through the loop), the live-zero (4 mA = minimum) detects open circuits or sensor failures, and many sensors are loop-powered (no separate power supply needed). 0-10 V is simpler but susceptible to noise."

    {

      explanation: "Modbus is open, simple, and universally supported. Profinet, EtherNet/IP, and EtherCAT are vendor-aligned and faster but not universal. OPC UA is for higher-level integration. Modbus is what you reach for when you need to talk to anything."

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Power, EMC & Environment",
  subtitle: "Clean power, isolation, surge protection, IP ratings — why a breadboard prototype dies in a factory.",
  time: "45 min", type: "Hardening",
  video: { id: "F7U0Ps0CowQ", title: "EMC #38: Ground Loops — Causes, Effects, and Fixes" },
  content: [
    { type: "p", text: "A prototype that runs perfectly on a clean lab bench can fail catastrophically the day it's installed in a factory. The factory has dirty power, electromagnetic noise from motors and drives, ground potential differences, vibration, dust, condensation, temperature swings — none of which the prototype was designed against. This lesson is about closing that gap." },

    { type: "h3", text: "Power Quality" },
    { type: "ul", items: [
      "**Brown-outs and dips** — voltage sags during heavy load starts (induction motor inrush, welder firing). Hobby boards often crash; industrial designs ride through with bulk capacitance and brown-out detection.",
      "**Surges and transients** — lightning, switching transients, ESD. Industrial designs include TVS diodes, MOVs, gas discharge tubes at the power input. A direct lightning strike to the building can destroy any unprotected board.",
      "**Harmonics and noise** — switching power supplies and VFDs inject harmonics back into the supply. Industrial-grade input filters handle this; consumer power supplies often pass it through.",
      "**Isolation** — at minimum, optical isolation between field I/O and microcontroller. Galvanic isolation between power domains prevents ground loops and limits fault propagation."
    ]},

    { type: "h3", text: "EMI/EMC" },
    { type: "ul", items: [
      "**Conducted noise** — high-frequency noise on power and signal cables. Mitigated by shielded cables, ferrites, common-mode chokes, proper PCB layout.",
      "**Radiated noise** — RF emissions from cables and circuitry. Mitigated by shielding (Faraday cages), proper enclosure design, controlled board edge currents.",
      "**Susceptibility** — your circuit being affected by external EMI. Mitigated by isolation, filters, and shielding on the receiving end.",
      "**Ground loops** — multi-point grounding creates loops where current flows in unintended paths, coupling noise into signals. Mitigated by single-point grounding for sensitive analog, isolated power supplies, fiber optics for very long signal runs.",
      "**Compliance testing** — CE, FCC require radiated emissions testing. Industrial environments require IEC 61000 series immunity testing too. Lesson 13 covers this for products."
    ]},

    { type: "h3", text: "Environmental Protection" },
    { type: "ul", items: [
      "**IP ratings (Ingress Protection)** — IP65 = dust-tight + protection against water jets. IP67 = dust-tight + temporary submersion. IP69K = high-pressure, high-temperature wash-down. Your enclosure rating must match the environment.",
      "**Conformal coating** — applied to PCBs to prevent contamination by moisture, dust, chemicals. Acrylic, urethane, silicone, parylene each have tradeoffs.",
      "**Vibration tolerance** — connector locking mechanisms, board mounting, component lead lengths. Hobby boards with through-hole headers are not vibration-tolerant.",
      "**Temperature range** — consumer (0-70 °C), industrial (-40 to +85 °C), military (-55 to +125 °C). Most consumer Pi and Arduino boards are consumer-spec; industrial variants exist.",
      "**Condensation and humidity** — daily temperature cycles cause condensation inside enclosures. Drainage, breathing valves, conformal coating, or dry-environment enclosures all play a role."
    ]},

    { type: "h3", text: "The Mitigation Hierarchy" },
    { type: "p", text: "Don't try to harden a hobby board against everything. The hierarchy:" },
    { type: "ul", items: [
      "**1. Choose the right platform** — industrial-grade boards exist (Lesson 12) and have these problems pre-solved.",
      "**2. Choose the right enclosure** — appropriate IP rating, EMI shielding, mounting hardware.",
      "**3. Add input protection** — TVS diodes, MOVs, common-mode chokes on every external connection.",
      "**4. Add isolation** — optical isolators on field I/O, isolated power supplies between domains.",
      "**5. Add filtering** — bulk capacitance, ferrite beads, proper grounding.",
      "**6. Test against expected stress** — surge testing, ESD testing, EMI immunity testing before deployment."
    ]},

    { type: "callout", style: "warning",
      text: "**The recurring failure pattern.** A prototype runs perfectly on the bench. It's installed near a 50 HP motor. The first time the motor starts under load, the prototype crashes. The fix is rarely 'better software' — it's input protection, isolation, and proper grounding that should have been in the design from day one." },
  ],
  quizzes: [
    {
      question: "What's the most common reason a working bench prototype crashes when installed in a factory?",
      options: [
        "Software bugs",
        "Inadequate power conditioning, EMI immunity, and grounding — environmental stresses the prototype wasn't designed against",
        "Wrong programming language",
        "Insufficient memory"
      ],
      correct: 1,
      explanation: "Bench environments are clean. Factories have dirty power, EMI from motors/drives, ground potential differences, surges. A prototype optimized for software function but no environmental hardening fails at startup. Input protection, isolation, and proper grounding are typically the missing pieces."
    },
    {
      question: "What does IP65 specify?",
      options: [
        "Internet protocol version",
        "Dust-tight enclosure with protection against water jets — appropriate for many indoor industrial environments",
        "Operating system version",
        "PLC programming standard"
      ],
      correct: 1,
      explanation: "IP65 is the industrial standard for splash-resistant, dust-tight enclosures. IP67 adds temporary submersion. IP69K is for high-pressure wash-down (food/pharma). Match the rating to the environment."
    },
    {
      question: "What's the right hierarchy for hardening hobby platforms for industrial use?",
      options: [
        "Just add more capacitors",
        "Choose right platform → enclosure → input protection → isolation → filtering → test",
        "Buy more expensive parts",
        "Add a fan"
      ],
      correct: 1,
      explanation: "Start with platform selection (industrial variants exist), then enclosure (IP rating, shielding), then layered protection (TVS/MOV → optical isolation → filtering), then verification testing. Don't try to fix in software what should be fixed in hardware."
    },
  ]
