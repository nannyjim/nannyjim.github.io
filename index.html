    { type: "p", text: "Most people use AI like a black box. That is fine for casual use — but if you want to build with it confidently and catch when it is wrong, you need a working mental model. Three key ideas cover 90% of what you need to know." },
    { type: "h3", text: "Idea 1: Tokens, Not Words" },
    { type: "p", text: "LLMs don't read words the way humans do. They read tokens — small chunks of text converted to numbers. A token is roughly 3-4 characters on average. Every model has a context window — a hard limit on how many tokens it can process in one conversation. Think of it as the model's working memory." },
    { type: "grid", items: [
      { title: "GPT-4o", text: "~128,000 token context window — roughly 96,000 words or about 320 pages of text." },
      { title: "Claude Sonnet", text: "~200,000 token context window — roughly 150,000 words or about 500 pages." },
      { title: "Gemini 1.5 Pro", text: "~1,000,000 token context window — roughly 750,000 words, a small library." },
      { title: "Local Models (Llama)", text: "Typically 8,000-128,000 tokens depending on your hardware configuration." },
    ]},
    { type: "callout", variant: "info", label: "Aerospace Example", text: "A 50-page AS9100 quality manual is roughly 25,000 tokens — easily fits in Claude or GPT-4o's context window. You can paste the whole document and ask specific questions about clauses. We build exactly this in Phase 2." },
    { type: "h3", text: "Idea 2: Prediction, Not Understanding" },
    { type: "p", text: "LLMs don't understand text the way a human expert does. They predict: given all the text so far, what token is statistically most likely to come next? This process repeats billions of times per second. The result is remarkably human-like text — but it is pattern completion, not genuine comprehension." },
    { type: "p", text: "This is why LLMs can seem brilliant (they have absorbed enormous amounts of human knowledge) and also confidently wrong. When a model generates a plausible-sounding but incorrect fact, that is called hallucination — and it is a fundamental characteristic of how these systems work, not a temporary bug." },
    { type: "callout", variant: "warning", label: "Critical for Aerospace", text: "LLMs can generate convincing but incorrect specifications, tolerances, material properties, or standards references. An LLM might confidently cite a standard with the wrong requirement. Always verify AI-generated technical claims against authoritative sources. AI drafts — engineers verify." },
    { type: "h3", text: "Idea 3: How Models Get Their Capabilities" },
    { type: "grid", items: [
      { title: "1. Pre-training", text: "Model processes trillions of words from the internet, books, and code. Learns statistical patterns of language. Takes months and millions of dollars." },
      { title: "2. Fine-tuning", text: "Model is further trained on curated examples of good conversations. Shapes it toward being helpful and following instructions precisely." },
      { title: "3. RLHF", text: "Reinforcement Learning from Human Feedback — humans rate responses, model learns to produce higher-rated outputs. How Claude and ChatGPT become helpful assistants." },
      { title: "4. Prompting (Your Tool)", text: "At runtime, you guide behavior through text. No re-training needed. This is 80% of practical AI development work." },
    ]},
    { type: "h3", text: "Temperature — One Key Setting" },
    { type: "p", text: "Temperature (0 to 1) controls how much randomness the model uses. At 0: always picks the most likely next token — very consistent, somewhat rigid. At 1: samples more randomly — more creative but less predictable. For aerospace technical work (spec analysis, compliance checking), use temperature 0. For drafting proposals or brainstorming, 0.3-0.7 works well." },

  ]

  quizzes: [
    { question: "Your team needs to analyze proprietary machining process specs for a defense contract component. Which approach is most appropriate?", options: ["GPT-4o via the public OpenAI API — most capable model", "Claude Opus via the public Anthropic API — best for document analysis", "Llama 3.2 running locally via Ollama — data never leaves your network", "Gemini 1.5 Pro — largest context window for long documents"], correct: 2, explanation: "For proprietary data that may be ITAR-controlled, local models are the only appropriate choice. The data never leaves your network. Cloud APIs — regardless of provider security claims — introduce legal and compliance risk for controlled technical data." },
    { question: "You need to summarize 500 incoming supplier quality reports per month. Cost and speed matter most. Which model tier is most appropriate?", options: ["Claude Opus — most capable model ensures best accuracy", "GPT-4o-mini or Claude Haiku — smaller models built for high-volume, cost-efficient tasks", "A local Llama model — avoids all API costs", "Gemini 1.5 Pro — can analyze all documents in one giant context"], correct: 1, explanation: "Mini or Haiku-tier models cost roughly 10x less than flagship models and are fast. For high-volume, relatively straightforward tasks like summarization, they deliver excellent ROI. Reserve flagship models for complex reasoning tasks that genuinely need that capability." },

    { type: "callout", variant: "info", label: "Create first_call.py in your project folder:", text: "import anthropic\nfrom dotenv import load_dotenv\n\nload_dotenv()  # reads your .env file automatically\n\nclient = anthropic.Anthropic()  # reads ANTHROPIC_API_KEY from .env\n\nmessage = client.messages.create(\n    model='claude-opus-4-5',\n    max_tokens=1024,\n    messages=[\n        {\n            'role': 'user',\n            'content': 'What are the key mechanical properties of Ti-6Al-4V titanium alloy used in aerospace?'\n        }\n    ]\n)\n\nprint(message.content[0].text)" },

    { question: "What is the purpose of the system prompt in an API call?", options: ["It sets the temperature and token limit for the response", "It defines the model's role, expertise, output format, and behavioral rules for the entire conversation", "It is required in every API call or the request will fail with an error", "It stores conversation history between different sessions"], correct: 1, explanation: "The system prompt is your primary tool for shaping AI behavior. It persists across the entire conversation and defines how the model responds — its role, expertise, tone, output format, and any constraints. Mastering system prompts is the core of practical AI development." },
    { question: "Your script returns a response but the text is cut off mid-sentence. What should you adjust?", options: ["Increase the temperature setting", "Decrease the temperature setting", "Increase the max_tokens parameter to give the model more room to complete its response", "Change to a different AI model"], correct: 2, explanation: "When message.stop_reason is 'max_tokens', the model ran out of allowed output space. Increasing max_tokens gives it room to complete. Note that higher max_tokens increases cost — set a reasonable ceiling for your use case rather than an unnecessarily high value." },
    { question: "Why should your system prompt include the instruction 'If you are uncertain about any specification, say so explicitly rather than guessing'?", options: ["It is required by the Anthropic API terms of service", "It reduces API response time significantly", "It instructs the model to express uncertainty rather than generating plausible-sounding but incorrect technical data", "It automatically cross-references the response against AMS standards"], correct: 2, explanation: "This instruction directly combats hallucination in technical contexts. Models default to being helpful, which can mean generating plausible specifications even when uncertain. Explicitly requiring expressions of uncertainty dramatically reduces confident errors in technical output — critical for aerospace applications." },

},
{
  phase: "Phase 2", phaseColor: "#1c4a7a",
  title: "Prompt Engineering",
  subtitle: "Turn vague AI outputs into precise, reliable results using proven techniques.",
  time: "40 min", type: "Core Skill",
  video: { id: "T9aRN5JkmL8", title: "AI Prompt Engineering: A Deep Dive (Anthropic)" },
  content: [
    { type: "p", text: "The difference between a useful AI tool and a frustrating one is usually the quality of the prompt. Prompt engineering is a learnable set of techniques that dramatically improves output quality, consistency, and reliability in production systems." },
    { type: "h3", text: "Technique 1: Specify Format Explicitly" },
    { type: "p", text: "Vague prompts produce inconsistent outputs. Specifying exactly what format you want — fields, allowed values, structure — makes outputs reliable and processable." },
    { type: "callout", variant: "success", label: "Explicit format example:", text: "Summarize this inspection report using this exact format:\n\nSTATUS: [PASS / FAIL / CONDITIONAL]\nNON-CONFORMANCES: [bullet list, or 'None found']\nAFFECTED PARTS: [part numbers if mentioned]\nRECOMMENDED ACTION: [one sentence]\n\nUse technical language appropriate for a quality engineer." },
    { type: "h3", text: "Technique 2: Chain-of-Thought Reasoning" },
    { type: "p", text: "For complex analysis tasks, ask the model to reason step by step before giving a conclusion. This dramatically improves accuracy on multi-step problems." },
    { type: "callout", variant: "info", label: "Aerospace chain-of-thought example:", text: "Review this dimensional inspection data. Work through these steps:\n\nStep 1: List every dimension measured and its actual value\nStep 2: Identify which dimensions are outside tolerance\nStep 3: For each out-of-tolerance dimension, classify severity:\n   Critical: affects safety or primary function\n   Major: affects fit, form, or function\n   Minor: cosmetic or non-functional\nStep 4: Recommend disposition: use-as-is, rework, or scrap\n\nShow your reasoning for each step before giving your final recommendation." },
    { type: "h3", text: "Technique 3: Explicit Uncertainty Handling" },
    { type: "callout", variant: "warning", label: "Always Include This in Technical Prompts", text: "Add to every aerospace system prompt:\n\n'If you are uncertain about any technical specification, material property, or standards reference, say so explicitly rather than guessing. Indicate your confidence level when relevant.'\n\nThis single instruction dramatically reduces confident hallucinations in technical contexts." },
    { type: "h3", text: "Technique 4: Structured JSON Output" },
    { type: "p", text: "When you need to process AI output programmatically — feed it into another tool, store it in a database, or populate a report template — ask for JSON output with a defined schema." },
    { type: "callout", variant: "info", label: "JSON output example:", text: "Analyze this NCR and return ONLY a JSON object with no other text:\n\n{\n  'ncr_number': string,\n  'status': 'open' | 'closed' | 'pending',\n  'severity': 'critical' | 'major' | 'minor',\n  'affected_parts': [list of part numbers],\n  'root_cause_category': string,\n  'disposition': string,\n  'requires_customer_notification': boolean\n}" },
    { type: "h3", text: "Technique 5: Role Plus Constraints" },
    { type: "callout", variant: "success", label: "Complete system prompt template for aerospace:", text: "You are a quality engineering assistant for an AS9100-certified aerospace component manufacturer.\n\nYour capabilities:\n- Analyze inspection reports and identify non-conformances\n- Reference AS9100, AS9102, and NADCAP requirements by clause\n- Draft corrective action documentation\n\nYour constraints:\n- Never provide a final disposition decision — always flag for human engineer review\n- If uncertain about a spec value, say so explicitly — never guess\n- Do not reference standards you cannot cite by clause number\n- Flag any finding that could affect airworthiness as CRITICAL" },
  ],
  quizzes: [
    { question: "An AI consistently gives differently formatted summaries of inspection reports, making them hard to process automatically. Which technique most directly solves this?", options: ["Increase temperature to make outputs more varied and creative", "Use chain-of-thought reasoning to improve logical analysis", "Specify the exact output format in the prompt, including field names and allowed values", "Switch to a more powerful and expensive model"], correct: 2, explanation: "Format specification directly enforces consistent output structure. When you tell the model exactly what fields to populate and in what order, it reliably produces the same format each time — making outputs processable by downstream tools and pipelines." },
    { question: "You need AI to analyze a complex dimensional inspection dataset with 30 measurements. Results are inconsistent and sometimes miss non-conformances. Which technique most improves accuracy?", options: ["Chain-of-thought: instruct the model to work through each measurement step by step before concluding", "JSON output: ask for a structured response format", "Few-shot examples: show it one example of a good analysis", "Reduce max_tokens to force a more concise answer"], correct: 0, explanation: "Chain-of-thought reasoning is most effective for complex multi-step analysis. Forcing the model to reason through each measurement systematically before drawing conclusions is far less likely to skip non-conformances or make classification errors." },
    { question: "Why is the constraint 'Never provide a final disposition decision — flag for human engineer review' important in an aerospace AI system prompt?", options: ["It reduces API costs significantly", "It makes responses shorter and faster to generate", "It preserves human accountability and prevents AI from autonomously making safety-critical decisions", "It is required by the Anthropic API terms of service for aerospace customers"], correct: 2, explanation: "Disposition decisions (use-as-is, rework, scrap) can have safety implications for end users of aircraft. AI should draft recommendations and surface information — but qualified human engineers must make and be accountable for final decisions. This aligns with AS9100 traceability requirements." },
  ]
},
{
  phase: "Phase 2", phaseColor: "#1c4a7a",
  title: "RAG & Document Q&A",
  subtitle: "Build a system that answers questions about your own internal documents.",
  time: "50 min", type: "Applied Building",
  video: { id: "T-D1OfcDW1M", title: "What is Retrieval-Augmented Generation (RAG)? (IBM Technology)" },
  content: [
    { type: "p", text: "RAG — Retrieval-Augmented Generation — is the single most valuable AI capability for most aerospace manufacturers. It lets you ask plain English questions of your own documents: quality manuals, SOPs, supplier records, standards libraries, inspection procedures. No more keyword searching through 500-page PDFs." },
    { type: "h3", text: "How RAG Works — Step by Step" },
    { type: "grid", items: [
      { title: "1. Chunk the Document", text: "Split your document into overlapping segments of roughly 500 words each. Overlap ensures concepts that span page breaks are not split apart." },
      { title: "2. Create Embeddings", text: "Convert each chunk into a numerical vector that captures its semantic meaning. Similar text produces similar vectors, enabling meaning-based search." },
      { title: "3. Store in Vector DB", text: "Save all vectors in a searchable database. ChromaDB is free, runs locally on Windows, and requires nothing beyond pip install." },
      { title: "4. Query at Runtime", text: "Convert the user's question to a vector, find the 3-5 most similar document chunks, and send those chunks plus the question to the LLM." },
    ]},
    { type: "callout", variant: "success", label: "Install Everything You Need", text: "pip install chromadb sentence-transformers pypdf2 langchain\n\nAll of these run locally — no cloud service, no data leaves your machine.\nchromadb: local vector database\nsentence-transformers: creates embeddings locally (no API key needed)\npypdf2: extracts text from PDF files\nlangchain: simplifies the RAG pipeline code" },
    { type: "h3", text: "The Core RAG Pattern" },
    { type: "callout", variant: "info", label: "How the code flows (pseudocode):", text: "# 1. Load and chunk your document\nchunks = load_and_split_pdf('quality_manual.pdf')\n\n# 2. Create embeddings and store in ChromaDB\nvectordb = ChromaDB()\nvectordb.add(chunks, embeddings=local_embedding_model)\n\n# 3. At query time:\nquestion = 'What is our procedure for handling non-conforming material?'\nrelevant_chunks = vectordb.similarity_search(question, k=3)\n\n# 4. Send to LLM with context\nresponse = claude.messages.create(\n    system='Answer based only on the provided document excerpts. Cite the section you are drawing from.',\n    messages=[{'role': 'user', \n               'content': f'Context from manual:\\n{relevant_chunks}\\n\\nQuestion: {question}'}]\n)" },
    { type: "h3", text: "Highest-Value Aerospace RAG Applications" },
    { type: "grid", items: [
      { title: "Quality Manual Q&A", text: "Ask 'What is our NCR disposition procedure?' and get the exact clause and page reference in seconds. Works for AS9100, NADCAP, and customer-specific requirements." },
      { title: "Standards Library", text: "Build a searchable index of AMS, ASTM, and NADCAP specifications. Find the right requirement instantly without manually searching each document." },
      { title: "Supplier Records", text: "Query qualification history, past audit findings, and approval scope across all supplier files without navigating folder structures manually." },
      { title: "Inspection Procedures", text: "Pull the correct inspection procedure for a given part number, material, or process without searching through folder hierarchies." },
    ]},
    { type: "callout", variant: "warning", label: "Data Security for Aerospace RAG", text: "Use local embeddings (sentence-transformers library) for ANY internal document — quality manuals, supplier records, process specs. Document content is converted to vectors entirely on your machine and never transmitted anywhere externally.\n\nOnly use cloud embedding APIs for publicly available, non-sensitive documents that you have already licensed and published." },
  ],
  quizzes: [
    { question: "Why can you not just paste your entire 500-page quality management system into a single ChatGPT prompt?", options: ["ChatGPT does not accept PDF files as input", "Context windows are limited in size, and sending 500 pages per query would be extremely expensive and often exceed token limits", "Quality management systems are copyrighted and cannot be used with AI tools", "The response would take too long to generate for practical use"], correct: 1, explanation: "RAG solves this by only sending the 2-3 most relevant pages to the model for each question. This reduces per-query cost by roughly 95% while actually improving accuracy, since the model focuses only on relevant content rather than trying to process everything at once." },
    { question: "What does an 'embedding' represent in a RAG system?", options: ["A compressed version of the original document for more efficient storage", "A numerical vector that captures the semantic meaning of a text chunk, enabling similarity-based search", "The process of splitting large documents into smaller searchable chunks", "An encryption method for protecting sensitive document content"], correct: 1, explanation: "Embeddings are numerical vectors where semantically similar text produces similar vectors. This allows the system to find 'What is our NCR procedure?' and retrieve a chunk about 'non-conformance disposition process' even though the exact words do not match — it is meaning-based retrieval." },
    { question: "For a RAG system querying your internal quality manuals, which embedding approach is most appropriate?", options: ["OpenAI text-embedding API — highest quality embeddings available", "Google Vertex AI embeddings — best for enterprise document search", "Local sentence-transformers library — embeddings created on your machine, document content never transmitted", "No embeddings needed — keyword search of documents is sufficient"], correct: 2, explanation: "Internal quality manuals contain proprietary process information that should never be transmitted to external APIs. sentence-transformers creates high-quality embeddings entirely on your local machine. The quality difference versus cloud embeddings is minimal for most quality document types." },
  ]
},
{

  title: "Building Windows Applications",
  subtitle: "Turn Python scripts into real tools your colleagues can actually use.",
  time: "45 min", type: "Applied Building",
  video: { id: "2siBrMsqF44", title: "Build a Python Website in 15 Minutes with Streamlit (Tech With Tim)" },
  content: [
    { type: "p", text: "A Python script that only you can run from a terminal has limited value. A properly packaged application that a quality inspector or engineer can open and use immediately transforms how your team works. Three paths from script to deployable Windows tool." },
    { type: "h3", text: "Path 1: Streamlit — Browser App in Minutes" },
    { type: "p", text: "Streamlit converts Python code into a web app with almost no additional code. Run it on your machine and share the URL with anyone on the same network — no installation required on their machines." },
    { type: "callout", variant: "info", label: "Install and run:", text: "pip install streamlit\nstreamlit run your_app.py\n\nAnyone on your local network can then open a browser and go to:\nhttp://your-ip-address:8501" },
    { type: "callout", variant: "success", label: "Complete NCR Analysis App — save as ncr_app.py:", text: "import streamlit as st\nimport anthropic\nfrom dotenv import load_dotenv\n\nload_dotenv()\nclient = anthropic.Anthropic()\n\nst.set_page_config(page_title='NCR Analyzer', page_icon='airplane')\nst.title('NCR Analysis Assistant')\nst.caption('Paste inspection report text below for AI-assisted analysis')\n\nreport_text = st.text_area('Inspection Report Text', height=200,\n    placeholder='Paste your report here...')\n\nif st.button('Analyze Report', type='primary') and report_text:\n    with st.spinner('Analyzing...'):\n        response = client.messages.create(\n            model='claude-opus-4-5',\n            max_tokens=1000,\n            system='You are a quality engineering assistant. Analyze this inspection report and provide: STATUS, NON-CONFORMANCES found, SEVERITY classification, and RECOMMENDED ACTION. Flag for human review — do not make final disposition decisions.',\n            messages=[{'role': 'user', 'content': report_text}]\n        )\n    st.subheader('Analysis Results')\n    st.write(response.content[0].text)\n    st.download_button('Download Analysis', response.content[0].text, 'ncr_analysis.txt')" },
    { type: "h3", text: "Path 2: Package as .exe with PyInstaller" },
    { type: "p", text: "PyInstaller bundles your script and all its dependencies into a single .exe file that runs on any Windows machine — no Python installation required. Perfect for deploying to shop floor computers." },
    { type: "callout", variant: "info", label: "Package your app:", text: "pip install pyinstaller\npyinstaller --onefile --windowed your_app.py\n\nThe .exe appears in the dist/ folder.\n--onefile: creates a single self-contained file\n--windowed: hides the terminal window for GUI applications" },
    { type: "h3", text: "Path 3: Excel and Word Automation" },
    { type: "callout", variant: "info", label: "Read from Excel, analyze with AI, write results back:", text: "pip install openpyxl python-docx\n\nimport openpyxl\nfrom anthropic import Anthropic\n\n# Read inspection data from existing Excel file\nwb = openpyxl.load_workbook('inspection_log.xlsx')\nws = wb.active\n\n# Process each row with AI\nclient = Anthropic()\nfor row in ws.iter_rows(min_row=2, values_only=True):\n    part_num, measurement, nominal, tolerance = row\n    # ... send to Claude, write result back to Excel column\n\nwb.save('inspection_log_with_ai_analysis.xlsx')" },
    { type: "h3", text: "Choosing the Right Approach" },
    { type: "grid", items: [
      { title: "Streamlit — Best For", text: "Internal tools for non-technical staff. Dashboard-style views with charts. File upload capability. Fastest to build and iterate on." },
      { title: ".exe — Best For", text: "Shop floor computers without Python. Air-gapped environments. Tools that need to work fully offline. When you cannot run a local web server." },
      { title: "Excel/Word — Best For", text: "Teams that live in Office and will not change workflows. Data already in spreadsheets. Reporting that feeds existing templates." },
      { title: "Tkinter GUI — Best For", text: "Native Windows look and feel. Single-user tools. Simple data entry forms. Works fully offline without requiring any browser." },
    ]},
  ],
  quizzes: [
    { question: "A quality inspector needs your AI tool but has no Python knowledge and works on a shop floor computer where you cannot install Python. What is the best approach?", options: ["Teach them Python so they can run the script themselves", "Build a Streamlit app on your machine and have them remote in", "Package the tool as an .exe with PyInstaller — it runs without any Python installation", "Wait for a commercial product that meets your exact needs"], correct: 2, explanation: "PyInstaller creates a self-contained .exe that bundles Python and all dependencies. The inspector double-clicks it like any Windows program. No installation, no command line, no Python knowledge required — exactly right for shop floor deployment." },
    { question: "You want colleagues on the same office network to use your AI tool through their web browser without installing anything on their machines. Which approach fits best?", options: ["PyInstaller .exe — packages everything into one file", "Streamlit app — runs on your machine, accessible via browser URL on the local network", "Tkinter GUI — native Windows application window", "A Python Jupyter notebook they can open in VS Code"], correct: 1, explanation: "Streamlit runs a local web server. Anyone on the same network can access it via the browser at your machine's IP address and port 8501 — no installation needed on their machines. It is the fastest path from Python script to an accessible web tool." },
    { question: "Your team tracks quality metrics in Excel. You want AI to analyze each row and add a Risk Assessment column automatically. Which library combination is most appropriate?", options: ["streamlit + anthropic for a web interface", "openpyxl + anthropic — read Excel rows, send to Claude, write results back to the same file", "pyinstaller + tkinter for a desktop GUI", "chromadb + sentence-transformers for semantic search"], correct: 1, explanation: "openpyxl reads and writes .xlsx files natively in Python. Combined with the Anthropic library, you iterate through each row of measurement data, send it to Claude for risk assessment, and write the result to a new column — all in the existing Excel file your team already uses." },
  ]
},
{
  phase: "Phase 3", phaseColor: "#1a6b3c",
  title: "What Are AI Agents?",
  subtitle: "Understand the shift from single-response AI to systems that plan, act, and iterate.",
  time: "35 min", type: "Core Concept",
  video: { id: "FwOTs4UxQS4", title: "AI Agents, Clearly Explained (Jeff Su)" },
  content: [
    { type: "p", text: "Everything we have built so far follows one pattern: send a prompt, get a response. That is powerful but limited to single-step tasks. AI agents unlock multi-step, autonomous workflows where the AI can plan, use tools, check its own work, and iterate — completing complex tasks that would normally require hours of human effort." },
    { type: "h3", text: "The Four Properties of an Agent" },
    { type: "grid", items: [
      { title: "Planning", text: "Agent breaks a complex goal into steps and decides the sequence — rather than responding in one shot. It decides what to do first, what information it needs, and in what order to proceed." },
      { title: "Tool Use", text: "Agent can call functions you define: read_pdf(), query_database(), search_web(), write_report(), send_email(). The agent decides when to use which tool based on what it needs next." },
      { title: "Loops and Iteration", text: "Agent can evaluate its own output, decide it is incomplete or needs correction, and try again — similar to how a human checks their work and revises." },
      { title: "Memory and State", text: "Information persists between steps. The agent remembers what it found in step 1 and uses it to inform step 4, without you manually passing data between steps." },
    ]},
    { type: "h3", text: "A Concrete Aerospace Agent: Supplier Qualification" },
    { type: "callout", variant: "info", label: "What the agent does autonomously:", text: "Goal: 'Process this supplier qualification package and recommend an approval decision'\n\nStep 1: read_pdf('supplier_qual_package.pdf')\n        Extracts: company name, certifications, processes, scope\n\nStep 2: query_database('approved_supplier_list', supplier_name)\n        Checks prior history and existing qualification status\n\nStep 3: search_nadcap_scope(supplier_name)\n        Verifies current NADCAP accreditation and commodity scope\n\nStep 4: compare_to_requirements(supplier_data, commodity)\n        Identifies gaps: missing NADCAP for heat treat\n\nStep 5: write_qualification_summary(all_findings)\n        Drafts structured recommendation report\n\n        HUMAN REVIEW CHECKPOINT — engineer reviews and decides" },
    { type: "callout", variant: "warning", label: "Human-in-the-Loop Is Non-Negotiable for Aerospace", text: "Build human review checkpoints into every agentic workflow for: supplier qualification decisions, design disposition, audit findings, any output that affects airworthiness or compliance. The agent drafts and recommends — the engineer approves and takes accountability. This is both good practice and required for AS9100 traceability." },
    { type: "h3", text: "The ReAct Pattern" },
    { type: "p", text: "The most common agentic architecture is ReAct: Reason, Act, Observe, Repeat. The agent thinks about what to do, does it, observes the result, and repeats until the goal is achieved. This is how Claude Code, GitHub Copilot Workspace, and most production AI agents work internally." },
    { type: "grid", items: [
      { title: "Reason", text: "Model thinks: 'I need to find the supplier's NADCAP scope. I will use the search_nadcap tool with their company name as input.'" },
      { title: "Act", text: "Model calls: search_nadcap(company='Precision Heat Treating Inc.')" },
      { title: "Observe", text: "Tool returns: 'Accredited for Heat Treating (AC7102), valid through 2026-03'" },
      { title: "Repeat", text: "Model reasons: 'Scope confirmed. Now I need to check if Heat Treating is required for this commodity...' and continues to the next step." },
    ]},
  ],
  quizzes: [
    { question: "What is the key difference between a standard LLM API call and an AI agent?", options: ["Agents use more powerful and expensive models for better results", "Agents respond faster due to parallel processing architecture", "Agents can plan multiple steps, use tools, observe results, and iterate — rather than responding in a single shot", "Agents do not require any programming — they work from natural language instructions alone"], correct: 2, explanation: "Planning plus tool use plus loops is what defines agentic behavior. A single API call, regardless of how sophisticated the model, is not an agent. An agent persists across multiple steps, acts on the world through tools, and adapts its plan based on what it discovers." },
    { question: "An aerospace manufacturer wants to build an agent that automatically approves supplier qualifications without any human review to maximize speed. What is your assessment?", options: ["Good idea — AI is accurate enough for supplier qualification in regulated aerospace", "Acceptable if the agent only processes Tier 2 suppliers with less critical components", "Inappropriate — supplier qualification affects airworthiness and AS9100 requires human accountability for such decisions", "Fine as long as the agent uses a model with high benchmark accuracy scores"], correct: 2, explanation: "Supplier qualification is a safety-critical decision with compliance implications under AS9100 and customer flow-down requirements. AI should assist and accelerate human decision-making — not replace it for decisions with airworthiness implications. Autonomous approval would also be extremely difficult to justify in a DCMA or customer source inspection audit." },
    { question: "In the ReAct agent pattern, what happens in the Observe step?", options: ["The agent waits for a human to provide additional instructions before continuing", "The agent reviews and records the result of its previous action before deciding what to do next", "The agent generates its final response to the user and ends the session", "The agent checks for new messages waiting in the input queue"], correct: 1, explanation: "Observe is when the agent processes the result of its last action (such as a tool call result) and updates its understanding before planning the next step. This feedback loop — reason, act, observe, repeat — is what enables agents to navigate complex multi-step workflows and handle unexpected or incomplete results." },
  ]
},
{
  phase: "Phase 3", phaseColor: "#1a6b3c",
  title: "Tool Use & Agent Loops",
  subtitle: "Give your AI access to real tools and build your first autonomous workflow.",
  time: "55 min", type: "Hands-On Coding",
  video: { id: "2HsmNeT8TCg", title: "Claude Function Calling Made Dead Simple (Anthropic Tool Use)" },
  content: [
    { type: "p", text: "Claude and GPT-4 support function calling — a way to define tools the model can invoke as it reasons through a problem. You define what tools exist and what they do. The model decides when and how to call them. Your code actually executes them and returns results." },
    { type: "h3", text: "Defining Tools" },
    { type: "p", text: "Each tool is defined as a JSON schema describing its name, purpose, and required parameters. The model reads these descriptions to understand when to use each tool. Clear, specific descriptions are essential." },
    { type: "callout", variant: "info", label: "Tool definition format for Claude API:", text: "tools = [\n  {\n    'name': 'lookup_supplier',\n    'description': 'Look up a supplier in our approved supplier list and return their qualification status, approved commodities, and audit history.',\n    'input_schema': {\n      'type': 'object',\n      'properties': {\n        'supplier_name': {\n          'type': 'string',\n          'description': 'The full legal name of the supplier company'\n        },\n        'commodity': {\n          'type': 'string',\n          'description': 'The commodity or process type to check (e.g., machining, heat treat, NDT)'\n        }\n      },\n      'required': ['supplier_name']\n    }\n  }\n]" },
    { type: "h3", text: "The Agent Loop" },
    { type: "callout", variant: "info", label: "Core agent loop pattern:", text: "messages = [{'role': 'user', 'content': user_goal}]\n\nwhile True:\n    response = client.messages.create(\n        model='claude-opus-4-5',\n        max_tokens=2000,\n        tools=tools,\n        messages=messages\n    )\n    \n    # Final answer — agent is done\n    if response.stop_reason == 'end_turn':\n        print(response.content[0].text)\n        break\n    \n    # Agent wants to use a tool\n    tool_use = next(b for b in response.content if b.type == 'tool_use')\n    result = execute_tool(tool_use.name, tool_use.input)\n    \n    # Add result to conversation and loop again\n    messages.append({'role': 'assistant', 'content': response.content})\n    messages.append({\n        'role': 'user',\n        'content': [{\n            'type': 'tool_result',\n            'tool_use_id': tool_use.id,\n            'content': str(result)\n        }]\n    })" },
    { type: "h3", text: "The Tool Execution Function" },
    { type: "callout", variant: "success", label: "Map tool names to real Python functions:", text: "def execute_tool(tool_name, tool_input):\n    if tool_name == 'lookup_supplier':\n        return lookup_supplier_in_db(**tool_input)\n    elif tool_name == 'read_pdf':\n        return extract_text_from_pdf(tool_input['filepath'])\n    elif tool_name == 'search_standards':\n        return search_local_standards_db(tool_input['query'])\n    elif tool_name == 'write_report':\n        return generate_word_report(tool_input['content'], tool_input['filename'])\n    else:\n        return f'Unknown tool: {tool_name}'" },
    { type: "h3", text: "Practical Tools for Aerospace Agents" },
    { type: "grid", items: [
      { title: "read_pdf(filepath)", text: "Extract text from inspection reports, certifications, qualification packages. Use pypdf2 or pdfplumber library." },
      { title: "query_erp(part_number)", text: "Pull production history, open orders, revision level from your ERP system via its API or a database connection." },
      { title: "search_standards(query)", text: "Search your local RAG database of AS9100, NADCAP, AMS specs that you built in the previous lesson." },
      { title: "write_report(content)", text: "Generate formatted Word documents using python-docx. Returns the file path of the generated document." },
    ]},
    { type: "callout", variant: "success", label: "LangGraph — Framework for Complex Agents", text: "For production agents, LangGraph (pip install langgraph) handles the loop boilerplate and adds:\n- Built-in state management across all steps\n- Human-in-the-loop pause and resume capability\n- Retry logic for failed tool calls\n- Visual graph debugging interface\n\nDocumentation: langchain-ai.github.io/langgraph/" },

function Callout({ variant = "info", label, text, isComfortable }) {
  const styles = {
    info:    { bg: "#e8f4fd", border: "#1c4a7a", labelColor: "#1c4a7a" },
    warning: { bg: "#fef3e2", border: "#c84b11", labelColor: "#c84b11" },
    success: { bg: "#e8f5ee", border: "#1a6b3c", labelColor: "#1a6b3c" },
  };
  const s = styles[variant] || styles.info;
  const bodyFont = isComfortable ? 15 : 13;
  const pad = isComfortable ? "16px 20px" : "14px 18px";
  return (
    <div style={{ background: s.bg, borderLeft: `4px solid ${s.border}`, borderRadius: "0 8px 8px 0", padding: pad, margin: "16px 0", fontSize: bodyFont, lineHeight: 1.75 }}>
      {label && <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: s.labelColor, fontWeight: 700, marginBottom: 6 }}>{label}</div>}
      <div style={{ whiteSpace: "pre-wrap" }}>{text}</div>
    </div>
  );
}

function ConceptGrid({ items, isComfortable }) {

        </div>
      ))}
    </div>
  );
}

function VideoEmbed({ video }) {
  const [expanded, setExpanded] = useState(false);
  const [useEmbed, setUseEmbed]  = useState(false);
  const [iframeError, setIframeError] = useState(false);

  // Allow Esc to exit expanded (fullscreen) video
  useEffect(() => {
    if (!expanded) return;
    const onKey = (e) => { if (e.key === "Escape") setExpanded(false); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [expanded]);

  if (!video) return null;

  const ytUrl    = `https://www.youtube.com/watch?v=${video.id}`;
  const embedSrc = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&modestbranding=1`;
  const NORMAL_H = 340;

  // Colors
  const RED = "#c84b11", CREAM = "#f5f0e8", DARK = "#1a1208", GOLD = "#e8a87c";

  const wrapStyle = expanded
    ? { position:"fixed", inset:0, zIndex:99998, background:DARK,
        display:"flex", flexDirection:"column", margin:0, borderRadius:0, border:"none" }
    : { margin:"20px 0", border:"1px solid #c8bfaa", borderRadius:12,
        overflow:"hidden", background:DARK };

  const bodyStyle = expanded
    ? { flex:1, position:"relative", width:"100%" }
    : { position:"relative", width:"100%", height:NORMAL_H };

  // ── what to show in the body area ──────────────────────────────────────────
  let body = null;

  if (useEmbed && !iframeError) {
    // Attempt the real iframe — if it stays black user can fall back
    body = (
      <div style={bodyStyle}>
        <iframe
          key={video.id}
          src={embedSrc}
          title={video.title}
          onError={() => setIframeError(true)}
          allow="autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowFullScreen
          style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%",
                   border:"none", display:"block", background:"#000" }}
        />
        {/* Fallback strip at bottom in case iframe is black */}

function QuizSet({ quizzes }) {
  const [answers, setAnswers] = useState({});
  const answered = (qi) => answers[qi] !== undefined;
  const allAnswered = quizzes.every((_, i) => answered(i));
  const score = quizzes.filter((q, i) => answers[i] === q.correct).length;

  return (
    <div style={{ margin: "32px 0" }}>
      <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.18em", textTransform: "uppercase", color: "#c84b11", marginBottom: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span>Knowledge Check</span>
        <span style={{ color: "#c8bfaa" }}>—</span>
        <span style={{ color: "#7a6e5f" }}>{quizzes.length} questions</span>
        {allAnswered && (
          <span style={{ marginLeft: "auto", fontWeight: 700, color: score === quizzes.length ? "#1a6b3c" : score >= Math.ceil(quizzes.length * 0.7) ? "#7a6000" : "#8b2020" }}>
            Score: {score}/{quizzes.length}
          </span>
        )}
      </div>

      {quizzes.map((quiz, qi) => {
        const chosen = answers[qi];
        const isAnswered = answered(qi);
        return (
          <div key={qi} style={{ background: "#ede7d6", border: "1px solid #c8bfaa", borderRadius: 12, padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14, lineHeight: 1.5, color: "#1a1208" }}>
              <span style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f", marginRight: 8 }}>Q{qi + 1}.</span>
              {quiz.question}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {quiz.options.map((opt, oi) => {
                let bg = "#f5f0e8", border = "#c8bfaa", color = "#1a1208";
                if (isAnswered) {
                  if (oi === quiz.correct) { bg = "rgba(26,107,60,0.1)"; border = "#1a6b3c"; color = "#14522e"; }
                  else if (oi === chosen) { bg = "rgba(192,57,43,0.08)"; border = "#c0392b"; color = "#7a1f10"; }
                }
                const letter = String.fromCharCode(65 + oi);
                const icon = isAnswered ? (oi === quiz.correct ? "✓" : oi === chosen ? "✗" : letter) : letter;
                return (
                  <button key={oi} disabled={isAnswered} onClick={() => setAnswers(a => ({ ...a, [qi]: oi }))}
                    style={{ padding: "11px 15px", border: `1px solid ${border}`, borderRadius: 8, cursor: isAnswered ? "default" : "pointer", fontSize: 13, lineHeight: 1.45, textAlign: "left", background: bg, color, fontFamily: "inherit", display: "flex", alignItems: "flex-start", gap: 10, transition: "background 0.15s, border-color 0.15s" }}>
                    <span style={{ fontFamily: "monospace", fontSize: 11, flexShrink: 0, marginTop: 1, fontWeight: 700, opacity: 0.7 }}>{icon}</span>
                    <span>{opt}</span>
                  </button>
                );
              })}
            </div>
            {isAnswered && (
              <div style={{ marginTop: 12, padding: "12px 15px", borderRadius: 8, fontSize: 13, lineHeight: 1.65,
                background: chosen === quiz.correct ? "rgba(26,107,60,0.1)" : "rgba(192,57,43,0.06)",
                color: chosen === quiz.correct ? "#14522e" : "#6b1f12",
                border: `1px solid ${chosen === quiz.correct ? "rgba(26,107,60,0.3)" : "rgba(192,57,43,0.2)"}` }}>
                <span style={{ fontWeight: 700 }}>{chosen === quiz.correct ? "Correct — " : "Not quite — "}</span>
                {quiz.explanation}
              </div>
            )}
          </div>
        );
      })}

      {allAnswered && (
        <div style={{ textAlign: "center", padding: 16, borderRadius: 10, fontFamily: "monospace", fontSize: 12,
          background: score === quizzes.length ? "rgba(26,107,60,0.08)" : "rgba(184,134,11,0.08)",
          border: `1px solid ${score === quizzes.length ? "rgba(26,107,60,0.25)" : "rgba(184,134,11,0.3)"}`,
          color: score === quizzes.length ? "#14522e" : "#5a4800" }}>
          {score === quizzes.length
            ? `Perfect score — all ${quizzes.length} correct. Ready to continue.`
            : `${score} of ${quizzes.length} correct. Review the explanations above before moving on.`}
        </div>
      )}
    </div>
  );
}

    { type: "callout", variant: "info", label: "Practical Implication", text: "Before spending $500K on a faster CNC, map your value stream and verify CNC is actually the bottleneck. Often the real constraint is inspection, program setup, or supplier lead time — and no amount of CNC speed fixes those." },
    { type: "h3", text: "Lean Core Principles" },
    { type: "grid", items: [
      { title: "Value", text: "Defined by the customer — not you. Anything the customer wouldn't pay for is waste." },
      { title: "Value Stream", text: "End-to-end flow from raw material to delivered part. Map it to see waste." },
      { title: "Flow", text: "Parts should move continuously — stalled work-in-process is cash tied up and quality risk accumulating." },
      { title: "Pull", text: "Produce in response to demand, not forecasts. Reduces excess inventory." },
      { title: "Perfection", text: "Continuous improvement toward zero waste." },
    ]},
    { type: "h3", text: "The Seven Wastes (Muda)" },
    { type: "p", text: "Transportation, Inventory, Motion, Waiting, Overproduction, Overprocessing, Defects — remembered as TIMWOOD. Every lean project is fundamentally an effort to eliminate these." },
    { type: "callout", variant: "info", label: "Aerospace Adaptation", text: "Classic Toyota-style kanban doesn't fit low-volume aerospace well. But the principles adapt: single-piece flow becomes small-batch flow; heijunka (level loading) becomes careful mix scheduling; kaizen events work on specific cells or programs." },
    { type: "h3", text: "Throughput Accounting" },
    { type: "p", text: "Traditional cost accounting prioritizes utilization — keep every machine running to 'absorb overhead'. Throughput accounting inverts this: only the bottleneck needs to run constantly; non-bottleneck machines SHOULD have idle time. Running them full-speed just builds inventory." },
    { type: "callout", variant: "warning", label: "Efficiency Trap", text: "Measuring individual machine or operator utilization and rewarding high numbers often hurts total throughput. A non-bottleneck running 100% produces parts that just wait at the bottleneck — high utilization, low throughput, more inventory." },
    { type: "h3", text: "Applying This" },
    { type: "p", text: "Walk your shop floor with fresh eyes. Where are parts waiting? Where do operators walk? Where does quality catch problems? Each observation is a potential improvement. Aerospace lean isn't about copying Toyota — it's about seeing your own operation clearly and eliminating what doesn't add value." },
  ],
  quizzes: [
    { question: "According to the Theory of Constraints, what's the effect of improving a non-bottleneck step?", options: ["It speeds up the whole system proportionally", "It creates more output but higher costs", "It builds inventory in front of the bottleneck without increasing total throughput", "It always reduces quality"], correct: 2, explanation: "The bottleneck limits system throughput. Improving a non-bottleneck just means it waits at the bottleneck — inventory builds, cash is tied up, but total output doesn't change. Improve bottlenecks first." },
    { question: "Which of the seven wastes (TIMWOOD) includes excess work-in-process that sits between operations?", options: ["Transportation only", "Inventory", "Motion", "Defects"], correct: 1, explanation: "Inventory is one of the seven wastes. Excess WIP hides problems, ties up cash, takes up space, and increases the chance of damage or obsolescence. Lean systems actively reduce WIP to expose underlying issues." },
    { question: "Why is single-piece flow often adapted to small-batch flow in aerospace?", options: ["Aerospace customers require large batches by regulation", "Low-volume, high-mix aerospace work has setup costs and inspection requirements that make pure single-piece flow impractical", "Small-batch flow is illegal under AS9100", "Single-piece flow is always the better choice in every industry"], correct: 1, explanation: "Pure single-piece flow works best with short setups and continuous demand. Aerospace has long setups, lot-based inspection, and variable demand — so 'as-close-to-single-piece-as-practical' small-batch flow tends to win." },
  ]
},
{
  phase: "Phase 2", phaseColor: "#8a6a20",
  title: "Supply Chain & Risk Management",
  subtitle: "Single-source risk, strategic sourcing, inventory strategy, and supply chain resilience after 2020.",
  time: "50 min", type: "Core Concept",
  video: { id: "Mi1QBxVjZAw", title: "What is Supply Chain Management? (ASU W.P. Carey School, Module 1)" },
  content: [
    { type: "p", text: "Aerospace supply chains are famously complex — an airliner has 2-4 million parts, many with lead times of 6+ months and single sources of supply. COVID and ongoing geopolitical tensions have made supply chain resilience a C-suite priority, which means it's a source of both career opportunity and career risk for operations professionals." },
    { type: "h3", text: "Types of Supply Risk" },
    { type: "grid", items: [
      { title: "Single-source risk", text: "Only one qualified supplier. Common in aerospace due to qualification cost and certification time." },
      { title: "Geographic concentration", text: "Critical raw materials (titanium, rare earths, semiconductors) sourced from a small number of countries." },
      { title: "Financial distress", text: "Small suppliers that might not survive a slowdown. Aerospace has seen this repeatedly — primes bail out key suppliers to preserve their own programs." },
      { title: "Quality/compliance risk", text: "A supplier's nonconformance becomes your nonconformance. Scar tissue from past incidents drives aggressive supplier quality oversight." },
    ]},
    { type: "h3", text: "Strategic Sourcing Framework" },
    { type: "p", text: "The Kraljic Matrix classifies purchases into four quadrants based on supply risk and business impact. Strategic items (high risk + high impact): develop deep relationships, multiple sources if possible, long-term contracts. Leverage items (low risk + high impact): use competitive pressure to optimize cost. Bottleneck items (high risk + low impact): reduce dependence. Non-critical: simplify." },
    { type: "callout", variant: "info", label: "Dual Sourcing Reality", text: "Having two qualified suppliers for a critical component costs more than single-sourcing (qualification costs, split volumes reduce leverage) but provides resilience. Many companies reduced dual-sourcing to cut costs pre-pandemic and regretted it." },
    { type: "h3", text: "Inventory Strategy" },
    { type: "p", text: "Just-in-time (JIT) minimizes inventory carrying cost but maximizes exposure to supply disruption. Just-in-case (JIC) holds safety stock for resilience but ties up cash. The answer is almost always hybrid — JIT for stable, commodity inputs; safety stock for critical or at-risk items." },
    { type: "callout", variant: "warning", label: "Post-2020 Lesson", text: "Companies that ran on aggressive JIT pre-pandemic suffered massive production halts. Resilience costs money, but so do $100M/month production shutdowns. The calculus shifted permanently — expect more inventory buffer as a deliberate strategy." },
    { type: "h3", text: "Supplier Relationship Management" },
    { type: "p", text: "Transactional suppliers compete on price every quote. Partnership suppliers share forecasts, collaborate on cost reduction, participate in early design, and get loyalty in downturns. Partnership relationships take years to build but produce better outcomes — especially for strategic components." },
  ],
  quizzes: [
    { question: "In the Kraljic Matrix, a component that's hard to source but has low total business impact is classified as:", options: ["Strategic", "Leverage", "Bottleneck", "Non-critical"], correct: 2, explanation: "Bottleneck items are hard to source but not huge cost drivers. The right strategy is to reduce dependence — find substitutes, redesign to eliminate them, or build safety stock. Don't waste relationship capital on them." },
    { question: "Why did aggressive just-in-time (JIT) inventory strategies fail so dramatically during 2020-2022?", options: ["JIT has always been a failure", "With no buffer inventory, any supply disruption cascaded immediately into production halts — while single-source dependencies amplified the problem", "Regulators banned JIT", "Labor unions shut down production deliberately"], correct: 1, explanation: "JIT optimizes for carrying cost assuming stable supply. When multiple disruptions hit simultaneously (COVID shutdowns, logistics failures, geopolitical shocks), companies with no buffer had no resilience. The calculus of 'carrying cost vs. shutdown cost' shifted." },
    { question: "Partnership supplier relationships typically outperform transactional ones for strategic components because:", options: ["They always offer the lowest unit cost", "They enable information sharing, joint improvement, and greater reliability — at the cost of higher transactional price competition", "They're required by FAA regulation", "They eliminate the need for contracts"], correct: 1, explanation: "Partnership suppliers share forecasts, participate in early design, and prioritize each other in downturns. You give up some immediate price leverage but gain long-term performance and resilience — particularly valuable for strategic items." },
  ]
},

{
  phase: "Phase 3", phaseColor: "#1c4a7a",
  title: "Leadership & Organizational Behavior",
  subtitle: "Situational leadership, team dynamics, and influencing without authority in engineering organizations.",
  time: "60 min", type: "Core Concept",
  video: { id: "lmyZMtPVodo", title: "Why Good Leaders Make You Feel Safe (Simon Sinek, TED)" },
  content: [
    { type: "p", text: "Technical skill gets you to senior engineer. Leadership skill gets you beyond. And leadership in engineering organizations is particularly tricky — you're often leading people more technical than you, across functions you don't control, on matrix teams with unclear authority." },
    { type: "h3", text: "Situational Leadership" },
    { type: "p", text: "No single leadership style works for all situations. Hersey-Blanchard's model matches leadership style to follower readiness: a new junior engineer needs directive coaching, while a senior expert needs delegation with light touch. Adjusting your style based on who you're leading and what they're doing is core leadership competence." },
    { type: "h3", text: "The Six Leadership Styles (Goleman)" },
    { type: "grid", items: [
      { title: "Commanding", text: "'Do it because I said so.' Useful in crisis, toxic in steady state." },
      { title: "Visionary", text: "'Come with me toward this future.' Effective when change is needed and direction is clear." },
      { title: "Affiliative", text: "'People come first.' Builds harmony; overused, avoids hard conversations." },
      { title: "Democratic", text: "'What do you think?' Builds buy-in; slow in crisis." },
      { title: "Pacesetting", text: "'Keep up with me.' Good with expert teams; burns out most others." },
      { title: "Coaching", text: "'Let's develop you long-term.' Highest-impact but time-intensive." },
    ]},
    { type: "h3", text: "Influencing Without Authority" },
    { type: "p", text: "In matrix organizations, your ability to get things done depends more on influence than formal power. The fundamentals: understand what each stakeholder wants, build coalitions before key decisions, give credit generously, deliver on commitments ruthlessly. Engineering people who understand this become disproportionately effective." },
    { type: "callout", variant: "info", label: "Trust is the Currency", text: "Every commitment you deliver on builds trust; every one you miss depletes it. In engineering organizations with long memories, your track record follows you for years. The best leaders are famous for keeping promises." },
    { type: "h3", text: "Psychological Safety" },
    { type: "p", text: "Amy Edmondson's research at Harvard: the highest-performing teams aren't the ones with fewest mistakes — they're the ones that feel safest admitting mistakes. In aerospace especially, where reporting issues early saves lives, psychological safety is a direct contributor to quality." },
    { type: "callout", variant: "warning", label: "Blame Culture Costs", text: "Organizations that punish the messenger of bad news get less bad news — until the problems are too big to hide. Mature engineering cultures separate 'what went wrong?' (blameless post-mortem) from individual performance management." },
    { type: "h3", text: "Delegation" },
    { type: "p", text: "New managers often confuse delegation with dumping. Effective delegation is: clear outcome, clear boundaries (budget/time/resources), clear decision rights, clear check-ins. 'Own this' with no context sets people up to fail — 'Own this outcome with these constraints, check in on Wednesdays, you can spend up to $X without approval' enables them to succeed." },
  ],
  quizzes: [
    { question: "According to Goleman's leadership styles research, which style is most useful in a genuine crisis with no time for consensus?", options: ["Democratic", "Affiliative", "Commanding", "Coaching"], correct: 2, explanation: "Commanding leadership ('do this now') works in genuine crisis where speed matters more than buy-in. The danger is using it routinely — commanding as a default style damages morale, engagement, and development." },
    { question: "What's psychological safety in a team context?", options: ["A team's willingness to let members be absent without consequences", "Team members feeling safe taking interpersonal risks — speaking up, admitting mistakes, asking questions — without fear of punishment", "Physical workplace safety rules", "Team insurance coverage"], correct: 1, explanation: "Psychological safety (from Amy Edmondson's research) correlates strongly with high performance. Teams that feel safe reporting issues catch problems earlier — especially vital in safety-critical industries like aerospace." },
    { question: "Effective delegation includes:", options: ["Assigning a task with no context and expecting results", "Clear outcome, clear boundaries, clear decision rights, clear check-ins", "Doing the task yourself to ensure it's done right", "Delegating only unpleasant tasks"], correct: 1, explanation: "Delegation that sets people up to succeed requires framing: here's the outcome, here's what you can decide vs. need approval for, here's the budget and timeline, here's when we check in. 'Just own this' without context usually produces poor results." },
  ]
},
{
  phase: "Phase 3", phaseColor: "#1c4a7a",
  title: "Marketing & Business Development in Defense/Aerospace",
  subtitle: "B2B marketing, capture management, and the long sales cycles of aerospace contracts.",
  time: "50 min", type: "Core Concept",
  video: { id: "z0PnhkJxf6o", title: "B2B vs B2C Marketing — What is the Difference?" },
  content: [
    { type: "p", text: "Aerospace marketing isn't Super Bowl commercials. It's multi-year relationship cultivation, capture management, proposal development, and influencing requirements before an RFP is even issued. Engineers who understand how this works become far more valuable — both to their employer and in their own career trajectories." },
    { type: "h3", text: "B2B Aerospace vs. Consumer Marketing" },
    { type: "p", text: "Your customers are other businesses (Boeing, Raytheon, government agencies), not individual consumers. Decision committees rather than impulse buyers. Years-long selection processes. Technical merit matters, but so do past performance, relationships, and perceived risk. Price is rarely the deciding factor for strategic components." },
    { type: "h3", text: "Capture Management" },
    { type: "p", text: "For large aerospace contracts, the company that wins usually started positioning 1-3 years before the formal RFP. 'Capture' is the discipline of identifying opportunities early, shaping requirements, building relationships with program offices, and pre-positioning your solution so your RFP response is actually a confirmation of positioning already done." },
    { type: "callout", variant: "info", label: "The Shaping Phase", text: "Companies with mature capture processes influence customer requirements while they're still being written — legally and ethically — through industry days, draft RFP comments, CRADA agreements, and white papers. By the time the RFP drops, the competitive landscape is often set." },
    { type: "h3", text: "Proposals" },
    { type: "p", text: "Aerospace proposals are massive — often 500+ pages, 6-12 month development cycles, multi-million-dollar pursuit costs. The technical volume, management volume, cost volume, and past performance volume each have evaluators and scoring rubrics. Win rate is a closely-tracked metric; most companies target 30-40% for strategic pursuits." },
    { type: "callout", variant: "warning", label: "Bid-No-Bid Decisions", text: "Pursuing every opportunity burns resources on losers. Mature capture processes have rigorous bid-no-bid gates: do we have a credible solution? Incumbent advantage we can overcome? Customer relationships? Price to win? Saying no to weak pursuits frees budget for winners." },
    { type: "h3", text: "Past Performance" },
    { type: "p", text: "Government aerospace contracts weigh past performance heavily. A company's track record on similar prior contracts (on time? on budget? quality?) directly affects current win probability. This creates a compounding advantage for incumbents — and means program execution is itself a marketing investment." },
    { type: "h3", text: "Engineering's Role" },
    { type: "p", text: "Engineers contribute to winning work in many ways: writing technical sections of proposals, briefing customers during shaping, developing white papers, doing technical interchanges. This is often where engineers get noticed by senior leadership — and it's a rare marketing skill set that commands a premium on the talent market." },
  ],
  quizzes: [
    { question: "What distinguishes capture management from standard proposal response?", options: ["Capture happens after the RFP is released", "Capture is the long-term positioning work (relationships, requirements shaping, pre-positioning) done 1-3 years BEFORE the RFP is released", "Capture is a legal requirement for all government contracts", "Capture is only for commercial aerospace, not defense"], correct: 1, explanation: "By the time an RFP drops, the playing field is often largely set by who invested in capture. Companies that only start when the RFP is released are usually competing for second or third place." },
    { question: "Why is past performance weighted so heavily in government aerospace contracting?", options: ["It's required by FAA regulation", "It's a strong predictor of future performance — so the contract is partly a reputational bet", "All contracts require past performance", "Past performance has no actual effect on awards"], correct: 1, explanation: "Government buyers have seen too many contractors overpromise and underdeliver. Past performance is the most reliable signal available — which creates compounding advantage for companies that execute well over time." },
    { question: "A rigorous bid-no-bid gate process primarily helps companies by:", options: ["Speeding up all proposal submissions", "Focusing pursuit resources on opportunities with credible win probability — increasing win rate and protecting budget for winners", "Avoiding all government contracts", "Maximizing the total number of proposals submitted"], correct: 1, explanation: "Pursuing every opportunity dilutes effort. A strong bid-no-bid process says no to weak pursuits (no credible solution, no relationship, unreasonable price-to-win) so resources concentrate on pursuits you can actually win." },
  ]
},
{
  phase: "Phase 3", phaseColor: "#1c4a7a",
  title: "Negotiation & Contract Strategy",
  subtitle: "BATNA, ZOPA, interests vs. positions, and the core structures of aerospace contracts.",
  time: "55 min", type: "Core Concept",
  video: { id: "Hc6yi_FtoNo", title: "The walk from \"no\" to \"yes\" — William Ury (TED)" },
  content: [
    { type: "p", text: "Most engineers think of negotiation as haggling over price. Real negotiation is a structured process for reaching agreements that create value for both sides. Engineers who understand this — because they negotiate internally (budget, scope, resources) and externally (suppliers, sometimes customers) — punch far above their weight." },
    { type: "h3", text: "Principled Negotiation (Fisher & Ury)" },
    { type: "p", text: "The core framework from 'Getting to Yes': separate people from the problem (don't make it personal), focus on interests not positions (why they want what they want), invent options for mutual gain (expand the pie before dividing it), use objective criteria (independent standards everyone agrees are fair)." },
    { type: "h3", text: "Key Concepts" },
    { type: "grid", items: [
      { title: "BATNA", text: "Best Alternative To Negotiated Agreement. Your fallback if no deal. Strong BATNA = strong position; weak BATNA = weak position." },
      { title: "Reservation Price", text: "The worst deal you'd still accept. Don't reveal it; never accept below it." },
      { title: "ZOPA", text: "Zone of Possible Agreement — the range between both parties' reservation prices. If ZOPA doesn't exist, no deal is possible." },
      { title: "Anchoring", text: "The first number thrown out strongly influences the final agreement. Make the first credible anchor when you can." },
    ]},
    { type: "h3", text: "Aerospace Contract Types" },
    { type: "p", text: "Firm Fixed Price (FFP): buyer pays set price, seller absorbs cost risk. Cost-Plus-Fixed-Fee (CPFF): buyer pays costs plus fixed fee, seller has no cost risk. Cost-Plus-Incentive-Fee (CPIF): shared risk based on cost performance vs. target. Time & Materials (T&M): pay for hours and materials used. Each allocates risk differently — understanding which is right for a given project matters hugely." },
    { type: "callout", variant: "info", label: "FFP Trap", text: "Fixed price contracts on new development work frequently produce massive losses for the seller — Boeing KC-46, T-7, and Starliner are all high-profile examples. Uncertainty that seemed manageable at bid time becomes material when technical or schedule problems emerge." },
    { type: "h3", text: "Interest-Based Trading" },
    { type: "p", text: "Value creation in negotiation comes from each side getting things it values more than they cost the other. Supplier may value a multi-year commitment highly (stable work) but cost you little to grant. You may value flexibility on delivery dates highly (program buffer) but cost them little to grant. Trade these and both sides win." },
    { type: "callout", variant: "warning", label: "Positional Bargaining Trap", text: "'I need 10% off.' 'I can only do 5%.' 'I said 10!' This pattern locks both sides into positions and prevents finding the real zone of mutual gain. Ask 'why' until you understand the underlying interest, then invent solutions that serve it." },
    { type: "h3", text: "Preparation" },
    { type: "p", text: "The most important determinant of negotiation outcome is preparation. Know your BATNA, estimate theirs, identify interests on both sides, prepare anchor and reservation positions, think through trades. The side that walks in better prepared almost always does better." },
  ],
  quizzes: [
    { question: "Your BATNA is:", options: ["The first offer you should make", "Your Best Alternative To a Negotiated Agreement — your fallback if no deal is reached", "The legal minimum price", "Your internal project budget"], correct: 1, explanation: "BATNA (Best Alternative To Negotiated Agreement) is what you'll do if this deal falls through. A strong BATNA lets you walk away confidently. A weak one forces concessions. Improving your BATNA before the negotiation (alternative suppliers, etc.) strengthens your position." },
    { question: "In a Firm Fixed Price (FFP) contract:", options: ["The buyer absorbs all cost overruns", "The seller absorbs cost risk — if actuals exceed bid cost, seller loses money", "There is no risk for either side", "Costs are shared 50/50"], correct: 1, explanation: "FFP puts cost risk entirely on the seller. That's why fixed-price development contracts on uncertain technology (new designs, new tech, immature supply chains) have caused major losses at companies that bid them aggressively." },
    { question: "Positional bargaining ('10%!' 'No, 5%!') fails compared to interest-based negotiation because:", options: ["It's illegal under contract law", "It locks both sides into positions without exploring the underlying interests that could enable mutually beneficial trades", "It takes longer", "It requires written documentation"], correct: 1, explanation: "Positions are demands; interests are the reasons behind them. Asking 'why do you need that?' often reveals an interest that can be satisfied in a different way — expanding the pie rather than fighting over its division." },
  ]
},

{
  phase: "Phase 4", phaseColor: "#1a6b3c",
  title: "Aerospace Industry Structure & Regulation",
  subtitle: "Primes, tier-1s, MROs, FAA/DoD dynamics, and the regulatory environment shaping every decision.",
  time: "50 min", type: "Industry Context",
  video: { id: "Cx1lTUx9GC0", title: "How Airbus Beat Boeing To Become The World's Largest Plane Maker (CNBC)" },
  content: [
    { type: "p", text: "You can't make smart business decisions in aerospace without understanding how the industry is structured. Who are the players? Who has leverage over whom? How does regulation shape competitive dynamics? This lesson gives you the industry map most engineers never get." },
    { type: "h3", text: "The Industry Tiers" },
    { type: "grid", items: [
      { title: "OEM / Prime Contractors", text: "Build the final aircraft, engines, or weapon systems. Boeing, Airbus, Lockheed Martin, Northrop Grumman, Raytheon, GE Aerospace, Pratt & Whitney." },
      { title: "Tier 1 Suppliers", text: "Major subsystems and assemblies. Collins Aerospace, Safran, Honeywell, Spirit AeroSystems. Often as large as smaller primes." },
      { title: "Tier 2-3 Suppliers", text: "Components and sub-assemblies. The layer most aerospace manufacturing shops sit in — where competition is intense and margins are thinner." },
      { title: "MROs", text: "Maintenance, Repair, and Overhaul. AAR, ST Engineering, airline in-house operations. Growing segment as fleets age." },
    ]},
    { type: "h3", text: "Commercial vs. Defense" },
    { type: "p", text: "Commercial aerospace is cyclical — tied to airline demand, fuel prices, global travel. Higher volume, lower margins, intense price pressure. Defense is counter-cyclical — tied to government budgets and geopolitics. Lower volume, higher complexity, better margins, but long and political sales cycles. Most primes straddle both for balance." },
    { type: "callout", variant: "info", label: "Services Matter", text: "Both commercial and defense increasingly rely on aftermarket services — spare parts, upgrades, and sustainment contracts — for profitable recurring revenue. An installed base of aircraft throws off services revenue for decades." },
    { type: "h3", text: "The Regulatory Environment" },
    { type: "p", text: "FAA regulates commercial aviation safety. Compliance costs are significant but create barriers to entry. DoD regulates defense procurement with a thick book of Federal Acquisition Regulation (FAR) supplements. ITAR controls export of defense technology. EAR covers dual-use items. AS9100 is the industry quality standard everyone lives by." },
    { type: "callout", variant: "warning", label: "Regulation As Strategy", text: "Regulatory compliance isn't just a cost — it's a strategic asset. Companies that master certification and compliance move faster than competitors who treat them as afterthoughts. FAA delegations (Designated Engineering Representatives) are particularly valuable capabilities." },
    { type: "h3", text: "Industry Consolidation" },
    { type: "p", text: "Aerospace has consolidated dramatically over decades. The 'Big Five' defense primes used to be dozens. Boeing's 2018 acquisition of Embraer's commercial unit (eventually collapsed), Raytheon's 2020 merger with UTC, Lockheed's attempt to acquire Aerojet Rocketdyne (blocked) — consolidation continues under antitrust scrutiny. Implications: fewer customers, more leverage for primes over suppliers, regulatory concern." },
    { type: "h3", text: "Your Position in the Ecosystem" },
    { type: "p", text: "Understanding where your company sits (prime? tier 1? tier 2?) and who the real customer is (direct OEM? airline? DoD program office?) shapes everything — what matters in proposals, what the customer really cares about, what leverage exists on price. Engineers in tier-2 shops often don't realize their real customer may be a program office two layers up from their direct contract." },
  ],
  quizzes: [
    { question: "Why does aftermarket services matter so much in aerospace economics?", options: ["Services are regulated more loosely than production", "An installed base of aircraft generates spare parts, upgrade, and sustainment revenue for decades — providing stable, high-margin, recurring revenue", "Services are cheaper to deliver than production", "Only small companies do services"], correct: 1, explanation: "Production is cyclical, but aftermarket is relatively stable — planes need parts and maintenance regardless of the production cycle. Successful aerospace OEMs work hard to capture as much aftermarket as possible because it's where long-term profit lives." },
    { question: "How does defense aerospace demand typically move relative to commercial aerospace demand?", options: ["They always move in lock-step", "Defense tends to be counter-cyclical to commercial — driven by government budgets and geopolitics rather than airline travel demand", "Defense follows commercial with a 6-month lag", "Defense only grows; commercial only shrinks"], correct: 1, explanation: "Commercial cycles with travel demand and airline profitability. Defense cycles with government spending priorities and threats — often inversely. Primes with both segments balance their exposure to either cycle." },
    { question: "Why is FAA compliance described as both a cost AND a strategic asset?", options: ["It's a small cost and irrelevant strategically", "Compliance requires significant investment but creates barriers to entry for competitors — companies with mature compliance capabilities move faster than those without", "FAA compliance is free", "Strategic assets never have costs"], correct: 1, explanation: "Certification takes time and money — but once established, it becomes a moat. Companies with mature compliance infrastructure (and ideally FAA delegations like DERs) launch products faster than newcomers who have to build compliance from scratch." },
  ]
},
{
  phase: "Phase 4", phaseColor: "#1a6b3c",
  title: "Program Management & Earned Value",
  subtitle: "Running a program by the numbers — cost performance index, schedule performance index, and variance analysis.",
  time: "55 min", type: "Practical Skill",
  video: { id: "7DLyZjsrG14", title: "Earned Value Analysis Calculations — CPI, SPI, CV, SV, EAC, ETC, BAC" },
  content: [
    { type: "p", text: "Aerospace programs are measured and managed through Earned Value Management (EVM). If you work on any DoD program or substantial commercial one, you'll encounter it. Understanding EVM lets you read program status reports critically, ask the right questions in reviews, and manage work to the right metrics." },
    { type: "h3", text: "The Three Core Numbers" },
    { type: "grid", items: [
      { title: "PV (Planned Value)", text: "The budgeted cost of work scheduled to be done by this point. Your baseline plan." },
      { title: "EV (Earned Value)", text: "The budgeted cost of work actually completed. What you PLANNED the completed work to cost — not what it actually cost." },
      { title: "AC (Actual Cost)", text: "What the completed work actually cost. Real dollars spent." },
    ]},
    { type: "h3", text: "The Key Ratios" },
    { type: "grid", items: [
      { title: "SPI = EV / PV", text: "Schedule Performance Index. Above 1.0 = ahead of schedule. Below 1.0 = behind." },
      { title: "CPI = EV / AC", text: "Cost Performance Index. Above 1.0 = under budget. Below 1.0 = over budget." },
      { title: "SV = EV - PV", text: "Schedule Variance. Negative = behind schedule (in dollar terms)." },
      { title: "CV = EV - AC", text: "Cost Variance. Negative = over budget." },
