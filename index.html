// Fisher-Yates shuffle — returns a new shuffled copy of an array
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Fisher-Yates shuffle for option text that also returns the new index of the originally-correct answer
function shuffleOptions(options) {
  const indexed = options.map((text, origIdx) => ({ text, origIdx }));
  const shuffled = shuffleArray(indexed);
  const newCorrectIdx = shuffled.findIndex(x => x.origIdx === 0);
  return { shuffled: shuffled.map(x => x.text), correctIdx: newCorrectIdx };
}

// Build a fresh 25-question exam attempt using stratified sampling:
// proportionally pull questions from each phase pool, then shuffle the overall order
// and randomize option order per question.
function buildExamAttempt(pool) {
  const EXAM_SIZE = 25;
  const phases = ["P1", "P2", "P3", "P4"];

  // Group pool by phase
  const byPhase = {};
  phases.forEach(p => { byPhase[p] = pool.filter(q => q.phase === p); });

  // Allocate question count per phase (proportional to pool sizes)
  const totalPool = pool.length;
  const allocations = {};
  let allocated = 0;
  phases.forEach((p, i) => {
    if (i === phases.length - 1) {
      allocations[p] = EXAM_SIZE - allocated;
    } else {
      const share = Math.round((byPhase[p].length / totalPool) * EXAM_SIZE);
      allocations[p] = Math.min(share, byPhase[p].length);
      allocated += allocations[p];
    }
  });

  // Pull randomized questions from each phase
  const selected = [];
  phases.forEach(p => {
    const shuffledPool = shuffleArray(byPhase[p]);
    selected.push(...shuffledPool.slice(0, allocations[p]));
  });

  // Shuffle the final order so phases are mixed
  const ordered = shuffleArray(selected);

  // Build attempt with per-question option shuffling
  return ordered.map((item, i) => {
    const { shuffled, correctIdx } = shuffleOptions(item.options);
    return { id: i, phase: item.phase, q: item.q, options: shuffled, correctIdx };
  });
}

// Helper: escape text for safe SVG embedding
function escapeXml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function LessonView({ lesson, lessonIdx, totalLessons, onPrev, onNext, isCompleted, isComfortable }) {
  // Scale typography and spacing based on display mode
  const pFont     = isComfortable ? 17 : 15;
  const pSpacing  = isComfortable ? 18 : 16;
  const h3Font    = isComfortable ? 22 : 19;
  const h3Margin  = isComfortable ? "32px 0 12px" : "28px 0 10px";
  const subFont   = isComfortable ? 18 : 16;
  const maxW      = isComfortable ? 1040 : 780;
  const pad       = isComfortable ? "56px 56px 96px" : "40px 36px 80px";

  const renderBlock = (block, i) => {
    switch (block.type) {
      case "p": return <p key={i} style={{ fontSize: pFont, lineHeight: 1.7, marginBottom: pSpacing, color: "#2a2018" }}>{block.text}</p>;
      case "h3": return (
        <h3 key={i} style={{ fontSize: h3Font, fontWeight: 600, margin: h3Margin, display: "flex", alignItems: "center", gap: 10, color: "#1a1208" }}>
          <span style={{ width: 3, height: h3Font + 1, background: "#c84b11", borderRadius: 2, flexShrink: 0, display: "inline-block" }} />
          {block.text}
        </h3>
      );
      case "callout": return <Callout key={i} variant={block.variant} label={block.label} text={block.text} isComfortable={isComfortable} />;
      case "grid": return <ConceptGrid key={i} items={block.items} isComfortable={isComfortable} />;
      default: return null;
    }
  };

  return (
    <div style={{ maxWidth: maxW, margin: "0 auto", padding: pad, width: "100%" }}>
      <div style={{ fontFamily: "monospace", fontSize: 10, letterSpacing: "0.18em", color: "#7a6e5f", textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ background: lesson.phaseColor, color: "#fff", padding: "2px 8px", borderRadius: 3, fontSize: 9 }}>{lesson.phase}</span>
        <span>Lesson {lessonIdx + 1} of {totalLessons}</span>
        <span style={{ color: "#c8bfaa" }}>·</span>
        <span>{lesson.type}</span>
        {isCompleted && <span style={{ color: "#1a6b3c", marginLeft: "auto" }}>✓ Completed</span>}
      </div>

      <h1 style={{ fontSize: isComfortable ? "clamp(32px,3.5vw,48px)" : "clamp(26px,3.5vw,40px)", fontWeight: 700, lineHeight: 1.1, letterSpacing: "-0.02em", marginBottom: 8, color: "#1a1208" }}>{lesson.title}</h1>
      <p style={{ fontSize: subFont, fontWeight: 300, fontStyle: "italic", color: "#7a6e5f", marginBottom: 20, lineHeight: 1.55 }}>{lesson.subtitle}</p>

      <div style={{ display: "flex", gap: 16, marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid #c8bfaa" }}>
        <span style={{ fontFamily: "monospace", fontSize: 11, color: "#7a6e5f" }}>⏱ {lesson.time}</span>
      </div>

      <VideoEmbed video={lesson.video} />

      {lesson.content.map((block, i) => renderBlock(block, i))}

      <QuizSet key={lessonIdx} quizzes={lesson.quizzes} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32, paddingTop: 24, borderTop: "1px solid #c8bfaa" }}>
        <button onClick={onPrev} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "1px solid #c8bfaa", background: "transparent", cursor: "pointer", color: "#7a6e5f" }}>
          {lessonIdx > 0 ? "← Prev Lesson" : "← Home"}
        </button>
        {isCompleted && <span style={{ fontFamily: "monospace", fontSize: 10, color: "#1a6b3c" }}>✓ Completed</span>}
        <button onClick={onNext} style={{ fontFamily: "monospace", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", padding: "11px 22px", borderRadius: 6, border: "none", background: "#1a1208", color: "#f5f0e8", cursor: "pointer" }}>
          {lessonIdx < totalLessons - 1 ? "Mark Complete & Continue →" : "Complete & Take Final Exam →"}
        </button>
      </div>
    </div>
  );
}

{

  content: [
    { type: "p", text: "Eighty percent of FDM problems trace to two things: a bad first layer and a miscalibrated extruder. Get those right and the printer becomes predictable. Get them wrong and you'll be chasing ghosts through every other parameter you tune." },

    { type: "h3", text: "Bed Leveling" },
    { type: "p", text: "Modern printers automate this with mesh bed leveling — a probe touches the bed in a grid and compensates in firmware. But automated leveling cannot fix a tilted bed; it can only compensate for one. Start with mechanical tramming (paper-gap test at four corners), then run the auto-mesh on top of that. The combination is rock-solid; either alone is unreliable." },

    { type: "h3", text: "Z-Offset / Nozzle Height" },
    { type: "p", text: "Z-offset sets how close the nozzle sits to the bed on the first layer. Too high and the filament won't stick; too low and the nozzle drags through it. The target is a slightly squished extrusion where lines just barely overlap — about 75% of the nozzle's natural extrusion width." },
    { type: "p", text: "Use a Z-offset calibration print (a single-layer square or the standard Live-Z sheet) and adjust in 0.025 mm increments. You should see a faint texture on the back of the print, no gaps between lines, and clean release from the bed when cool." },

    { type: "h3", text: "E-Steps Calibration" },
    { type: "p", text: "E-steps tells the firmware how many motor steps equal 1 mm of filament feed. When this is off, your print is over- or under-extruded across the board — every other tuning becomes noise. To calibrate: mark 120 mm on the filament, command 100 mm of extrusion, measure what's left. Adjust the e-steps value proportionally and retest. Should land within 1 mm of 100 mm." },

    { type: "h3", text: "Flow Calibration" },
    { type: "p", text: "After e-steps are right, flow ratio fine-tunes how much plastic actually lands on the print. Print a hollow single-perimeter cube, measure the wall thickness with calipers, and adjust the flow ratio until measured wall thickness matches the slicer's commanded line width." },

    { type: "p", text: "PLA and PETG print fine open-air. ABS, ASA, polycarbonate, and PA-CF need an enclosure to prevent warping and delamination. PEEK and ULTEM 9085 need an actively heated chamber (60–90 °C ambient or higher). If your enclosure can't reach those numbers, you can't reliably print those materials." },

    { type: "callout", style: "key",
      text: "**Calibration order.** Tram the bed mechanically. Auto-mesh on top of that. Set Z-offset against a single-layer test. Calibrate e-steps. Calibrate flow. Then — and only then — start tuning slicer profiles. Doing it in any other order means you're tuning a moving target." },

{

    { type: "p", text: "Most engineering filaments are hygroscopic — they absorb moisture from the air, and wet filament prints badly. The visual signs are popping/cracking sounds during printing, surface stringing, weak inter-layer bonding, and a foamy appearance on extrusions. Nylon, PC, PA-CF, PEEK, and ULTEM are particularly demanding; even PETG benefits from drying after a humid week." },
    { type: "p", text: "Use a filament dryer (a Sunlu/EIBOS-style box, a food dehydrator, or a dedicated filament oven for high-temp materials). Typical schedules: PLA 50 °C / 4 h, PETG 65 °C / 6 h, Nylon 80 °C / 8–12 h, PEEK 120 °C / 6 h+. Print directly from a heated dryer for the demanding materials." },

      text: "**Default-material discipline.** Pick a default material for prototypes (PLA or PETG), a default for functional jigs (ABS, ASA, or PA-CF depending on environment), and a default for aerospace-grade applications (ULTEM 9085 or PEEK). Don't try to be a hero with exotic materials when a standard one will do." },

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "Slicer Fundamentals & Quality Tuning",
  subtitle: "Layer height, walls, infill, retraction, pressure advance, cooling — the parameters that define print quality.",
  time: "55 min", type: "Hands-On",
  video: { id: "Z9k9g2wun2g", title: "Slicer Settings for Beginner 3D Printing (Prusa)" },
  content: [
    { type: "p", text: "A slicer turns a 3D model into machine instructions (G-code). The same model sliced two different ways becomes two completely different prints. Learning to drive the slicer is most of what separates a hobbyist print from a professional one." },

    { type: "h3", text: "The High-Impact Parameters" },
    { type: "ul", items: [
      "**Layer height** — typically 0.1–0.3 mm. Smaller = better surface finish, longer print time, weaker Z-bonding per layer (though more layers).",
      "**Line width** — usually 100–120% of nozzle diameter. Wider lines print faster and stronger but lose fine detail.",
      "**Walls / perimeters** — three to five walls is the structural backbone of an FDM part. Infill matters less than wall count for strength.",
      "**Infill** — 15–25% gyroid or grid for most functional parts; only go higher for genuinely load-bearing applications.",
      "**Top/bottom layers** — at least 5–6 layers each, or top surfaces will pillow over the infill below."
    ]},

    { type: "h3", text: "Temperature" },
    { type: "p", text: "Print temperature affects layer adhesion (higher = stronger Z-bonding), surface finish (too high = stringing and blobs, too low = poor adhesion), and dimensional accuracy. Run a temperature tower for every new spool — even within the manufacturer's recommended range, the optimum varies by 5–15 °C between lots." },

    { type: "h3", text: "Retraction" },
    { type: "p", text: "Retraction pulls filament back when the head moves over open space, preventing oozing. Too little = stringing. Too much = clogs and under-extrusion at the start of the next extrusion. Tune with a retraction tower. Bowden setups need 4–6 mm; direct drive needs 0.5–2 mm. Extra retraction beyond what works is just wear on the extruder." },

    { type: "h3", text: "Pressure Advance / Linear Advance" },
    { type: "p", text: "Modern firmware (Klipper, RepRap) supports pressure advance — compensating for the lag between extruder motor command and actual extrusion at the nozzle. Tuned correctly it eliminates corner bulges and improves dimensional accuracy on small features. Untuned, it does nothing or makes things worse. Use the standard pressure advance test pattern." },

    { type: "h3", text: "Cooling" },
    { type: "p", text: "Part cooling fans help bridges, overhangs, and small detail. They hurt layer adhesion and large-part strength. PLA: 100% fan after the first few layers. PETG: 30–50%. ABS, PC, PA-CF, PEEK: usually 0–20%, often zero. Match cooling to material — full cooling on ABS will delaminate it." },

    { type: "h3", text: "Quality Tuning Order" },
    { type: "ul", items: [
      "First-layer Z-offset → temperature tower → retraction tower → pressure advance → flow → cooling. Tune in that order on a new printer or new material.",
      "Each test should change exactly one variable. Tuning two at once wastes both tests."
    ]},

    { type: "callout", style: "warning",
      text: "**The 'tower of tests' mistake.** It's tempting to grab a stack of test prints and run them all in one evening. Don't. Each test depends on the prior ones being right. A retraction tower printed before Z-offset is calibrated tests nothing useful — you're just measuring noise." },
  ],
  quizzes: [
    {
      question: "Which has more impact on an FDM part's strength: increasing infill from 25% to 50%, or adding two more wall perimeters?",
      options: [

        "Wall perimeters — they form the structural shell and carry most of the load",
        "Both equal",
        "Neither — only layer height matters"
      ],
      correct: 1,
      explanation: "Walls form the structural shell of an FDM part. Adding perimeters delivers more strength than equivalent extra infill, with less material and less print time. Infill is mostly there to support top surfaces."
    },
    {
      question: "What's the right amount of part cooling fan for PEEK?",
      options: ["100%", "50%", "0–20% (typically zero)", "Cooling doesn't matter for PEEK"],
      correct: 2,
      explanation: "High-temp materials like PEEK, PC, and ABS rely on slow cooling for layer adhesion. Cooling them aggressively delaminates the print. PLA is the opposite — it benefits from full cooling."
    },
    {
      question: "What does pressure advance compensate for?",
      options: [
        "Bed not being level",
        "Filament being too cold",
        "The lag between extruder motor command and actual extrusion at the nozzle",
        "Z-axis backlash"
      ],
      correct: 2,
      explanation: "Pressure advance (Marlin: linear advance) corrects for the time it takes pressure to build/release in the hotend, which causes corner bulges and under-extrusion at line starts."
    },
  ]
},

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "FDM Defect Diagnosis & Repair",
  subtitle: "Reading a failed print: stringing, warping, ringing, layer separation, under/over-extrusion, blobs.",
  time: "50 min", type: "Troubleshooting",
  video: { id: "ZgrlGfftm0k", title: "Troubleshooting 21 Different 3D Printing Problems (Slant 3D)" },
  content: [
    { type: "p", text: "A failed FDM print contains all the diagnostic information you need — if you know how to read it. This lesson is a visual catalog: each defect, what causes it, and the specific fix. Most defects have two or three plausible causes; the order they're listed below is roughly the order to check them." },

    { type: "h3", text: "Stringing" },
    { type: "p", text: "Thin hairs of plastic between separate features. Causes (in order to check): retraction too low → temperature too high → travel speed too low → wet filament. Fix retraction first with a stringing tower, then temperature." },

    { type: "h3", text: "Warping" },
    { type: "p", text: "Corners lift off the bed; long flat parts curl. Causes: bed temperature too low → no enclosure for high-temp material → poor first-layer adhesion → too-aggressive cooling on lower layers. Add a brim, raise bed temp, enclose the printer." },

    { type: "h3", text: "Layer Separation / Delamination" },
    { type: "p", text: "Visible gaps between layers, or the print snaps cleanly along layer lines. Causes: print temperature too low → cooling fan too high → layer height too tall (>75% of nozzle diameter) → poor inter-layer adhesion from a worn nozzle. Increase temperature 5–10 °C, reduce cooling, drop layer height." },

    { type: "h3", text: "Ringing / Ghosting" },
    { type: "p", text: "Echoes of features visible on adjacent surfaces, especially after sharp corners. Causes: print speed too high for the printer's stiffness → acceleration too high → loose belts → unbalanced part orientation. Reduce acceleration, tighten belts, slow down." },

    { type: "h3", text: "Under-Extrusion" },
    { type: "p", text: "Gaps in walls, weak top layers, lines that don't bond. Causes: clogged or partly-clogged nozzle → low flow ratio → low temperature → wrong filament diameter setting → worn extruder gear. Cold-pull the nozzle, check e-steps and flow." },

    { type: "h3", text: "Over-Extrusion" },
    { type: "p", text: "Bulging walls, blobs at corners, dimensional growth. Causes: flow ratio too high → temperature too high → e-steps miscalibrated. Re-run e-steps and flow calibration." },

    { type: "h3", text: "Elephant's Foot" },
    { type: "p", text: "First few layers wider than the rest of the print. Causes: bed too hot → first layer Z-offset too low → no chamfer on the bottom edge. Add a small (0.5 mm × 45°) chamfer to the bottom of CAD models, drop bed temp 5 °C, raise Z-offset slightly." },

    { type: "h3", text: "Blobs / Zits" },
    { type: "p", text: "Small bumps where each layer's perimeter starts. Causes: seam placement → over-extrusion → no coast/wipe at end of perimeter. Use 'random' or 'sharp corner' seam placement; enable coast and wipe." },

    { type: "h3", text: "Diagnosis Workflow" },
    { type: "p", text: "When a print fails, ask in order: was the first layer right? was the part oriented well? what does the failure look like? — and check the cheapest fix first. Replacing a nozzle is cheap; reslicing with new parameters is cheaper still; redesigning the part is most expensive of all." },

    { type: "callout", style: "key",
      text: "**The diagnostic principle.** Every defect has a signature. Build a mental library by photographing your failures and labeling them. After the first 50 failed prints, you'll diagnose new ones in seconds." },
  ],
  quizzes: [
    {
      question: "Your print shows clean layer separation along horizontal lines — the part snaps along layers when stressed. What's the first thing to try?",
      options: [
        "Increase print speed",
        "Increase print temperature 5–10 °C and reduce cooling fan",
        "Reduce bed temperature",
        "Increase retraction distance"
      ],
      correct: 1,
      explanation: "Layer separation means inadequate inter-layer adhesion. Hotter print temperature and less cooling both improve bonding between layers. Reducing layer height also helps."
    },
    {
      question: "A part has stringing between separated features. Which parameter should you tune first?",
      options: ["Retraction distance/speed", "Bed adhesion", "Infill density", "Wall count"],
      correct: 0,
      explanation: "Retraction is the first-line fix for stringing. Run a stringing/retraction tower to find the right setting. Temperature and travel speed are secondary."
    },
    {
      question: "What's the physical cause of ringing/ghosting on FDM prints?",
      options: [
        "Wet filament",
        "Bed too hot",
        "Mechanical resonance from accelerations exceeding the printer's stiffness",
        "Wrong infill pattern"
      ],
      correct: 2,
      explanation: "Ringing is mechanical — the printer frame and gantry oscillate after sharp moves, leaving wave patterns on adjacent surfaces. Slow down, reduce acceleration, or stiffen the machine."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Resin Printing Fundamentals & Safety",
  subtitle: "Vat photopolymerization, MSLA vs SLA vs DLP, PPE, ventilation, and the wash/cure workflow.",
  time: "40 min", type: "Hands-On",
  video: { id: "UU6tWhV010M", title: "Resin 3D Printing Beginners Step by Step Guide" },
  content: [
    { type: "p", text: "Resin printing produces parts that an FDM machine literally cannot — feature sizes below 0.2 mm, surfaces good enough to mate against silicone molds, geometric detail comparable to injection molding. The trade-off is a workflow built around hazardous chemistry. Done right it's safe and routine; done wrong it's a respiratory and skin sensitizer." },

    { type: "h3", text: "How Vat Photopolymerization Works" },
    { type: "p", text: "Liquid photopolymer resin sits in a tray. UV light at a specific wavelength (usually 405 nm) cures the resin in the shape of a cross-section of the part. The build platform lifts a fraction of a millimeter, fresh resin flows in, the next layer cures. Repeat until the part is built." },
    { type: "ul", items: [
      "**SLA (Stereolithography)** — a UV laser traces each layer point by point. Best detail, slower for solid parts.",
      "**MSLA (Masked SLA)** — a 4K/8K LCD masks a UV LED array; whole layer cures at once. Fastest for full-tray builds, dominant in shop floors today.",
      "**DLP (Digital Light Processing)** — a UV projector flashes each layer using a DMD chip. Fast, expensive, often used in dental/medical."
    ]},

    { type: "h3", text: "The Workflow" },
    { type: "p", text: "Resin printing is not just 'press print.' It's a four-station process:" },
    { type: "ul", items: [
      "**Slice & set up** — orient, generate supports, set exposure parameters in the slicer (Lychee, Chitubox, PreForm).",
      "**Print** — typically 30 minutes to 8 hours depending on part height. The build comes out wet and uncured on the surface.",
      "**Wash** — IPA (isopropyl alcohol) or proprietary water-wash solution removes uncured resin. Two-stage washing (dirty wash, clean wash) is standard.",
      "**Cure** — UV cure chamber finishes polymerization. Time varies by resin (5–60 minutes typical). Under-cured parts are weak and tacky; over-cured parts are brittle."
    ]},

    { type: "h3", text: "Safety — Treat Uncured Resin Like a Sensitizer" },
    { type: "p", text: "Uncured liquid resin is a skin and respiratory sensitizer. The risk isn't acute — you won't feel anything immediately — but repeated exposure can produce a permanent allergic reaction that ends your ability to work in resin entirely. Treat it like epoxy: skin contact and inhalation are both to be avoided." },
    { type: "ul", items: [
      "**PPE** — nitrile gloves (not latex, which resin permeates), safety glasses, optional respirator with organic vapor cartridge for high-VOC resins.",
      "**Ventilation** — at minimum, a fume extractor or active ventilation. Closed printers help but don't eliminate fumes.",
      "**Spills** — paper towels, IPA wipe, then UV-cure the contaminated paper before disposal so it can be thrown away inert.",
      "**Disposal** — uncured resin is hazardous waste. Cure it first (sun exposure works) before disposing as solid plastic.",
      "**Skin contact** — wash with soap and water, NOT IPA (IPA drives resin into the skin).",
      "**Pregnancy** — many resin manufacturers contraindicate use during pregnancy; check the SDS."
    ]},

    { type: "h3", text: "The Station Layout" },
    { type: "p", text: "A working resin station has the printer, a wash station, a cure station, a paper-towel-lined tray for moving wet parts, an IPA squeeze bottle, gloves and glasses dispensers, and a sealed bin for contaminated waste. The whole station should be on a non-porous surface (not wood). Anker-style 'all-in-one' wash-and-cure machines streamline this for low-volume shops." },

    { type: "callout", style: "warning",
      text: "**Sensitization is permanent.** A resin operator who develops contact dermatitis or respiratory sensitization can't work safely in resin again — ever. The PPE rules aren't optional and aren't a recommendation; they're how you stay employable in this work." },
  ],
  quizzes: [
    {
      question: "You spill a small amount of uncured resin on the back of your hand. What should you do?",
      options: [
        "Wipe it off with isopropyl alcohol",
        "Wash with plenty of soap and water",
        "Let it dry naturally",
        "Cover it with a paper towel"
      ],
      correct: 1,
      explanation: "IPA drives uncured resin into the skin — it's the wrong tool for skin contact. Soap and water removes resin from the skin without that effect. IPA is for cleaning surfaces and finished parts."
    },
    {
      question: "Which technology cures one full layer at once using a UV-LCD mask?",
      options: ["SLA", "MSLA", "DLP", "FDM"],
      correct: 1,
      explanation: "MSLA (Masked SLA) uses an LCD as a UV mask in front of a UV LED array, curing the entire layer in one exposure. SLA traces with a laser; DLP uses a UV projector and DMD chip."
    },
    {
      question: "Why is a curing step required after washing?",
      options: [
        "To remove leftover IPA",
        "To complete polymerization — washed parts are still partially uncured",
        "To color the part",
        "To improve adhesion to the build plate"
      ],
      correct: 1,
      explanation: "The print process only partially cures the resin (so layers can bond). The wash removes uncured surface resin; the cure step polymerizes the rest. Skip it and the part is weak and tacky."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Resin Types & Aerospace Use Cases",
  subtitle: "Standard, tough, durable, engineering, high-temp, castable, flexible — and where each fits in tooling and prototyping.",
  time: "40 min", type: "Materials",
  video: { id: "LSTZ64p-DXc", title: "Tough Resin vs. Standard Resin — The Ultimate Test" },
  content: [
    { type: "p", text: "Resin selection is even more variable than filament selection because every manufacturer formulates differently. Names like 'tough' or 'engineering' mean different things from Formlabs vs Anycubic vs Siraya Tech. The categories below are general — always read the actual SDS and mechanical datasheet for the specific resin." },

    { type: "h3", text: "The Resin Categories" },
    { type: "ul", items: [
      "**Standard** — cheap, brittle, fine surface finish. For visual prototypes, miniatures, fit-check models. Not for parts that need to do anything mechanical.",
      "**Tough / Durable** — impact-resistant, more like ABS in mechanical feel. For functional parts, snap-fit tests, light-duty fixtures.",
      "**Engineering / Rigid** — stiff, dimensionally stable, low creep. For master patterns, jigs, parts that must hold tolerance.",
      "**High-Temp** — heat-deflection temperatures from 80 °C up to 280 °C+ (Formlabs High-Temp v2 is ~238 °C HDT). Used for autoclave-compatible tooling, mold masters, casting patterns.",
      "**Castable** — burn-out resins for investment casting and lost-wax processes. Critical for jewelry, increasingly used for short-run cast metal tooling masters.",
      "**Flexible / Elastomeric** — Shore A 50–90 hardness, like silicone or rubber. For gaskets, vibration dampers, soft tooling.",
      "**Ceramic-filled / Glass-filled** — added stiffness and thermal performance but more brittle.",
      "**Biocompatible** — for medical devices; not relevant to most aerospace work."
    ]},

    { type: "h3", text: "Aerospace Use Cases" },
    { type: "ul", items: [
      "**Master patterns** — engineering or high-temp resin printed master used to produce silicone molds, then cast urethane or epoxy short-run tooling.",
      "**Composite layup tooling masters** — high-temp resin patterns dimensionally stable enough to lay up wet composite over directly (with release agent) for short-run autoclaved parts.",
      "**Soft tooling** — flexible resin gaskets, vibration mounts, fit-check inserts.",
      "**Fit-check models** — engineering resin for cabin fit checks, harness routing models, bracket prototypes.",
      "**Casting patterns** — castable resin for short-run metal investment casting in research/development."
    ]},

    { type: "h3", text: "Limits for Aerospace" },
    { type: "p", text: "Photopolymer resins as a class are not currently a flight-part material. They creep under load, their mechanical properties drift in UV exposure, and the qualification path is far less mature than for FDM thermoplastics or metal AM. Resin's value in aerospace is upstream of flight: tooling, patterns, prototypes, soft tooling, fit checks. Don't try to print a flight part in resin." },

    { type: "callout", style: "key",
      text: "**Pick by datasheet, not name.** 'Tough resin' from one vendor can be twice as stiff as 'tough resin' from another. Always read the actual mechanical datasheet — tensile, flex modulus, HDT, elongation — and match those numbers to your application. Manufacturer category names are marketing, not specs." },
  ],
  quizzes: [
    {
      question: "You need a master pattern for laying up a small carbon-fiber autoclaved part. Which resin category fits?",
      options: ["Standard resin", "Flexible resin", "High-temp resin", "Castable resin"],
      correct: 2,
      explanation: "Autoclave layup involves heat (often 120–180 °C). High-temp resin with sufficient HDT is the only category that survives the cycle while maintaining dimensional stability."
    },
    {
      question: "True or false: photopolymer resin parts are commonly used as flight-critical structural components in aerospace.",
      options: [
        "True — high-temp resins are flight-qualified",
        "False — resin's role in aerospace is in tooling, patterns, and prototypes, not flight parts",
        "True for cabin parts only",
        "True only for unmanned aircraft"
      ],
      correct: 1,
      explanation: "Photopolymers creep, drift mechanically with UV exposure, and lack the qualification maturity of FDM thermoplastics or metal AM. They're upstream tooling and prototyping materials, not flight materials."
    },
  ]
},

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Orientation, Supports & Slicing for Resin",
  subtitle: "Angle of repose, support density, suction failures, hollowing, and exposure tuning.",
  time: "45 min", type: "Hands-On",
  video: { id: "BDMIjdp-hGc", title: "Get Better Prints with Smart Orientation (Lychee Tutorial)" },
  content: [
    { type: "p", text: "Resin orientation and support strategy is where most prints succeed or fail. The same model can print perfectly at one angle and disastrously at another. There's also more art here than in FDM — the principles below are starting points, not absolute rules." },

    { type: "h3", text: "Why Orientation Matters in Resin" },
    { type: "p", text: "Every layer in resin is the entire 2D cross-section pulled away from a flexible film at the bottom of the vat. The forces involved in that peel can rip a part off its supports. Large flat layers parallel to the build plate generate huge peel forces; tilting the part reduces the peel area at any one layer." },

    { type: "h3", text: "The 30–45° Default" },
    { type: "p", text: "Most parts print best tilted 30–45° on their longest axis. Reasons: smaller peel area per layer, better support placement on overhangs, fewer suction-cup geometries, and detail surfaces face down (away from supports). Print exactly perpendicular only for cylindrical or near-cylindrical parts that have natural symmetry." },

    { type: "h3", text: "Supports — Where, How Many, How Thick" },
    { type: "ul", items: [
      "**Place supports on every overhang** more than ~30° from vertical. Resin auto-support is a starting point, not a final answer — always check manually.",
      "**Heavier supports** at high-stress points: corners, the lowest island, transition points where the peel force is concentrated.",
      "**Light tip contact** to minimize support scars on visible surfaces, at the cost of more careful removal.",
      "**Avoid support-on-detail** — if the only place to put a support is on a critical face, reorient the part."

    { type: "h3", text: "Suction Cups — The Silent Print Killer" },
    { type: "p", text: "Any concave geometry pointing down at the build plate forms a suction cup against the FEP film. As the build platform lifts, the suction force can rip supports off. Fix by adding drainage holes at the lowest point of any concavity, reorienting so the concavity faces up, or splitting the part." },

    { type: "h3", text: "Hollowing & Drainage" },
    { type: "p", text: "Most large resin parts are hollowed (1.5–2.5 mm wall) to save resin, reduce peel forces, and avoid trapped uncured liquid. Every hollow needs at least one drainage hole — usually two, one at the lowest point and one at the top to prevent vacuum lock. Trapped liquid resin in a hollow part will cure unevenly and warp, or worse, leak out months later." },

    { type: "h3", text: "Exposure Tuning" },
    { type: "p", text: "Each new resin needs an exposure test — typically a Cones of Calibration print or a stair-step exposure. Under-exposed: parts fall apart, supports break. Over-exposed: detail blurs, holes shrink, parts become brittle. Find the minimum exposure that holds the calibration cones, then add 0.2–0.5 s of margin." },

    { type: "callout", style: "key",
      text: "**The four checks before every print.** (1) Tilted 30–45° on the longest axis. (2) Supports on every overhang and heavy at corners/islands. (3) No suction cups — drainage holes added if needed. (4) Hollowed with drain holes if large. Every print failure traces back to one of these four." },

{
  phase: "Phase 3", phaseColor: "#c84b11",
  title: "Resin Defect Diagnosis",
  subtitle: "Failed cures, layer shifts, support scars, suction failures, brittleness — reading a resin failure.",
  time: "40 min", type: "Troubleshooting",
  video: { id: "FSZjptmZ8LQ", title: "5 Failures & Solutions for 3D Resin Printing" },
  content: [
    { type: "p", text: "Resin failures look different from FDM failures and have different root causes. Most resin failures are diagnosable from the build plate alone — what's still attached, what's lying in the vat, and what's torn." },

    { type: "h3", text: "Print Detached Entirely from Build Plate" },
    { type: "p", text: "Whole print is sitting in the vat. Causes: dirty/contaminated build plate → insufficient bottom-layer exposure → too few bottom layers → first layer peeled before forming. Clean the build plate with IPA, increase bottom-layer exposure 2–3× normal, ensure 4–8 bottom layers." },

    { type: "h3", text: "Layer Shifts / Misaligned Layers" },
    { type: "p", text: "Visible step in the side of the print where layers shifted. Causes: Z-axis stepper missed steps under load → loose Z-leadscrew or coupler → too-aggressive lift speed. Slow lift speed, check Z-axis mechanically, reduce print height." },

    { type: "h3", text: "Holes / Pitting in the Print Surface" },
    { type: "p", text: "Small holes scattered across what should be a smooth surface. Causes: dirty FEP/release film with cured-on debris → contaminated resin (debris in vat) → bubbles in the resin. Strain the resin, clean the FEP, replace if scratched." },

    { type: "h3", text: "Print is Sticky/Soft After Cure" },
    { type: "p", text: "Surface remains tacky even after curing. Causes: insufficient wash (uncured resin still on surface) → insufficient cure time → resin past shelf life → wrong cure wavelength. Wash longer, cure longer, check resin expiry." },

    { type: "h3", text: "Print is Brittle / Snaps When Removing Supports" },
    { type: "p", text: "Causes: over-cure (too long in cure chamber) → cured wet (still has IPA absorbed when cured) → cured at too-high temperature → resin not designed for mechanical loads. Reduce cure time, wash thoroughly and let dry before curing, use a tougher resin." },

    { type: "h3", text: "Support Scars Worse Than Expected" },
    { type: "p", text: "Visible craters where supports attached. Causes: support tip diameter too large → exposure too high making supports over-fuse to part → supports placed on critical surfaces. Reduce tip size, reduce exposure, reorient." },

    { type: "h3", text: "Suction-Cup Failure (Print Detached Mid-Build)" },
    { type: "p", text: "Print is partially attached to build plate, with the lower portion ripped off and stuck to the FEP. Cause: trapped suction in concave geometry. Fix per prior lesson — drainage holes, reorient, or split." },

    { type: "h3", text: "Diagnosis Workflow" },
    { type: "p", text: "Open the print, look at the build plate, look at the vat, smell. Detached fragments in vat = likely peel failure. Clean build plate but ragged supports = exposure issue. Layer steps = mechanical issue. Tackiness = wash/cure issue. Most resin failures fit one of these four profiles." },

    { type: "callout", style: "key",
      text: "**The first failure isn't a tragedy.** Resin failures are noisy — there's a lot of information in the failed build. Photograph everything, label the symptoms, and track which fix worked. After 20–30 failures you'll diagnose new ones in seconds, the same way you do with FDM." },

      question: "A print is brittle and snaps when removing supports. The print finished cleanly. What's the likely cause?",

{

  video: { id: "4DvaC-Mchuk", title: "How Does Metal 3D Printing Work?" },

    { type: "p", text: "Metal AM is where AM crosses from tooling and prototyping into flight. It's also where the equipment, qualification, and post-processing costs explode. Most aerospace technicians won't operate a metal printer themselves — but they need to understand the process well enough to specify, inspect, and integrate metal AM parts into their work." },

    { type: "h3", text: "The Three Powder-Bed Processes" },
    { type: "ul", items: [
      "**DMLS (Direct Metal Laser Sintering) / SLM (Selective Laser Melting)** — laser fully melts metal powder, layer by layer, in an inert (argon) atmosphere. The dominant process for aerospace structural parts. Equipment cost: $500K–$2M+. Materials: Ti-6Al-4V, Inconel 718/625, AlSi10Mg, 17-4PH, Co-Cr.",
      "**EBM (Electron Beam Melting)** — electron beam fuses powder in a vacuum, at high temperature. Faster build rate, lower residual stress, better for titanium structural parts. More limited material set. Equipment cost similar to SLM.",
      "**Binder Jetting (metal)** — inkjet binder onto powder, sinter post-build. Faster than SLM but produces ~95–99% dense parts (vs >99.9% for SLM/HIP). Used increasingly for tooling, less so for flight parts."
    ]},

    { type: "h3", text: "The Post-Processing Pipeline" },
    { type: "p", text: "An as-built metal AM part is rough, has internal porosity, has anisotropic properties, and is full of residual stress. Almost every flight-grade metal AM part goes through:" },
    { type: "ul", items: [
      "**Stress relief** — heat treatment on the build plate, before removing supports, to prevent warping when supports come off.",
      "**Removal from build plate** — typically wire EDM or bandsaw.",
      "**Support removal** — manual, or for internal supports, sometimes etching or further machining.",
      "**HIP (Hot Isostatic Pressing)** — high temperature + high inert-gas pressure closes internal porosity, brings density to >99.9%. This is what makes the part properties approach wrought-equivalent.",
      "**Heat treatment** — solution treatment, aging, etc., specific to the alloy.",
      "**Machining** — critical surfaces, mating features, threads. As-built tolerances are not flight-grade.",
      "**NDI** — CT scan, dye-pen, ultrasonic inspection. Internal defects in metal AM are notoriously hard to detect, CT is often the only reliable method."
    ]},

    { type: "h3", text: "The Workhorse Alloys" },
    { type: "ul", items: [
      "**Ti-6Al-4V (Ti64)** — the aerospace structural workhorse. Brackets, fittings, ducting, structural components. Best-characterized AM alloy.",
      "**Inconel 718 / 625** — high-temperature nickel superalloys for hot sections, fuel systems, exhaust. The LEAP nozzle is Co-Cr but In718 is more common overall.",
      "**AlSi10Mg** — lightweight aluminum alloy, used for non-flight or low-stress flight applications. Cheaper than Ti64.",
      "**17-4PH / 15-5PH** — precipitation-hardened stainless, used for tooling and corrosion-resistant non-flight parts."
    ]},

    { type: "h3", text: "In-House vs Outsource" },
    { type: "p", text: "The economics of metal AM rarely justify in-house ownership for a small aerospace shop. A $1M+ machine, $50K+ in qualification per material, dedicated atmosphere/safety infrastructure, dedicated operators, dedicated CT inspection — total cost of ownership is enormous. Most aerospace work uses dedicated AM service bureaus (Sintavia, Morf3D, Stratasys Direct, GE Additive AddWorks). In-house metal AM only makes sense at OEM scale or with very high volume of one alloy." },
    { type: "p", text: "A technician's job is usually: write the build file, specify the post-processing, inspect the returned part, integrate it into the assembly. Knowing the process is what lets you write specs and inspect intelligently." },

    { type: "callout", style: "warning",
      text: "**Metal AM safety is no joke.** Reactive metal powders (titanium, aluminum) are explosive in air. Powder-handling rooms have grounded equipment, ATEX-rated vacuums, and trained operators. Don't wing it." },

    { type: "h3", text: "Construction" },
    { type: "p", text: "A brushed DC motor has four key parts:" },
    { type: "ul", items: [
      "**Stator** — typically permanent magnets in small motors, or wound field coils in larger ones. The stationary magnetic field.",
      "**Rotor (armature)** — wound coils on a laminated steel core. The current-carrying conductor that experiences torque.",
      "**Commutator** — segmented copper ring on the rotor shaft. Mechanically switches current direction in the windings as the rotor turns.",
      "**Brushes** — typically carbon (with various metal additives), spring-loaded against the commutator. Carry current from the stationary supply terminals to the rotating windings."
    ]},

    { type: "h3", text: "How Commutation Works" },
    { type: "p", text: "The brilliant idea of the brushed DC motor is mechanical commutation. As the rotor spins, the brushes contact different commutator segments, automatically reversing current direction in each coil at the right moment to keep the magnetic force always pulling the rotor in the same direction. No external timing electronics needed — the commutator IS the timing electronics." },
    { type: "p", text: "This is also why brushed motors run on DC: the commutator handles the AC-like switching internally. Apply +V and −V to the brushes, and the motor figures out when to reverse current in each coil." },

    { type: "h3", text: "Where Brushed DC Wins" },
    { type: "ul", items: [
      "**Low cost** — the simplest electric motor by parts count and the simplest to drive (just apply voltage; PWM for speed control).",
      "**High starting torque** — full current flows on startup, generating peak torque without any control electronics.",
      "**Easy speed control** — voltage controls speed approximately linearly. PWM at 10-30 kHz is the standard.",
      "**Excellent torque-to-volume at low power** — sub-fractional horsepower brushed motors are extraordinarily compact.",
      "**Forgiving control** — runs from any DC source above a few volts. No sensors, no firmware, no EMC qualification of a complex drive."

      "**EMI generation** — sparking at the brushes generates broadband electromagnetic interference. A nightmare for nearby sensitive electronics.",

      "**Hazardous atmospheres** — sparking is an ignition source. Not for explosive environments.",
      "**Lower efficiency than BLDC** — typical 50-80% vs. BLDC at 80-95%. Brush friction and contact losses add up.",

      text: "**The brushed DC niche.** Don't dismiss it as obsolete. For low-cost, low-duty, simple-control applications with no EMI concerns, the brushed DC is still hard to beat. The mistake is using it where its limitations matter — vacuum, long duty cycle, EMI-sensitive systems." },

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "BLDC & PMSM",
  subtitle: "Why electronic commutation changed everything — trapezoidal vs sinusoidal, FOC at the conceptual level.",
  time: "45 min", type: "Motor Type",
  video: { id: "bCEiOnuODac", title: "Brushless DC Motor, How it works? — Learn Engineering" },
  content: [
    { type: "p", text: "BLDC and PMSM are the dominant motor types for modern aerospace actuation, robotics, drones, electric vehicles, and most precision motion applications. They're brushless DC and permanent magnet synchronous motors — and the boundary between them is more cultural than physical." },

    { type: "h3", text: "What Brushless Means" },
    { type: "p", text: "BLDC inverts the brushed motor's geometry: permanent magnets are now on the rotor, and the windings are on the stator. There's no commutator, no brushes, no rotating electrical contacts. Commutation is electronic — the drive electronics read the rotor position and switch currents in the stator windings to produce torque." },
    { type: "p", text: "Three things follow from removing the brushes:" },
    { type: "ul", items: [
      "**Long life** — no wearing parts in the electrical path. 20,000+ hour bearings are the new lifetime limit.",
      "**Higher efficiency** — no brush friction or contact losses. 90-95% efficiency is normal.",
      "**Higher power density** — heat is generated in the stator (where it can be cooled), not the rotor (where it's hard to cool). More power per kg than brushed."
    ]},

    { type: "h3", text: "BLDC vs PMSM — The Distinction That Matters" },
    { type: "p", text: "The technical distinction comes down to the back-EMF waveform:" },
    { type: "ul", items: [
      "**BLDC (trapezoidal back-EMF)** — windings concentrated, magnets configured to produce a flat-topped EMF waveform. Driven with six-step block commutation: turn one phase pair on at a time, in sequence. Simpler control, slightly more torque ripple. Common in fans, pumps, drone motors.",
      "**PMSM (sinusoidal back-EMF)** — distributed windings, magnets producing a smooth sinusoidal EMF. Driven with sinusoidal currents and Field-Oriented Control (FOC). Smoother torque, more efficient at variable speed. Dominant in servos, EV traction, aerospace actuation."
    ]},
    { type: "p", text: "In practice, the same physical motor can often be driven either way. Most modern drives implement FOC even on motors that started life as 'BLDC' — sinusoidal control is just better for most applications." },

    { type: "h3", text: "Sensored vs Sensorless" },
    { type: "p", text: "The drive needs to know rotor position to commutate. Two approaches:" },
    { type: "ul", items: [
      "**Sensored** — Hall-effect sensors give discrete 60° position updates (good enough for BLDC six-step), or an encoder/resolver gives continuous position (required for FOC and high-precision PMSM). Reliable, expensive, more wires.",
      "**Sensorless** — algorithms estimate rotor position from back-EMF (above some minimum speed) or high-frequency injection (at low/zero speed). Cheaper, fewer wires, but harder to start from rest under load. Common in fans, pumps, ESCs."
    ]},

    { type: "h3", text: "FOC at the Conceptual Level" },
    { type: "p", text: "Field-Oriented Control is the modern algorithmic standard for PMSM control. The conceptual idea: transform the three-phase stator currents into two equivalent currents in the rotor's reference frame — one along the magnet's axis (d-axis, doesn't produce useful torque) and one perpendicular (q-axis, directly produces torque). Then control the q-current to demand the torque you want, and keep d-current at zero (or use it for field weakening at high speed)." },
    { type: "p", text: "The math (Clarke and Park transforms) sounds intimidating but the result is intuitive: FOC turns a three-phase AC motor into something that controls like a brushed DC motor — torque is directly proportional to one current you choose. That's why FOC dominates servo control today." },

    { type: "h3", text: "Aerospace Applications" },
    { type: "ul", items: [
      "**Flight control actuators** — high-power-density PMSM with FOC drive integrated. Replaces hydraulic actuators in next-gen aircraft.",
      "**Engine accessory drives** — fuel pumps, oil pumps, generators. Long life and high efficiency matter enormously.",
      "**Drone propulsion** — outrunner BLDC dominates. Power-to-weight is the king metric.",
      "**Reaction wheels for spacecraft** — frameless PMSM, vacuum-rated, high-reliability variants.",
      "**Cabin systems** — fans, blowers, environmental control."
    ]},

    { type: "callout", style: "key",
      text: "**The default modern motor.** When in doubt for any new precision actuation design, start with BLDC/PMSM and a modern FOC drive. The exceptions (cost-driven, vacuum, hazardous atmosphere with no electronics, fixed-speed line-power) are real but narrow." },
  ],
  quizzes: [

    },

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "AC Induction Motors",
  subtitle: "Rotating field, slip, NEMA frames, VFD basics — why they dominate industry but are rare in aerospace.",
  time: "40 min", type: "Motor Type",
  video: { id: "59HBoIXzX_c", title: "How Electric Motors Work — 3 phase AC induction motors — The Engineering Mindset" },
  content: [
    { type: "p", text: "AC induction motors run more horsepower in the world than every other motor type combined. Pumps, fans, conveyors, compressors, machine tool spindles — anywhere there's three-phase grid power and a fixed-speed load, induction is king. In aerospace they're rarer but still appear in ground equipment, test stands, and some auxiliary systems." },

    { type: "h3", text: "How Induction Works" },
    { type: "p", text: "Three-phase AC current in the stator windings creates a rotating magnetic field that sweeps around the stator at synchronous speed (n_sync = 120f/p, where f is line frequency in Hz and p is number of poles). The rotor — typically a 'squirrel cage' of conductive bars — sees this rotating field as a relative motion, which induces currents in the rotor bars (Faraday). Those induced currents in the magnetic field produce torque (Lorentz). The rotor accelerates to follow the field." },
    { type: "p", text: "The rotor never quite catches the field — if it did, there'd be no relative motion and no induced currents. The difference is **slip**: usually 1-3% at full load. A 4-pole motor on 60 Hz has synchronous speed 1800 RPM; full-load operating speed is typically 1750-1780 RPM (small slip)." },

    { type: "h3", text: "Why It's a Big Deal" },
    { type: "ul", items: [
      "**No rotor windings, brushes, or magnets** — the rotor is just steel and copper/aluminum bars. Cheap, robust, infinite life.",
      "**Self-starting from line power** — connect to three-phase grid and it runs. No drive needed for fixed-speed applications.",
      "**Robust** — handles overloads, dust, moisture, decades of duty. The workhorse.",
      "**High efficiency at design point** — modern IE3/IE4 motors hit 92-96%."
    ]},

    { type: "h3", text: "NEMA / IEC Frames and Standardization" },
    { type: "p", text: "Industrial induction motors are aggressively standardized. NEMA (US) and IEC (international) define frame sizes that fix shaft height, bolt pattern, and shaft dimensions for given power ratings. A 56-frame motor from any manufacturer fits the same mounting holes as any other 56-frame motor. This is unique among motor types and is part of why induction dominates industry — you can swap brands without redesigning the machine." },

    { type: "h3", text: "VFDs (Variable Frequency Drives)" },
    { type: "p", text: "Plain induction motors run at one speed (set by line frequency). To control speed, you need a Variable Frequency Drive: an electronic device that takes fixed-frequency line power and synthesizes variable-frequency three-phase output. VFDs unlock induction motors for speed control applications — pumps, HVAC, machine tool spindles." },
    { type: "p", text: "Modern VFDs implement vector control or even FOC on induction motors. With a VFD, an induction motor can do many of the things a servo motor can — but typically at lower bandwidth and with poorer low-speed torque control." },

    { type: "h3", text: "Where Induction Wins" },
    { type: "ul", items: [
      "**Industrial fixed-speed loads** at line power. Pumps, fans, conveyors, compressors.",
      "**Variable-speed industrial loads** with a VFD. HVAC, machine tools, mixers.",
      "**Anywhere robustness and long life are critical** and you're not weight-constrained.",
      "**Three-phase grid power available** — induction motors are designed for it."
    ]},

    { type: "h3", text: "Why It's Rare in Aerospace" },
    { type: "p", text: "Aerospace constraints flip induction's advantages into liabilities:" },
    { type: "ul", items: [
      "**Power-to-weight** — induction is heavier than PMSM at the same power. Aerospace can't afford the mass.",
      "**No 60 Hz grid power** — aircraft buses are typically 28 V DC or 115 V 400 Hz AC. Induction motors must be redesigned for higher frequency, eliminating standardization.",
      "**Variable-speed efficiency** — induction efficiency drops at part-load and low-speed operation; PMSM doesn't.",
      "**Power density at variable speed** — modern PMSM with FOC simply outperforms induction for actuation."
    ]},

    { type: "h3", text: "Aerospace-Adjacent Cases" },
    { type: "p", text: "Where you'll see induction motors in aerospace contexts: ground support equipment (test stands, baggage handlers, fuel pumps), facility HVAC, machine tools used to make aerospace parts, hangar door drives, fixed-installation cargo handling. On the aircraft itself, almost never." },

    { type: "callout", style: "key",
      text: "**The right framing.** Induction motors aren't 'less advanced' than PMSM — they're optimized for a different operating regime (line power, fixed speed, robustness, low cost). For their regime, they're unbeatable. For aerospace's regime (battery/inverter power, variable speed, weight-critical), PMSM dominates." },
  ],

{
  phase: "Phase 2", phaseColor: "#c84b11",
  title: "Stepper Motors",
  subtitle: "Open-loop positioning, microstepping, holding vs slewing torque — when steppers are right and when they're a trap.",
  time: "40 min", type: "Motor Type",
  video: { id: "eyqwLiowZiU", title: "How does a Stepper Motor work? — Learn Engineering" },
  content: [
    { type: "p", text: "Stepper motors are the cheap-and-cheerful answer to position control. They move in discrete angular increments — typically 1.8° per step (200 steps/rev) or 0.9° per step (400 steps/rev) — and you can drive them open-loop without any encoder feedback. For low-speed, light-load positioning applications they're hard to beat. For everything else they're a trap." },

    { type: "h3", text: "How Steppers Work" },
    { type: "p", text: "A typical hybrid stepper has a permanent-magnet rotor with many fine teeth and a stator with multiple phases (typically two, sometimes three or five). Energizing the phases in sequence steps the rotor one tooth at a time. Reverse the sequence — reverse direction. Stop energizing — the rotor holds at the last commanded position with magnetic detent torque." },
    { type: "ul", items: [
      "**Full step** — one phase-pair energized at a time. 200 steps/rev for the standard 1.8° motor.",
      "**Half step** — alternate one-phase and two-phase energization. 400 steps/rev, smoother but unequal torque per step.",
      "**Microstep** — modulate phase currents sinusoidally to interpolate between physical step positions. 1/16 to 1/256 microsteps/rev are common. Enormous resolution increases without changing the motor."
    ]},
    { type: "p", text: "Critical insight: microstepping increases positional resolution but does NOT proportionally increase positional accuracy. The motor still has discrete magnetic detent positions, and at low microstep currents the torque between physical steps is very weak. Microstepping is great for smooth motion at moderate speed; it's marketing for ultra-precise static positioning." },

    { type: "h3", text: "The Torque-Speed Tradeoff" },
    { type: "p", text: "Stepper torque collapses dramatically with speed. A motor with 0.5 Nm holding torque might produce only 0.05 Nm at 1000 RPM. Two reasons:" },
    { type: "ul", items: [
      "**Inductance** — the motor windings have inductance that resists rapid current changes. At high step rates, current can't build up before the next step is commanded.",
      "**Resonance** — at certain speeds the rotor's natural oscillation gets reinforced step-by-step, causing the motor to lose synchronism."
    ]},
    { type: "p", text: "This is why steppers max out at moderate speeds (typically 1000-3000 RPM useful range) and need careful acceleration profiles to avoid losing steps." },

    { type: "h3", text: "Holding Torque vs Slewing Torque" },
    { type: "ul", items: [
      "**Holding torque** — the torque the motor produces with full current applied at zero speed. The headline spec.",
      "**Detent torque** — the torque without any current, just from the permanent magnet's interaction with the stator teeth.",
      "**Pull-in torque** — the maximum torque the motor can start a load against without losing steps.",
      "**Pull-out (slewing) torque** — the maximum torque while running. Always less than pull-in."
    ]},

    { type: "h3", text: "When Steppers Are the Right Answer" },
    { type: "ul", items: [
      "**Open-loop positioning at low to moderate speed** — 3D printers, CNC machines (low-end), positioning stages, syringe pumps, simple actuators.",
      "**Cost-sensitive applications** — drives are simple (just step and direction inputs typically), no encoder needed.",
      "**Holding position without power consumed in motion** — magnetic detent holds the rotor with zero current.",
      "**Repeatable indexing** — print head positioning, sample handling, telescope filters."
    ]},

    { type: "h3", text: "When Steppers Are a Trap" },
    { type: "ul", items: [
      "**High-speed applications** — torque collapses; you need a servo.",
      "**High-torque applications relative to motor size** — the holding torque sounds impressive but rapid loss above modest speeds.",
      "**Applications where missed steps are unacceptable without feedback** — open-loop steppers can lose steps silently and you'll never know.",
      "**Variable-load applications** — sizing for worst-case load wastes power most of the time; steppers are inefficient at light load.",
      "**Low audible noise required** — microstepping helps but stepper motors are inherently noisy."
    ]},

    { type: "h3", text: "Closed-Loop Steppers" },
    { type: "p", text: "Modern 'closed-loop steppers' add a high-resolution encoder and treat the stepper as a servo motor. They eliminate the missed-step problem and improve high-speed performance. The line between 'closed-loop stepper' and 'servo motor' is now mostly marketing — both are encoder-fed FOC motors with discrete teeth in the rotor." },

    { type: "callout", style: "warning",
      text: "**The classic trap.** Don't use the holding torque to size for application. The motor will deliver maybe 30% of holding at modest speed. Always size against the actual pull-out (slewing) torque curve at your operating speed." },
  ],

        "Telescope filter wheel indexing"

{

  title: "Limited Angle Torque Motors & Galvos",
  subtitle: "Direct-drive, no commutation, fast-steering mirrors, gimbals — high-bandwidth pointing applications.",
  time: "35 min", type: "Motor Type",
  video: { id: "rEeKO4MSK_k", title: "Galvanometer Laser Scanning Solutions: Design and Applications — Thorlabs" },
  content: [
    { type: "p", text: "Limited Angle Torque (LATT) motors and galvanometers are specialized actuators for one use case: high-bandwidth oscillation over a limited angular range, with no commutation needed because the rotor never makes a full turn. They're invisible in everyday products but critical in optical scanners, fast-steering mirrors, gimbals, and aerospace pointing systems." },

    { type: "h3", text: "What Makes Them Different" },
    { type: "p", text: "A typical LATT motor has a stationary magnet structure and a rotor consisting of a flat coil mounted on a shaft. Apply current to the coil — Lorentz force produces torque, the coil rotates. Reverse current — opposite torque. Because the rotor only needs to swing through ±15° to ±45° typically, there's no need to commutate as the rotor turns. No brushes, no electronic commutation algorithm — just a coil in a magnet, driven by an analog current command." },
    { type: "p", text: "Some variants put the coil on the stator and the magnet on the rotor (similar to a moving-magnet voice coil); the principle is the same." },

    { type: "h3", text: "Why This Matters: Bandwidth" },
    { type: "p", text: "Without commutation, there's no commutation delay or current chopping at step boundaries. Without an encoder needed for commutation, you can put the position sensor right at the rotor with extreme bandwidth (capacitive, optical interferometer, or just a precision potentiometer). The result: control bandwidth in the kHz, with positioning resolution in microradians." },
    { type: "p", text: "A laser-marking galvo can position a mirror to 10 µrad resolution in 200 µs. A fast-steering mirror in a tracking telescope can correct atmospheric tip-tilt at 1 kHz bandwidth. These are numbers that no full-rotation motor type can match." },

    { type: "h3", text: "Construction Details" },
    { type: "ul", items: [
      "**Moving-coil galvanometer** — coil on rotor, magnets on stator. Lowest inertia, highest bandwidth. Requires flexible leads to the moving coil, which is the limiting wear/life element.",
      "**Moving-magnet galvanometer** — magnet on rotor, coil on stator. Higher inertia (magnets are heavier than copper) but no moving electrical connections. Longer life, slightly lower bandwidth.",
      "**Position sensor** — typically capacitive or optical. Tightly integrated with the motor mechanically.",
      "**Bearing options** — flexures (for short-stroke high-bandwidth), precision ball bearings (for longer life and broader stroke), or air bearings (for ultra-precision lab equipment).",
      "**Drive electronics** — usually a custom servo amplifier with PID/feedforward tuned to the motor + load combination. Cannot use a generic motor drive."
    ]},

    { type: "h3", text: "Applications" },
    { type: "ul", items: [
      "**Laser marking and engraving** — XY galvo pairs steering a focused laser beam at meter-per-second speeds with sub-pixel accuracy. The dominant application.",
      "**Optical coherence tomography (OCT)** — fast-scanning probe beams in medical imaging.",
      "**Confocal microscopy** — fast image-plane scanning.",
      "**Adaptive optics** — fast-steering mirrors compensating atmospheric turbulence in ground-based telescopes.",
      "**Aerospace pointing** — gimbal stabilization for cameras, laser communication terminals, missile seekers, target tracking. Inertial isolation requires high-bandwidth correction.",
      "**Free-space optical communication** — keeping a laser pointed at a moving terminal across kilometers."
    ]},

    { type: "h3", text: "Aerospace-Specific Considerations" },
    { type: "p", text: "LATT/galvo motors are common in defense and aerospace optical systems. Things to know:" },
    { type: "ul", items: [
      "**Vacuum compatibility** — flexure-bearing variants are vacuum-OK; ball-bearing variants need vacuum-grade lubricants.",
      "**Vibration tolerance** — these are precision instruments; mounting design matters enormously.",
      "**EMI sensitivity** — analog drive circuits with sub-microradian feedback are sensitive to environmental electrical noise.",
      "**ITAR** — fast-steering mirrors and high-bandwidth precision pointing actuators often fall under ITAR for export. The control electronics and integrated systems are usually controlled."
    ]},

    { type: "callout", style: "key",
      text: "**The right framing.** Don't think of LATT/galvos as 'small motors with limited rotation.' Think of them as **precision actuators built around the principle that no commutation is the simplest commutation.** The lack of commutation is the feature that enables the bandwidth, accuracy, and life that the applications need." },
  ],
  quizzes: [
    {
      question: "Why don't LATT motors / galvanometers need commutation?",
